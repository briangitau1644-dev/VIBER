name: Senior Engineer CPU - Gemma4-E4B - GitHub Actions

on:
  workflow_dispatch:
    inputs:
      model_download_url:
        description: 'Direct GGUF download URL'
        required: false
        default: 'https://huggingface.co/bartowski/google_gemma-4-E4B-it-GGUF/resolve/main/google_gemma-4-E4B-it-bf16.gguf?download=true'
      model_filename:
        description: 'GGUF filename'
        required: false
        default: 'google_gemma-4-E4B-it-bf16.gguf'
      session_hours:
        description: 'Session duration (max 6)'
        required: false
        default: '6'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  MODEL_FILENAME: ${{ github.event.inputs.model_filename }}
  MODEL_DOWNLOAD_URL: ${{ github.event.inputs.model_download_url }}
  SESSION_HOURS: ${{ github.event.inputs.session_hours }}
  SERVER_PORT: '11434' # Using Ollama's default port for compatibility
  MODEL_PATH: 'models/google_gemma-4-E4B-it-bf16.gguf'

jobs:
  senior-engineer-gemma4-cpu:
    name: Gemma4-E4B Full-Stack Senior Engineer
    runs-on: ubuntu-latest
    timeout-minutes: 400

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Kill Any Stale Servers
        run: |
          pkill -9 -f llama-server 2>/dev/null || true
          pkill -9 -f cloudflared  2>/dev/null || true
          sudo fuser -k 11434/tcp  2>/dev/null || true

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl wget cmake build-essential python3

      - name: Clone and Build llama.cpp
        run: |
          git clone --depth 1 https://github.com/ggerganov/llama.cpp
          cd llama.cpp
          cmake -B build -DLLAMA_CURL=ON -DLLAMA_BUILD_SERVER=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)
          echo "SERVER_BIN=$(realpath build/bin/llama-server)" >> $GITHUB_ENV

      - name: Download Model
        run: |
          mkdir -p models
          curl -fL -o "$MODEL_PATH" "$MODEL_DOWNLOAD_URL"

      - name: Create Ollama-Style Persona & Template
        run: |
          # This replicates the 'Ollama Modelfile' behavior
          cat << 'EOF' > /tmp/system_prompt.txt
          You are a Senior Full-Stack Engineer (15+ years exp). 
          Expert in Python (Django/FastAPI), JS (React/Next.js), Rust, and DevOps.
          Your tone: Professional, direct, architectural.
          Rule 1: Always provide complete, copy-pasteable code.
          Rule 2: No preamble/chatting unless necessary.
          Rule 3: Use markdown formatting.
          EOF

      - name: Start Llama Server with Template Injection
        run: |
          # We use --chat-template gemma to ensure the wrapper is correct
          $SERVER_BIN \
            --model "$MODEL_PATH" \
            --port ${{ env.SERVER_PORT }} \
            --ctx-size 8192 \
            --batch-size 512 \
            --threads $(nproc) \
            --alias "gemma-4" \
            --chat-template gemma \
            --system-prompt-file /tmp/system_prompt.txt &
          
          echo "Waiting for model to load..."
          until curl -s http://localhost:${{ env.SERVER_PORT }}/health | grep -q "ok"; do
            sleep 5
          done
          echo "Model is Online with Ollama-style wrapping."

      - name: Expose via Cloudflared
        run: |
          wget -q https://github.com
          sudo dpkg -i cloudflared-linux-amd64.deb
          cloudflared tunnel --url http://localhost:${{ env.SERVER_PORT }} &
          sleep 5
          echo "---------------------------------------------------"
          echo "TUNNEL ENDPOINT FOUND BELOW:"
          curl -s http://localhost:45678/metrics | grep -o 'https://[-a-z0-9.]*.trycloudflare.com' || true
          echo "---------------------------------------------------"

      - name: Keep Alive
        run: |
          echo "Session active for ${{ env.SESSION_HOURS }} hours."
          sleep $(( ${{ env.SESSION_HOURS }} * 3600 ))
