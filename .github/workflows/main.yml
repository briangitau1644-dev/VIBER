# .github/workflows/main.yml
name: Roo Code - Qwen2.5-Coder 7B Server

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  
  MODEL_URL: 'https://huggingface.co/bartowski/Qwen2.5-Coder-7B-Instruct-GGUF/resolve/main/Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf'
  MODEL_PATH: 'models/Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf'
  SERVER_PORT: '1234'
  PROXY_PORT: '11434'
  LLAMA_REPO: 'https://github.com/ggml-org/llama.cpp'
  LLAMA_BRANCH: 'master'

jobs:
  qwen-coder-server:
    name: Qwen2.5-Coder-7B for Roo Code
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean environment
        run: |
          pkill -9 -f llama-server 2>/dev/null || true
          pkill -9 -f python3 2>/dev/null || true
          pkill -9 -f cloudflared 2>/dev/null || true
          sudo fuser -k 1234/tcp 2>/dev/null || true
          sudo fuser -k 11434/tcp 2>/dev/null || true
          rm -rf llama.cpp build models cloudflared proxy.py tunnel.log

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl wget cmake build-essential python3 python3-pip git

      - name: Build llama.cpp
        run: |
          git clone --depth 1 --branch master https://github.com/ggml-org/llama.cpp
          cd llama.cpp
          cmake -B build -DLLAMA_CURL=ON -DLLAMA_BUILD_SERVER=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)
          echo "SERVER_BIN=$(realpath build/bin/llama-server)" >> $GITHUB_ENV

      - name: Download model
        run: |
          mkdir -p models
          curl -fL --retry 3 -o "$MODEL_PATH" "$MODEL_URL"
          [ -f "$MODEL_PATH" ] && echo "Model downloaded" || exit 1

      - name: Start llama-server
        run: |
          $SERVER_BIN --model "$MODEL_PATH" --port 1234 --ctx-size 32768 --threads $(nproc) --chat-template qwen2.5 &
          sleep 10
          curl -sf http://localhost:1234/health || exit 1

      - name: Create and start full OpenAI-compatible proxy
        run: |
          cat > proxy.py << 'EOF'
          #!/usr/bin/env python3
          import http.server
          import urllib.request
          import urllib.parse
          import json
          import os
          import time
          
          BACKEND = "http://localhost:1234"
          PORT = 11434
          
          class OpenAIProxy(http.server.BaseHTTPRequestHandler):
              def log_message(self, *args):
                  pass
              
              def do_OPTIONS(self):
                  self.send_response(200)
                  self.send_header("Access-Control-Allow-Origin", "*")
                  self.send_header("Access-Control-Allow-Methods", "GET, POST, PUT, DELETE, OPTIONS")
                  self.send_header("Access-Control-Allow-Headers", "Content-Type, Authorization, Accept")
                  self.end_headers()
              
              def _forward(self, method, path, body=None, headers={}):
                  url = f"{BACKEND}{path}"
                  req_headers = {"Content-Type": "application/json"}
                  req_headers.update(headers)
                  
                  req = urllib.request.Request(url, data=body, headers=req_headers, method=method)
                  try:
                      with urllib.request.urlopen(req, timeout=180) as resp:
                          return resp.getcode(), resp.read(), dict(resp.headers)
                  except urllib.error.HTTPError as e:
                      return e.code, e.read(), dict(e.headers)
                  except Exception as e:
                      return 500, json.dumps({"error": str(e)}).encode(), {}
              
              def _send(self, code, data, content_type="application/json"):
                  self.send_response(code)
                  self.send_header("Content-Type", content_type)
                  self.send_header("Content-Length", len(data))
                  self.send_header("Access-Control-Allow-Origin", "*")
                  self.end_headers()
                  self.wfile.write(data)
              
              def _format_prompt(self, messages):
                  """Format messages using Qwen2.5 chat template"""
                  prompt = ""
                  for msg in messages:
                      role = msg.get('role', 'user')
                      content = msg.get('content', '')
                      if role == 'system':
                          prompt += f"<|im_start|>system\n{content}<|im_end|>\n"
                      elif role == 'user':
                          prompt += f"<|im_start|>user\n{content}<|im_end|>\n"
                      elif role == 'assistant':
                          prompt += f"<|im_start|>assistant\n{content}<|im_end|>\n"
                  prompt += "<|im_start|>assistant\n"
                  return prompt
              
              def _generate(self, messages, stream=False, max_tokens=4096, temperature=0.7):
                  """Send to llama.cpp and get response"""
                  prompt = self._format_prompt(messages)
                  
                  llama_req = {
                      "prompt": prompt,
                      "n_predict": max_tokens,
                      "temperature": temperature,
                      "top_p": 0.95,
                      "stop": ["<|im_end|>", "<|endoftext|>"]
                  }
                  
                  code, resp, _ = self._forward('POST', '/completion', json.dumps(llama_req).encode())
                  
                  if code == 200:
                      llama_resp = json.loads(resp)
                      return llama_resp.get('content', '')
                  return ""
              
              def do_GET(self):
                  path = urllib.parse.urlparse(self.path).path
                  
                  # Health check
                  if path in ['/', '/health', '/healthz']:
                      self._send(200, json.dumps({"status": "ok", "model": "qwen2.5-coder"}).encode())
                  
                  # Models endpoint
                  elif path == '/v1/models':
                      models = {
                          "object": "list",
                          "data": [{
                              "id": "qwen2.5-coder-7b",
                              "object": "model",
                              "created": int(time.time()),
                              "owned_by": "qwen"
                          }]
                      }
                      self._send(200, json.dumps(models).encode())
                  
                  # OpenAI v1 models
                  elif path == '/models':
                      models = {
                          "data": [{"id": "qwen2.5-coder-7b", "type": "model"}]
                      }
                      self._send(200, json.dumps(models).encode())
                  
                  else:
                      self._send(404, json.dumps({"error": "Not found"}).encode())
              
              def do_POST(self):
                  content_length = int(self.headers.get('Content-Length', 0))
                  body = self.rfile.read(content_length)
                  path = urllib.parse.urlparse(self.path).path
                  
                  try:
                      data = json.loads(body) if body else {}
                      
                      # === CHAT COMPLETIONS ENDPOINT ===
                      if path == '/v1/chat/completions' or path == '/chat/completions':
                          messages = data.get('messages', [])
                          
                          # Add system message if missing
                          if not any(m.get('role') == 'system' for m in messages):
                              messages.insert(0, {"role": "system", "content": "You are Qwen2.5-Coder, an expert programming assistant. Provide helpful, accurate responses."})
                          
                          # Generate response
                          response_text = self._generate(
                              messages,
                              data.get('stream', False),
                              data.get('max_tokens', 4096),
                              data.get('temperature', 0.7)
                          )
                          
                          # Format response
                          result = {
                              "id": f"chatcmpl-{int(time.time())}",
                              "object": "chat.completion",
                              "created": int(time.time()),
                              "model": "qwen2.5-coder-7b",
                              "choices": [{
                                  "index": 0,
                                  "message": {
                                      "role": "assistant",
                                      "content": response_text
                                  },
                                  "finish_reason": "stop"
                              }],
                              "usage": {
                                  "prompt_tokens": len(str(messages)),
                                  "completion_tokens": len(response_text),
                                  "total_tokens": len(str(messages)) + len(response_text)
                              }
                          }
                          
                          self._send(200, json.dumps(result).encode())
                      
                      # === RESPONSES API ENDPOINT (for Continue) ===
                      elif '/responses' in path:
                          messages = []
                          
                          # Parse input
                          if 'input' in data:
                              inp = data['input']
                              if isinstance(inp, str):
                                  messages = [{"role": "user", "content": inp}]
                              elif isinstance(inp, list):
                                  for item in inp:
                                      if isinstance(item, dict):
                                          role = item.get('role', 'user')
                                          content = item.get('content', '')
                                          if isinstance(content, list):
                                              for c in content:
                                                  if isinstance(c, dict) and c.get('type') == 'input_text':
                                                      messages.append({"role": role, "content": c.get('text', '')})
                                          else:
                                              messages.append({"role": role, "content": content})
                          
                          # Add system message
                          if not any(m.get('role') == 'system' for m in messages):
                              messages.insert(0, {"role": "system", "content": "You are Qwen2.5-Coder, a coding assistant."})
                          
                          # Generate response
                          response_text = self._generate(
                              messages,
                              False,
                              data.get('max_output_tokens', 4096),
                              data.get('temperature', 0.7)
                          )
                          
                          # Format as Responses API
                          result = {
                              "id": f"resp_{int(time.time())}",
                              "object": "response",
                              "status": "completed",
                              "output": [{
                                  "type": "message",
                                  "role": "assistant",
                                  "content": [{
                                      "type": "output_text",
                                      "text": response_text
                                  }]
                              }],
                              "usage": {
                                  "output_tokens": len(response_text),
                                  "input_tokens": len(str(messages))
                              }
                          }
                          
                          self._send(200, json.dumps(result).encode())
                      
                      # === COMPLETIONS ENDPOINT (legacy) ===
                      elif path == '/v1/completions' or path == '/completions':
                          prompt = data.get('prompt', '')
                          messages = [{"role": "user", "content": prompt}]
                          
                          response_text = self._generate(
                              messages,
                              False,
                              data.get('max_tokens', 4096),
                              data.get('temperature', 0.7)
                          )
                          
                          result = {
                              "id": f"cmpl-{int(time.time())}",
                              "object": "text_completion",
                              "created": int(time.time()),
                              "model": "qwen2.5-coder-7b",
                              "choices": [{
                                  "text": response_text,
                                  "index": 0,
                                  "finish_reason": "stop"
                              }]
                          }
                          
                          self._send(200, json.dumps(result).encode())
                      
                      # === EMBEDDINGS ENDPOINT ===
                      elif path == '/v1/embeddings' or path == '/embeddings':
                          # Simple placeholder embeddings
                          result = {
                              "object": "list",
                              "data": [{
                                  "object": "embedding",
                                  "index": 0,
                                  "embedding": [0.0] * 768
                              }],
                              "model": "qwen2.5-coder-7b",
                              "usage": {
                                  "prompt_tokens": 0,
                                  "total_tokens": 0
                              }
                          }
                          self._send(200, json.dumps(result).encode())
                      
                      # === Forward other requests to backend ===
                      else:
                          code, resp, headers = self._forward('POST', path, body)
                          self._send(code, resp)
                      
                  except Exception as e:
                      print(f"Error: {e}")
                      self._send(500, json.dumps({"error": str(e)}).encode())
          
          print(f"OpenAI-compatible proxy running on port {PORT}")
          print("Supported endpoints:")
          print("  - GET  /health")
          print("  - GET  /v1/models")
          print("  - POST /v1/chat/completions")
          print("  - POST /v1/responses")
          print("  - POST /v1/completions")
          print("  - POST /v1/embeddings")
          
          http.server.HTTPServer(('0.0.0.0', PORT), OpenAIProxy).serve_forever()
          EOF
          
          python3 proxy.py &
          sleep 5
          echo "Proxy started successfully"

      - name: Start tunnel
        run: |
          curl -fL -o cloudflared "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64"
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:11434 --no-autoupdate > tunnel.log 2>&1 &
          
          echo "Waiting for tunnel..."
          for i in {1..30}; do
            if [ -f tunnel.log ]; then
              PUBLIC_URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' tunnel.log | head -n1)
              if [ -n "$PUBLIC_URL" ]; then
                break
              fi
            fi
            sleep 2
          done
          
          echo "PUBLIC_URL=${PUBLIC_URL}" >> $GITHUB_ENV
          echo "PUBLIC_URL=${PUBLIC_URL}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tunnel URL: ${PUBLIC_URL}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Continue Configuration" >> $GITHUB_STEP_SUMMARY
          echo '```yaml' >> $GITHUB_STEP_SUMMARY
          echo "apiBase: ${PUBLIC_URL}/v1" >> $GITHUB_STEP_SUMMARY
          echo "model: qwen2.5-coder-7b" >> $GITHUB_STEP_SUMMARY
          echo "apiKey: any" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test with curl:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "curl ${PUBLIC_URL}/v1/chat/completions \\" >> $GITHUB_STEP_SUMMARY
          echo '  -H "Content-Type: application/json" \\' >> $GITHUB_STEP_SUMMARY
          echo '  -d '"'"'{"messages":[{"role":"user","content":"Say hello"}]}'"'"'' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Keep alive
        run: while true; do sleep 300; done
