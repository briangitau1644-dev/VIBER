name: Host Gemma 4 E4B for Roo Code
on:
  workflow_dispatch:

jobs:
  host-gemma:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ollama
        run: |
          # Install Ollama using official script
          curl -fsSL https://ollama.com/install.sh | sh
          
          # Start Ollama service
          sudo systemctl start ollama
          
          # Wait for Ollama to be ready
          echo "Waiting for Ollama to start..."
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✓ Ollama is ready!"
              break
            fi
            echo "Attempt $i/30 - Ollama starting..."
            sleep 3
          done
          
          ollama --version

      - name: Pull Gemma 4 E4B Model
        run: |
          echo "=========================================="
          echo "Pulling gemma4:e4b model (~9.6GB)..."
          echo "This will take 15-30 minutes"
          echo "=========================================="
          
          ollama pull gemma4:e4b
          
          echo "✓ Model pull complete!"

      - name: Start Gemma 4 E4B Model
        run: |
          echo "Starting gemma4:e4b model..."
          
          # Start the model and keep it running
          ollama run gemma4:e4b &
          
          # Wait for model to load
          sleep 15
          
          # Verify model is working
          echo "Testing model..."
          curl -X POST http://localhost:11434/api/generate \
            -H "Content-Type: application/json" \
            -d '{"model":"gemma4:e4b","prompt":"Say OK","stream":false}'
          
          echo "✓ Model is running"

      - name: Install Cloudflared
        run: |
          # Install cloudflared
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Start Cloudflare Tunnel
        run: |
          echo "=========================================="
          echo "Starting Cloudflare tunnel..."
          echo "=========================================="
          
          # Start tunnel with proper headers to avoid 403
          cloudflared tunnel --url http://localhost:11434 \
            --no-autoupdate \
            --http-host-header=localhost:11434 2>&1 | tee cloudflared.log &
          
          # Wait for tunnel to establish
          sleep 15
          
          # Extract tunnel URL
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
          
          if [ -n "$TUNNEL_URL" ]; then
            echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
            echo "✓ Tunnel URL: $TUNNEL_URL"
          fi

      - name: Test Tunnel
        run: |
          if [ -n "$TUNNEL_URL" ]; then
            echo "Testing tunnel with API call..."
            
            # Test the tunnel
            curl -X POST "$TUNNEL_URL/api/generate" \
              -H "Content-Type: application/json" \
              -d '{"model":"gemma4:e4b","prompt":"test","stream":false}'
            
            echo ""
            echo "✓ Tunnel is working!"
          fi

      - name: Display Connection Info
        run: |
          echo "=========================================="
          echo "✅ GEMMA 4 E4B IS READY!"
          echo "=========================================="
          echo ""
          echo "🌐 CLOUDFLARE TUNNEL URL:"
          echo "   $TUNNEL_URL"
          echo ""
          echo "🔧 ROO CODE CONFIGURATION:"
          echo "   API URL: $TUNNEL_URL/v1/chat/completions"
          echo "   Model name: gemma4:e4b"
          echo "   API Format: OpenAI Compatible"
          echo "   API Key: (leave empty)"
          echo ""
          echo "⚠️  IF YOU STILL GET 403 ERROR:"
          echo "   1. In Roo Code settings, add a dummy API key: 'ollama'"
          echo "   2. Or try using: $TUNNEL_URL/api/generate (non-OpenAI endpoint)"
          echo "   3. Make sure CORS is disabled in Roo Code if possible"
          echo ""
          echo "=========================================="

      - name: Keep Runner Alive
        run: |
          echo "Keeping runner alive for 6 hours..."
          echo "Model is ready for requests"
          
          # Keep showing tunnel URL
          while true; do
            if [ -f cloudflared.log ]; then
              URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
              if [ -n "$URL" ]; then
                echo "[$(date '+%H:%M:%S')] Tunnel active: $URL"
              fi
            fi
            sleep 60
          done
