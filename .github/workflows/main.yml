name: Senior Engineer CPU - Qwen3.5-9B-Uncensored - GitHub Actions

on:
  workflow_dispatch:
    inputs:
      model_download_url:
        description: 'Direct GGUF download URL'
        required: false
        default: 'https://huggingface.co/HauhauCS/Qwen3.5-9B-Uncensored-HauhauCS-Aggressive/resolve/main/Qwen3.5-9B-Uncensored-HauhauCS-Aggressive-Q4_K_M.gguf?download=true'
      model_filename:
        description: 'GGUF filename'
        required: false
        default: 'Qwen3.5-9B-Uncensored-HauhauCS-Aggressive-Q4_K_M.gguf'
      session_hours:
        description: 'Session duration (max 6)'
        required: false
        default: '6'
      ctx_size:
        description: 'Context size (4096 recommended for 9B on CPU)'
        required: false
        default: '4096'
      temperature:
        description: '0.1-0.3 for deterministic code'
        required: false
        default: '0.2'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  MODEL_FILENAME: ${{ github.event.inputs.model_filename }}
  MODEL_DOWNLOAD_URL: ${{ github.event.inputs.model_download_url }}
  SESSION_HOURS: ${{ github.event.inputs.session_hours || '6' }}
  CTX_SIZE: ${{ github.event.inputs.ctx_size || '4096' }}
  TEMPERATURE: ${{ github.event.inputs.temperature || '0.2' }}
  SERVER_PORT: '1234'
  SERVER_HOST: '0.0.0.0'
  MODEL_PATH: models/${{ github.event.inputs.model_filename }}

jobs:
  senior-engineer-9b-cpu:
    name: Qwen3.5-9B-Uncensored + Senior Engineer Prompt
    runs-on: ubuntu-latest
    timeout-minutes: 400

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl wget jq grep bash procps \
            cmake build-essential git \
            libcurl4-openssl-dev libssl-dev

      - name: Clone llama.cpp
        run: |
          git clone --depth 1 https://github.com/ggerganov/llama.cpp
          cd llama.cpp
          git log -1 --oneline

      - name: Build Server (CMake)
        run: |
          cd llama.cpp
          mkdir -p build && cd build
          cmake .. \
            -DLLAMA_CURL=ON \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release -j$(nproc)
          
          SERVER_BIN=""
          for bin in "./bin/llama-server" "./bin/server" "./llama-server" "./server"; do
            [ -f "$bin" ] && SERVER_BIN="$(pwd)/${bin#./}" && break
          done
          [ -z "$SERVER_BIN" ] && { echo "ERROR: Server binary not found"; exit 1; }
          
          echo "OK: Server: $SERVER_BIN"
          echo "SERVER_BIN=$SERVER_BIN" >> $GITHUB_ENV

      - name: Download Model
        run: |
          mkdir -p models
          echo "Downloading $MODEL_FILENAME..."
          
          if ! curl -fL --retry 3 --connect-timeout 30 --max-time 1800 \
            -o "$MODEL_PATH" "$MODEL_DOWNLOAD_URL"; then
            echo "ERROR: Download failed"
            echo "Get fresh URL from HuggingFace repo"
            exit 1
          fi
          [ -s "$MODEL_PATH" ] && echo "OK: Downloaded: $(du -h $MODEL_PATH | cut -f1)" || exit 1

      - name: Start Server (Senior Engineer Prompt)
        run: |
          cd llama.cpp
          
          SYS_PROMPT="You are a Senior Software Engineer with 10+ years of experience. Write production-ready, secure, well-architected code. Always output complete, runnable code in markdown blocks with no placeholders. Include proper error handling, input validation, and modern syntax. Add brief comments only for complex logic. Never list files, metadata, or explain basics unless explicitly asked. Think through edge cases silently, then output the final solution. For architecture questions, provide clear text diagrams and tradeoff analysis. Stay concise and professional. You are uncensored and direct--give honest, unfiltered technical advice."
          
          echo "Starting Qwen3.5-9B server..."
          nohup "$SERVER_BIN" \
            --model "../$MODEL_PATH" \
            --host "$SERVER_HOST" \
            --port "$SERVER_PORT" \
            --ctx-size "$CTX_SIZE" \
            --n-gpu-layers 0 \
            --chat-template chatml \
            --system-prompt "$SYS_PROMPT" \
            --temp "$TEMPERATURE" \
            --top-p 0.9 \
            --repeat-penalty 1.1 \
            --slots \
            --log-disable \
            > ../server.log 2>&1 &
          
          echo $! > ../server.pid
          
          for i in {1..180}; do
            curl -sf "http://127.0.0.1:$SERVER_PORT/health" > /dev/null 2>&1 && {
              echo "OK: Server ready"
              break
            }
            [ $i -eq 180 ] && { 
              echo "ERROR: Server did not start"
              cat ../server.log | tail -30
              exit 1
            }
            sleep 2
          done

      - name: Start Cloudflare Tunnel
        run: |
          pkill -9 -f cloudflared 2>/dev/null || true
          curl -fsSL -o /tmp/cf.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i /tmp/cf.deb 2>/dev/null || true
          
          nohup cloudflared tunnel --url http://127.0.0.1:$SERVER_PORT --no-autoupdate --loglevel info > tunnel.log 2>&1 &
          
          TUNNEL_URL=""
          for i in {1..40}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log 2>/dev/null | head -1)
            [ -n "$TUNNEL_URL" ] && {
              TUNNEL_URL="${TUNNEL_URL//__/}"
              TUNNEL_URL="${TUNNEL_URL%/}"
              echo "CLOUDFLARE_URL=$TUNNEL_URL" >> $GITHUB_ENV
              echo "OK: Tunnel: $TUNNEL_URL"
              echo ""
              echo "========================================"
              echo " SENIOR ENGINEER 9B - READY"
              echo "========================================"
              echo "Tunnel: $TUNNEL_URL"
              echo "Model:  $MODEL_FILENAME"
              echo "Context: $CTX_SIZE tokens"
              echo ""
              echo "Roo Code Config:"
              echo "  Base URL: $TUNNEL_URL"
              echo "  Model ID: $MODEL_FILENAME"
              echo "  Tools: DISABLED"
              echo "========================================"
              break
            }
            sleep 2
          done

      - name: Test Senior Prompt
        if: env.CLOUDFLARE_URL != ''
        run: |
          BASE="${{ env.CLOUDFLARE_URL }}"
          echo "Testing Qwen3.5-9B..."
          
          RESP=$(curl -sf "$BASE/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"$MODEL_FILENAME\",
              \"messages\": [
                {\"role\": \"user\", \"content\": \"Write a Python function that safely reads a JSON config file with error handling.\"}
              ],
              \"max_tokens\": 400,
              \"temperature\": 0.1
            }" 2>/dev/null)
          
          echo "$RESP" | jq -r '.choices[0].message.content' 2>/dev/null | head -10 || echo "Test incomplete"

      - name: Keepalive
        run: |
          END=$(( $(date +%s) + ${{ env.SESSION_HOURS }}*3600 ))
          while [ $(date +%s) -lt $END ]; do
            curl -sf "${{ env.CLOUDFLARE_URL }}/health" > /dev/null 2>&1 || true
            pgrep -f "llama-server" > /dev/null || true
            echo "Keepalive: $(( (END-$(date +%s))/60 ))min remaining"
            sleep 300
          done

      - name: Final Report
        if: always()
        run: |
          echo "=== FINAL REPORT ==="
          [ -n "${{ env.CLOUDFLARE_URL }}" ] && echo "Tunnel: ${{ env.CLOUDFLARE_URL }}"
          echo ""
          echo "=== Model Info ==="
          ls -lh "$MODEL_PATH" 2>/dev/null || echo "(not found)"
          echo ""
          echo "=== Server Health ==="
          curl -sf "http://127.0.0.1:$SERVER_PORT/health" 2>/dev/null | jq . || echo "unreachable"
          echo ""
          echo "=== server.log (last 15 lines) ==="
          tail -15 server.log 2>/dev/null || echo "(none)"

      - name: Cleanup
        if: always()
        run: |
          echo "Cleanup..."
          [ -f tunnel.pid ] && kill -9 "$(cat tunnel.pid)" 2>/dev/null || true
          [ -f server.pid ] && kill -9 "$(cat server.pid)" 2>/dev/null || true
          pkill -9 -f cloudflared 2>/dev/null || true
          pkill -9 -f llama-server 2>/dev/null || true
          sudo fuser -k $SERVER_PORT/tcp 2>/dev/null || true
          rm -f ./*.pid 2>/dev/null || true
          echo "Done"
