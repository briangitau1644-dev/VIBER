                },
                "required": ["query"]
            }
        }
    },
    {
        "type": "function",
        "function": {
            "name": "get_weather",
            "description": "Get weather information for a location (simulated).",
            "parameters": {
                "type": "object",
                "properties": {
                    "location": {"type": "string", "description": "City or location name"}
                },
                "required": ["location"]
            }
        }
    },
]

# Anthropic-compatible format
ANTHROPIC_TOOLS = [
    {
        "name": t["function"]["name"],
        "description": t["function"]["description"],
        "input_schema": t["function"]["parameters"],
    }
    for t in TOOL_DEFINITIONS
]

# ─────────────────────────────────────────────────────────────────────────────
# TOOL EXECUTOR
# ─────────────────────────────────────────────────────────────────────────────

class ToolExecutor:
    """Execute built-in tools and return JSON results"""
    
    @staticmethod
    def execute(name: str, arguments: Dict[str, Any]) -> str:
        try:
            fn = getattr(ToolExecutor, f"_{name}", None)
            if fn is None:
                return json.dumps({"error": f"Unknown tool: {name}"})
            result = fn(**arguments)
            return json.dumps(result, ensure_ascii=False, default=str)
        except TypeError as e:
            return json.dumps({"error": f"Invalid arguments: {e}"})
        except Exception as e:
            return json.dumps({"error": f"{type(e).__name__}: {e}"})
    
    @staticmethod
    def _get_current_time() -> Dict[str, str]:
        return {"timestamp": datetime.now().isoformat(), "timezone": "UTC"}
    
    @staticmethod
    def _calculate(expression: str) -> Dict[str, Any]:
        try:
            # Safe evaluation with limited operators
            allowed = set("0123456789+-*/().% ")
            if not all(c in allowed for c in expression):
                return {"error": "Invalid characters in expression"}
            result = eval(expression, {"__builtins__": {}}, {})
            return {"expression": expression, "result": result}
        except Exception as e:
            return {"error": f"Calculation failed: {e}"}
    
    @staticmethod
    def _search_web(query: str) -> Dict[str, Any]:
        # Simulated search - in production, integrate with actual search API
        return {
            "query": query,
            "results": [
                {"title": f"Result for '{query}'", "snippet": "This is a simulated search result.", "url": "https://example.com"}
            ],
            "note": "Web search is simulated in this demo environment"
        }
    
    @staticmethod
    def _get_weather(location: str) -> Dict[str, Any]:
        # Simulated weather
        import random
        return {
            "location": location,
            "temperature_c": random.randint(-10, 35),
            "condition": random.choice(["sunny", "cloudy", "rainy", "partly cloudy"]),
            "note": "Weather data is simulated in this demo environment"
        }

tool_executor = ToolExecutor()

# ─────────────────────────────────────────────────────────────────────────────
# RESOURCE KEEP-ALIVE (CPU-Optimized for GitHub Actions)
# ─────────────────────────────────────────────────────────────────────────────

_ram_buffer = None

def _ram_pressure_thread():
    """Maintain RAM pressure to prevent runner suspension"""
    global _ram_buffer
    if not RAM_PRESSURE_ENABLED or RAM_PRESSURE_MB <= 0:
        log("💾 RAM pressure disabled")
        return
    
    log(f"💾 Allocating {RAM_PRESSURE_MB} MB RAM pressure...")
    try:
        _ram_buffer = bytearray(RAM_PRESSURE_MB * 1024 * 1024)
        # Touch memory pages to ensure allocation
        for i in range(0, len(_ram_buffer), 4096):
            _ram_buffer[i] = 1
        log(f"✅ Reserved {RAM_PRESSURE_MB} MB")
    except MemoryError:
        log(f"⚠️ Could not reserve {RAM_PRESSURE_MB} MB")
    
    while True:
        if _ram_buffer:
            _ram_buffer[0] = 1
            _ram_buffer[-1] = 1
        time.sleep(30)

def _activity_logger():
    """Log system activity periodically"""
    import psutil
    while True:
        try:
            ram = psutil.virtual_memory()
            cpu = psutil.cpu_percent(interval=0.5)
            disk = psutil.disk_usage('/')
            log(f"📊 Resources | CPU: {cpu}% | RAM: {ram.percent}% | Disk: {disk.percent}%")
        except Exception as e:
            log(f"⚠️ Logger error: {e}")
        time.sleep(ACTIVITY_LOG_INTERVAL)

def _ollama_keepalive():
    """Keep Ollama model loaded with periodic pings"""
    session = requests.Session()
    session.headers.update({"Connection": "keep-alive"})
    
    log(f"⚡ Starting Ollama keepalive (every {KEEPALIVE_INTERVAL}s)...")
    
    while True:
        try:
            resp = session.post(
                f"{OLLAMA_BASE}/api/generate",
                json={
                    "model": MODEL,
                    "prompt": ".",
                    "keep_alive": -1,
                    "stream": False,
                    "options": {"num_predict": 1, "temperature": 0}
                },
                timeout=(5, 20)
            )
            if resp.status_code == 200:
                log(f"💓 Model keepalive OK @ {datetime.now().strftime('%H:%M:%S')}")
            else:
                log(f"⚠️ Model ping failed: HTTP {resp.status_code}")
        except requests.exceptions.Timeout:
            log("⚠️ Keepalive timeout - model may be busy")
        except Exception as e:
            log(f"⚠️ Keepalive error: {e}")
        
        # Add jitter to avoid thundering herd
        time.sleep(KEEPALIVE_INTERVAL + random.uniform(-1, 1))

def _start_background_threads():
    """Start all maintenance threads"""
    threads = []
    
    # RAM pressure
    t = threading.Thread(target=_ram_pressure_thread, daemon=True, name="ram_pressure")
    t.start()
    threads.append(t)
    
    # Activity logger
    t = threading.Thread(target=_activity_logger, daemon=True, name="activity_logger")
    t.start()
    threads.append(t)
    
    # Ollama keepalive
    t = threading.Thread(target=_ollama_keepalive, daemon=True, name="ollama_keepalive")
    t.start()
    threads.append(t)
    
    log(f"✅ Started {len(threads)} background threads")
    return threads

# ─────────────────────────────────────────────────────────────────────────────
# TOOL CALLING FORMAT CONVERSION (OpenAI ↔ Ollama ↔ Anthropic)
# ─────────────────────────────────────────────────────────────────────────────

def _normalize_tool_params(params: Optional[Dict]) -> Dict:
    """Ensure tool parameters have valid JSON Schema structure"""
    if not params or not isinstance(params, dict):
        return {"type": "object", "properties": {}}
    if "type" not in params:
        return {**params, "type": "object"}
    return params

def _oai_tools_to_ollama(tools: Optional[List[Dict]]) -> Optional[List[Dict]]:
    """Convert OpenAI tool format to Ollama format"""
    if tools is None:
        return None
    
    result = []
    for tool in tools:
        if tool.get("type") != "function":
            continue
        fn = tool.get("function", {})
        result.append({
            "type": "function",
            "function": {
                "name": fn.get("name", ""),
                "description": fn.get("description", ""),
                "parameters": _normalize_tool_params(fn.get("parameters"))
            }
        })
    return result if result else None

def _anthropic_tools_to_ollama(tools: Optional[List[Dict]]) -> Optional[List[Dict]]:
    """Convert Anthropic tool format to Ollama format"""
    if tools is None:
        return None
    
    result = []
    for tool in tools:
        result.append({
            "type": "function",
            "function": {
                "name": tool.get("name", ""),
                "description": tool.get("description", ""),
                "parameters": _normalize_tool_params(tool.get("input_schema"))
            }
        })
    return result if result else None

def _oai_messages_to_ollama(messages: List[Dict]) -> List[Dict]:
    """Convert OpenAI message format to Ollama format"""
    result = []
    for msg in messages:
        role = msg.get("role", "")
        content = msg.get("content") or ""
        
        # Handle content as list (multimodal)
        if isinstance(content, list):
            parts = []
            for block in content:
                if isinstance(block, dict):
                    if block.get("type") == "text":
                        parts.append(block.get("text", ""))
                    elif block.get("type") == "tool_result":
                        c = block.get("content", "")
                        if isinstance(c, list):
                            c = "\n".join(x.get("text", "") for x in c if isinstance(x, dict))
                        parts.append(str(c))
                else:
                    parts.append(str(block))
            content = "\n".join(parts)
        
        if role == "system":
            result.append({"role": "system", "content": content})
        elif role == "user":
            result.append({"role": "user", "content": content})
        elif role == "assistant":
            oai_msg = {"role": "assistant", "content": content}
            # Convert tool_calls
            tool_calls = msg.get("tool_calls")
            if tool_calls:
                ollama_tcs = []
                for tc in tool_calls:
                    fn = tc.get("function", {})
                    args = fn.get("arguments", "{}")
                    if isinstance(args, str):
                        try:
                            args = json.loads(args)
                        except:
                            args = {}
                    ollama_tcs.append({
                        "function": {
                            "name": fn.get("name", ""),
                            "arguments": args
                        }
                    })
                oai_msg["tool_calls"] = ollama_tcs
            result.append(oai_msg)
        elif role == "tool":
            # FIX: Include tool_call_id for proper association
            tool_msg = {"role": "tool", "content": str(content)}
            if msg.get("tool_call_id"):
                tool_msg["tool_call_id"] = msg["tool_call_id"]
            result.append(tool_msg)
    
    return result

def _ollama_tool_calls_to_oai(ollama_tcs: List[Dict]) -> List[Dict]:
    """Convert Ollama tool_calls to OpenAI format"""
    result = []
    for tc in ollama_tcs:
        fn = tc.get("function", {})
        args = fn.get("arguments", {})
        args_str = json.dumps(args) if isinstance(args, dict) else str(args)
        result.append({
            "id": f"call_{uuid.uuid4().hex[:8]}",
            "type": "function",
            "function": {
                "name": fn.get("name", ""),
                "arguments": args_str
            }
        })
    return result

# ─────────────────────────────────────────────────────────────────────────────
# OLLAMA COMMUNICATION
# ─────────────────────────────────────────────────────────────────────────────

def _make_ollama_session() -> requests.Session:
    """Create resilient HTTP session for Ollama"""
    from requests.adapters import HTTPAdapter
    from urllib3.util.retry import Retry
    
    session = requests.Session()
    retry = Retry(
        total=3,
        backoff_factor=0.5,
        status_forcelist=[500, 502, 503, 504, 429],
        allowed_methods=["GET", "POST"]
    )
    adapter = HTTPAdapter(max_retries=retry, pool_connections=50, pool_maxsize=50)
    session.mount("http://", adapter)
    session.headers.update({
        "Connection": "keep-alive",
        "Keep-Alive": "timeout=300, max=100"
    })
    return session

ollama_session = _make_ollama_session()

def _ollama_chat_sync(
    messages: List[Dict],
    tools: Optional[List[Dict]] = None,
    max_tokens: int = 2048,
    temperature: float = 0.7
) -> Dict:
    """Synchronous chat call to Ollama"""
    payload = {
        "model": MODEL,
        "stream": False,
        "keep_alive": -1,
        "messages": _oai_messages_to_ollama(messages),
        "options": {"num_predict": max_tokens, "temperature": temperature}
    }
    
    if tools is not None:
        payload["tools"] = _oai_tools_to_ollama(tools)
    
    try:
        resp = ollama_session.post(
            f"{OLLAMA_BASE}/api/chat",
            json=payload,
            timeout=(10, 300)
        )
        resp.raise_for_status()
        return resp.json()
    except requests.exceptions.Timeout:
        raise HTTPException(504, "Ollama timed out")
    except requests.exceptions.RequestException as e:
        raise HTTPException(503, f"Ollama error: {e}")

def _ollama_chat_stream(
    messages: List[Dict],
    tools: Optional[List[Dict]] = None,
    max_tokens: int = 2048,
    temperature: float = 0.7
):
    """Streaming chat call to Ollama"""
    payload = {
        "model": MODEL,
        "stream": True,
        "keep_alive": -1,
        "messages": _oai_messages_to_ollama(messages),
        "options": {"num_predict": max_tokens, "temperature": temperature}
    }
    
    if tools is not None:
        payload["tools"] = _oai_tools_to_ollama(tools)
    
    return ollama_session.post(
        f"{OLLAMA_BASE}/api/chat",
        json=payload,
        stream=True,
        timeout=(10, 300)
    )

# ─────────────────────────────────────────────────────────────────────────────
# STREAMING RESPONSE GENERATORS
# ─────────────────────────────────────────────────────────────────────────────

def _generate_openai_stream(
    messages: List[Dict],
    tools: Optional[List[Dict]],
    max_tokens: int,
    temperature: float
):
    """Generate OpenAI-compatible SSE stream"""
    yield ": stream-start\n\n"
    
    try:
        resp = _ollama_chat_stream(messages, tools, max_tokens, temperature)
    except Exception as e:
        yield f"data: {json.dumps({'error': str(e)})}\n\n"
        yield "data: [DONE]\n\n"
        return
    
    last_ping = time.time()
    heartbeat_interval = 15
    
    try:
        for line in resp.iter_lines():
            if not line:
                continue
            
            # Send heartbeat to prevent connection timeout
            if time.time() - last_ping > heartbeat_interval:
                yield ": keep-alive\n\n"
                last_ping = time.time()
            
            try:
                chunk = json.loads(line)
            except json.JSONDecodeError:
                continue
            
            msg = chunk.get("message", {})
            content = msg.get("content", "")
            done = chunk.get("done", False)
            
            # Build OpenAI chunk
            delta = {"content": content} if content else {}
            
            # Handle tool_calls in final chunk
            if done and msg.get("tool_calls"):
                oai_tcs = _ollama_tool_calls_to_oai(msg["tool_calls"])
                # Yield tool_calls chunk
                tool_chunk = {
                    "id": f"chatcmpl-{uuid.uuid4().hex[:8]}",
                    "object": "chat.completion.chunk",
                    "created": int(time.time()),
                    "model": MODEL,
                    "choices": [{
                        "index": 0,
                        "delta": {"tool_calls": oai_tcs},
                        "finish_reason": None
                    }]
                }
                yield f"data: {json.dumps(tool_chunk)}\n\n"
                
                # Yield finish chunk
                finish_chunk = {
                    "id": f"chatcmpl-{uuid.uuid4().hex[:8]}",
                    "object": "chat.completion.chunk",
                    "created": int(time.time()),
                    "model": MODEL,
                    "choices": [{
                        "index": 0,
                        "delta": {},
                        "finish_reason": "tool_calls"
                    }]
                }
                yield f"data: {json.dumps(finish_chunk)}\n\n"
                yield "data: [DONE]\n\n"
                return
            
            # Regular content chunk
            oai_chunk = {
                "id": f"chatcmpl-{uuid.uuid4().hex[:8]}",
                "object": "chat.completion.chunk",
                "created": int(time.time()),
                "model": MODEL,
                "choices": [{
                    "index": 0,
                    "delta": delta,
                    "finish_reason": "stop" if done else None
                }]
            }
            yield f"data: {json.dumps(oai_chunk)}\n\n"
            
            if done:
                yield "data: [DONE]\n\n"
                return
                
    except Exception as e:
        yield f"data: {json.dumps({'error': f'Stream error: {e}'})}\n\n"
        yield "data: [DONE]\n\n"

def _generate_anthropic_stream(
    messages: List[Dict],
    tools: Optional[List[Dict]],
    max_tokens: int,
    temperature: float
):
    """Generate Anthropic-compatible SSE stream"""
    msg_id = f"msg_{uuid.uuid4().hex[:8]}"
    
    # Message start
    yield "event: message_start\ndata: "
    yield json.dumps({
        "type": "message_start",
        "message": {
            "id": msg_id,
            "type": "message",
            "role": "assistant",
            "content": [],
            "model": MODEL,
            "stop_reason": None,
            "usage": {"input_tokens": 0, "output_tokens": 0}
        }
    }) + "\n\n"
    
    # Content block start
    yield "event: content_block_start\ndata: "
    yield json.dumps({
        "type": "content_block_start",
        "index": 0,
        "content_block": {"type": "text", "text": ""}
    }) + "\n\n"
    
    try:
        resp = _ollama_chat_stream(messages, tools, max_tokens, temperature)
    except Exception as e:
        yield f"event: error\ndata: {json.dumps({'type': 'error', 'error': {'message': str(e)}})}\n\n"
        return
    
    last_ping = time.time()
    
    try:
        for line in resp.iter_lines():
            if not line:
                continue
            
            if time.time() - last_ping > 15:
                yield "event: ping\ndata: {\"type\":\"ping\"}\n\n"
                last_ping = time.time()
            
            try:
                chunk = json.loads(line)
            except:
                continue
            
            msg = chunk.get("message", {})
            content = msg.get("content", "")
            done = chunk.get("done", False)
            
            if content:
                yield "event: content_block_delta\ndata: "
                yield json.dumps({
                    "type": "content_block_delta",
                    "index": 0,
                    "delta": {"type": "text_delta", "text": content}
                }) + "\n\n"
            
            if done:
                # Content block stop
                yield "event: content_block_stop\ndata: "
                yield json.dumps({"type": "content_block_stop", "index": 0}) + "\n\n"
                
                # Handle tool calls
                stop_reason = "end_turn"
                if msg.get("tool_calls"):
                    stop_reason = "tool_use"
                    for idx, tc in enumerate(msg["tool_calls"], 1):
                        fn = tc.get("function", {})
                        args = fn.get("arguments", {})
                        tu_id = f"toolu_{uuid.uuid4().hex[:8]}"
                        
                        # Tool use block start
                        yield "event: content_block_start\ndata: "
                        yield json.dumps({
                            "type": "content_block_start",
                            "index": idx,
                            "content_block": {
                                "type": "tool_use",
                                "id": tu_id,
                                "name": fn.get("name", ""),
                                "input": {}
                            }
                        }) + "\n\n"
                        
                        # Tool input delta
                        yield "event: content_block_delta\ndata: "
                        yield json.dumps({
                            "type": "content_block_delta",
                            "index": idx,
                            "delta": {
                                "type": "input_json_delta",
                                "partial_json": json.dumps(args if isinstance(args, dict) else {})
                            }
                        }) + "\n\n"
                        
                        # Tool block stop
                        yield "event: content_block_stop\ndata: "
                        yield json.dumps({"type": "content_block_stop", "index": idx}) + "\n\n"
                
                # Message delta
                yield "event: message_delta\ndata: "
                yield json.dumps({
                    "type": "message_delta",
                    "delta": {"stop_reason": stop_reason, "stop_sequence": None},
                    "usage": {"output_tokens": 0}
                }) + "\n\n"
                
                # Message stop
                yield "event: message_stop\ndata: "
                yield json.dumps({"type": "message_stop"}) + "\n\n"
                return
                
    except Exception as e:
        yield f"event: error\ndata: {json.dumps({'type': 'error', 'error': {'message': str(e)}})}\n\n"

