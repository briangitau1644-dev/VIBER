# .github/workflows/ollama-proxy.yml
name: Ollama Proxy - 6 Hour Session

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Ollama model to use'
        required: false
        default: 'sorc/qwen3.5-claude-4.6-opus:4b'
      enable_ram_pressure:
        description: 'Enable RAM pressure'
        required: false
        default: 'true'

env:
  MODEL: ${{ github.event.inputs.model || 'sorc/qwen3.5-claude-4.6-opus:4b' }}
  GPU_BUSY_ENABLED: 'false'  # No GPU on GitHub Actions
  RAM_PRESSURE_ENABLED: ${{ github.event.inputs.enable_ram_pressure || 'true' }}
  RAM_PRESSURE_MB: '256'
  ACTIVITY_LOG_INTERVAL: '30'
  KEEPALIVE_INTERVAL: '10'
  PROXY_PORT: '8000'
  OLLAMA_PORT: '11434'
  SESSION_DURATION: 21600

jobs:
  ollama-proxy:
    name: Ollama Proxy (6h CPU)
    runs-on: ubuntu-latest
    timeout-minutes: 400
    
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget lsof net-tools

      - name: 📥 Python Dependencies (FIXED)
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn[standard] requests pydantic starlette psutil numpy
          pip install torch --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple
          pip list | grep -E "fastapi|torch|psutil"

      - name: 📥 Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: 📥 Install Cloudflared
        run: |
          curl -fsSL -o /tmp/cf.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i /tmp/cf.deb

      - name: 🚀 Start Ollama
        run: |
          export OLLAMA_HOST="127.0.0.1:${{ env.OLLAMA_PORT }}"
          nohup ollama serve > ollama.log 2>&1 &
          echo $! > ollama.pid
          for i in {1..30}; do
            curl -s http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/tags > /dev/null && break
            sleep 2
          done
          ollama pull ${{ env.MODEL }}

      - name: 📝 Create Proxy Script
        run: |
          cat > proxy_server.py << 'EOF'
#!/usr/bin/env python3
import os, sys, json, time, threading, random, subprocess, requests
from datetime import datetime
from fastapi import FastAPI, Request, HTTPException
from fastapi.middleware.cors import CORSMiddleware
from fastapi.responses import StreamingResponse, JSONResponse
import uvicorn

MODEL = os.getenv('MODEL', 'sorc/qwen3.5-claude-4.6-opus:4b')
OLLAMA_BASE = f"http://127.0.0.1:{os.getenv('OLLAMA_PORT', '11434')}"
PROXY_PORT = int(os.getenv('PROXY_PORT', '8000'))
RAM_PRESSURE_ENABLED = os.getenv('RAM_PRESSURE_ENABLED', 'true').lower() == 'true'
RAM_PRESSURE_MB = int(os.getenv('RAM_PRESSURE_MB', '256'))
ACTIVITY_LOG_INTERVAL = float(os.getenv('ACTIVITY_LOG_INTERVAL', '30'))
KEEPALIVE_INTERVAL = float(os.getenv('KEEPALIVE_INTERVAL', '10'))

def log(msg): print(f"[{datetime.now().strftime('%H:%M:%S')}] {msg}", flush=True)

_ram_buffer = None
def ram_pressure():
    global _ram_buffer
    if not RAM_PRESSURE_ENABLED: return
    try:
        _ram_buffer = bytearray(RAM_PRESSURE_MB * 1024 * 1024)
        log(f"💾 Reserved {RAM_PRESSURE_MB} MB RAM")
    except: pass
    while True:
        if _ram_buffer: _ram_buffer[0] = _ram_buffer[-1] = 1
        time.sleep(30)

def activity_logger():
    import psutil
    while True:
        try:
            ram = psutil.virtual_memory()
            cpu = psutil.cpu_percent(interval=0.5)
            log(f"📊 RAM: {ram.percent}% | CPU: {cpu}%")
        except: pass
        time.sleep(ACTIVITY_LOG_INTERVAL)

def ollama_keepalive():
    session = requests.Session()
    while True:
        try:
            r = session.post(f"{OLLAMA_BASE}/api/generate", 
                json={"model": MODEL, "prompt": ".", "keep_alive": -1, "stream": False, "options": {"num_predict": 1}},
                timeout=(5, 20))
            if r.status_code == 200: log(f"💓 Model ping OK")
        except Exception as e: log(f"⚠️ Keepalive: {e}")
        time.sleep(KEEPALIVE_INTERVAL)

def start_threads():
    for fn, name in [(ram_pressure, "ram"), (activity_logger, "logger"), (ollama_keepalive, "keepalive")]:
        threading.Thread(target=fn, daemon=True, name=name).start()
    log("✅ Background threads started")

app = FastAPI(title="Ollama Proxy")
app.add_middleware(CORSMiddleware, allow_origins=["*"], allow_methods=["*"], allow_headers=["*"])
ollama_session = requests.Session()

@app.get("/")
async def root(): return {"service": "Ollama Proxy", "model": MODEL, "status": "running"}

@app.get("/health")
async def health():
    try:
        r = ollama_session.get(f"{OLLAMA_BASE}/api/tags", timeout=3)
        if r.status_code == 200:
            models = [m.get("name") for m in r.json().get("models", [])]
            return {"status": "ready", "model": MODEL, "loaded": MODEL in models}
    except: pass
    return {"status": "down"}

@app.post("/v1/chat/completions")
async def chat(request: Request):
    try: body = await request.json()
    except: raise HTTPException(400, "Invalid JSON")
    messages, stream = body.get("messages", []), body.get("stream", False)
    try:
        resp = ollama_session.post(f"{OLLAMA_BASE}/api/chat",
            json={"model": MODEL, "messages": messages, "stream": stream, "keep_alive": -1},
            timeout=(10, 300), stream=stream)
        if stream:
            return StreamingResponse((c for c in resp.iter_content(1024) if c), media_type="text/event-stream")
        return JSONResponse(content=resp.json())
    except Exception as e: raise HTTPException(503, f"Ollama: {e}")

@app.get("/v1/models")
async def models():
    try:
        r = ollama_session.get(f"{OLLAMA_BASE}/api/tags", timeout=5)
        if r.status_code == 200:
            return {"object": "list", "data": [{"id": m.get("name"), "object": "model"} for m in r.json().get("models", [])]}
    except: pass
    return {"object": "list", "data": []}

if __name__ == "__main__":
    log("🚀 Ollama Proxy Starting...")
    start_threads()
    uvicorn.run(app, host="0.0.0.0", port=PROXY_PORT, log_level="warning")
EOF
          chmod +x proxy_server.py

      - name: 🚀 Start Proxy
        run: |
          sudo fuser -k ${{ env.PROXY_PORT }}/tcp 2>/dev/null || true
          nohup python3 proxy_server.py > proxy.log 2>&1 &
          echo $! > proxy.pid
          for i in {1..20}; do
            curl -s http://127.0.0.1:${{ env.PROXY_PORT }}/health > /dev/null && break
            sleep 3
          done
          curl -s http://127.0.0.1:${{ env.PROXY_PORT }}/health | python3 -m json.tool

      - name: ⏱️ 6-Hour Pulser
        run: |
          START=$(date +%s); END=$((START + ${{ env.SESSION_DURATION }}))
          while [ $(date +%s) -lt $END ]; do
            ELAPSED=$(($(date +%s) - START)); REMAINING=$((END - $(date +%s)))
            echo "⏰ $(date '+%H:%M:%S') | Elapsed: $((ELAPSED/60))m | Remaining: $((REMAINING/3600))h$((REMAINING%3600/60))m"
            curl -s http://127.0.0.1:${{ env.PROXY_PORT }}/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'🏥 Proxy: {d.get(\"status\")}')" 2>/dev/null || echo "🏥 Proxy: down"
            tail -n 5 proxy.log 2>/dev/null | sed 's/^/📝 /'
            sleep 300
          done
          echo "🏁 Session complete!"

      - name: 🛑 Cleanup
        if: always()
        run: |
          [ -f proxy.pid ] && kill -9 $(cat proxy.pid) 2>/dev/null || true
          [ -f ollama.pid ] && kill -9 $(cat ollama.pid) 2>/dev/null || true
          sudo fuser -k ${{ env.PROXY_PORT }}/tcp ${{ env.OLLAMA_PORT }}/tcp 2>/dev/null || true
