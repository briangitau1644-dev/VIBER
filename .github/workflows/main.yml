name: Host Gemma 4 E4B for Roo Code
on:
  workflow_dispatch:

jobs:
  host-gemma:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ollama
        run: |
          # Install Ollama using official script
          curl -fsSL https://ollama.com/install.sh | sh
          
          # Start Ollama service
          sudo systemctl start ollama
          
          # Wait for Ollama to be ready
          echo "Waiting for Ollama to start..."
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✓ Ollama is ready!"
              break
            fi
            echo "Attempt $i/30 - Ollama starting..."
            sleep 3
          done
          
          ollama --version

      - name: Pull Gemma 4 E4B Model
        run: |
          echo "=========================================="
          echo "Pulling gemma4:e4b model (~9.6GB)..."
          echo "This will take 15-30 minutes"
          echo "=========================================="
          
          ollama pull gemma4:e4b
          
          echo "✓ Model pull complete!"

      - name: Start Gemma 4 E4B Model
        run: |
          echo "Starting gemma4:e4b model..."
          
          # Start Ollama server with CORS and all origins allowed
          export OLLAMA_ORIGINS="*"
          export OLLAMA_HOST="0.0.0.0"
          
          # Run the model
          ollama run gemma4:e4b &
          
          # Wait for model to load
          sleep 20
          
          # Verify model is working
          echo "Testing model locally..."
          curl -X POST http://localhost:11434/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gemma4:e4b",
              "messages": [{"role": "user", "content": "Say OK"}],
              "max_tokens": 5
            }'
          
          echo "✓ Model is running"

      - name: Install Cloudflared
        run: |
          # Install cloudflared
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Start Cloudflare Tunnel
        run: |
          echo "=========================================="
          echo "Starting Cloudflare tunnel..."
          echo "=========================================="
          
          # Start tunnel
          cloudflared tunnel --url http://localhost:11434 --no-autoupdate 2>&1 | tee cloudflared.log &
          
          # Wait for tunnel
          sleep 15
          
          # Extract tunnel URL
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
          
          if [ -n "$TUNNEL_URL" ]; then
            echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
            echo "✓ Tunnel URL: $TUNNEL_URL"
          fi

      - name: Display Connection Info
        run: |
          echo "=========================================="
          echo "✅ GEMMA 4 E4B IS READY!"
          echo "=========================================="
          echo ""
          echo "🌐 TUNNEL URL: $TUNNEL_URL"
          echo ""
          echo "🔧 ROO CODE SETUP (DO NOT USE PROXY):"
          echo ""
          echo "1. OPEN Roo Code Settings"
          echo "2. Go to 'API Configuration'"
          echo "3. Select Provider: 'OpenAI Compatible' (NOT proxy)"
          echo "4. Configure:"
          echo "   - API URL: $TUNNEL_URL/v1"
          echo "   - Model ID: gemma4:e4b"
          echo "   - API Key: (leave empty or type 'ollama')"
          echo ""
          echo "OR use this exact URL:"
          echo "   $TUNNEL_URL/v1/chat/completions"
          echo ""
          echo "=========================================="
          echo "TEST WITH CURL:"
          echo "curl $TUNNEL_URL/v1/chat/completions \\"
          echo "  -H 'Content-Type: application/json' \\"
          echo "  -d '{\"model\":\"gemma4:e4b\",\"messages\":[{\"role\":\"user\",\"content\":\"Hi\"}]}'"
          echo "=========================================="

      - name: Keep Runner Alive
        run: |
          echo "Keeping runner alive for 6 hours..."
          echo "Tunnel URL will be shown every minute"
          
          while true; do
            if [ -f cloudflared.log ]; then
              URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
              if [ -n "$URL" ]; then
                echo "[$(date '+%H:%M:%S')] Active: $URL/v1"
              fi
            fi
            sleep 60
          done
