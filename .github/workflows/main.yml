# .github/workflows/main.yml
name: Roo Code - Qwen2.5-Coder 7B Server

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  
  # === MODEL CONFIGURATION ===
  # Qwen2.5-Coder-7B-Instruct (Q4_K_M) - Best coding performance for GitHub Actions RAM
  MODEL_URL: 'https://huggingface.co/bartowski/Qwen2.5-Coder-7B-Instruct-GGUF/resolve/main/Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf'
  MODEL_PATH: 'models/Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf'
  MODEL_FILENAME: 'Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf'
  
  # === SERVER CONFIGURATION ===
  SERVER_PORT: '1234'
  PROXY_PORT: '11434'
  
  # === LLAMA.CPP CONFIGURATION ===
  LLAMA_REPO: 'https://github.com/ggml-org/llama.cpp'
  LLAMA_BRANCH: 'master'

jobs:
  qwen-coder-server:
    name: Qwen2.5-Coder-7B for Roo Code
    runs-on: ubuntu-latest
    timeout-minutes: 300
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean environment and ports
        run: |
          pkill -9 -f llama-server 2>/dev/null || true
          pkill -9 -f proxy.py 2>/dev/null || true
          pkill -9 -f cloudflared 2>/dev/null || true
          sudo fuser -k ${{ env.SERVER_PORT }}/tcp 2>/dev/null || true
          sudo fuser -k ${{ env.PROXY_PORT }}/tcp 2>/dev/null || true
          rm -rf llama.cpp build models cloudflared proxy.py tunnel.log

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl wget cmake build-essential python3 python3-pip git \
            libcurl4-openssl-dev libssl-dev

      - name: Build latest llama.cpp from source
        run: |
          echo "🔧 Cloning llama.cpp..."
          git clone --depth 1 --branch "${LLAMA_BRANCH}" "${LLAMA_REPO}"
          cd llama.cpp
          
          echo "🔨 Configuring cmake build..."
          cmake -B build \
            -DLLAMA_CURL=ON \
            -DLLAMA_BUILD_SERVER=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_NATIVE=OFF
          
          echo "⚙️ Building llama-server..."
          cmake --build build --config Release -j$(nproc)
          
          SERVER_BIN=$(find build -name "llama-server" -type f -executable | head -n 1)
          if [ -z "$SERVER_BIN" ]; then
            echo "❌ ERROR: llama-server binary not found!"
            exit 1
          fi
          
          echo "SERVER_BIN=$(realpath $SERVER_BIN)" >> $GITHUB_ENV
          echo "✅ llama-server ready at $(realpath $SERVER_BIN)"

      - name: Download Qwen2.5-Coder 7B GGUF model
        run: |
          mkdir -p models
          echo "📦 Downloading Qwen2.5-Coder-7B (~4.5GB)..."
          curl -fL --retry 3 --retry-delay 10 --connect-timeout 30 --max-time 1200 \
            -o "${MODEL_PATH}" \
            "${MODEL_URL}"
          
          if [ ! -f "${MODEL_PATH}" ]; then
            echo "❌ ERROR: Model download failed!"
            exit 1
          fi
          
          FILE_SIZE=$(stat -c%s "${MODEL_PATH}" 2>/dev/null || echo "unknown")
          echo "✅ Model downloaded: $(numfmt --to=iec-i --suffix=B ${FILE_SIZE} 2>/dev/null || echo ${FILE_SIZE} bytes)"

      - name: Start llama-server with ROO CODE COMPATIBLE settings
        run: |
          echo "🚀 Starting llama-server..."
          
          $SERVER_BIN \
            --model "${MODEL_PATH}" \
            --port ${{ env.SERVER_PORT }} \
            --ctx-size 32768 \
            --threads $(nproc) \
            --chat-template qwen2.5 \
            --n-predict 4096 \
            --batch-size 2048 \
            --ubatch-size 512 \
            --log-disable \
            --no-mmap \
            &
          
          SERVER_PID=$!
          echo "SERVER_PID=${SERVER_PID}" >> $GITHUB_ENV
          
          echo "⏳ Waiting for server initialization..."
          for i in {1..40}; do
            if curl -sf "http://localhost:${{ env.SERVER_PORT }}/health" | grep -qE '"status"|"ok"'; then
              echo "✅ Server is UP and healthy!"
              break
            fi
            [ $i -eq 40 ] && { echo "❌ Server failed to start"; exit 1; }
            sleep 5
          done

      - name: Start OpenAI-compatible proxy wrapper
        run: |
          echo "🔗 Creating proxy with full HTTP method support..."
          
          cat > proxy.py << "EOF"
          #!/usr/bin/env python3
          import http.server
          import urllib.request
          import urllib.parse
          import json
          import os
          
          SERVER_PORT = os.environ.get('SERVER_PORT', '1234')
          PROXY_PORT = int(os.environ.get('PROXY_PORT', '11434'))
          BACKEND_URL = f"http://localhost:{SERVER_PORT}"
          
          SYSTEM_PROMPT = "You are an expert Senior Full-Stack Engineer. Write clean, production-ready code. Include type hints and error handling. No placeholders."
          
          class ProxyHandler(http.server.BaseHTTPRequestHandler):
              protocol_version = 'HTTP/1.1'
              
              def log_message(self, *args):
                  pass
              
              def _cors(self):
                  self.send_header("Access-Control-Allow-Origin", "*")
                  self.send_header("Access-Control-Allow-Methods", "GET, POST, OPTIONS")
                  self.send_header("Access-Control-Allow-Headers", "Content-Type, Authorization, Accept")
          
              def _forward_request(self, method, path, body=None):
                  target_url = f"{BACKEND_URL}{path}"
                  headers = {"Content-Type": "application/json", "Accept": "application/json"}
                  data = body.encode('utf-8') if body else None
                  if data:
                      headers["Content-Length"] = str(len(data))
                  req = urllib.request.Request(target_url, data=data, headers=headers, method=method)
                  try:
                      with urllib.request.urlopen(req, timeout=180) as response:
                          return response.getcode(), response.read(), dict(response.headers)
                  except urllib.error.HTTPError as e:
                      return e.code, e.read(), dict(e.headers)
          
              def _send_response(self, code, body, headers=None):
                  self.send_response(code)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(body)))
                  if headers:
                      for k, v in headers.items():
                          if k.lower() not in ['content-type', 'content-length']:
                              self.send_header(k, v)
                  self._cors()
                  self.end_headers()
                  self.wfile.write(body)
          
              def do_OPTIONS(self):
                  self.send_response(200)
                  self._cors()
                  self.end_headers()
          
              def do_GET(self):
                  path = urllib.parse.urlparse(self.path).path
                  if path == '/' or path == '/health':
                      self._send_response(200, json.dumps({"status": "ok", "model": "qwen2.5-coder-7b"}).encode())
                      return
                  if path == '/v1/models' or path == '/api/tags':
                      self._send_response(200, json.dumps({
                          "object": "list",
                          "data": [{"id": "qwen2.5-coder-7b", "object": "model", "owned_by": "qwen"}]
                      }).encode())
                      return
                  try:
                      code, body, hdrs = self._forward_request('GET', path)
                      self._send_response(code, body, hdrs)
                  except Exception as e:
                      self._send_response(500, json.dumps({"error": str(e)}).encode())
          
              def do_POST(self):
                  try:
                      content_length = int(self.headers.get('Content-Length', 0))
                      body = self.rfile.read(content_length)
                      data = json.loads(body) if body else {}
                      
                      if "messages" in data:
                          has_system = any(m.get("role") == "system" for m in data["messages"])
                          if not has_system:
                              data["messages"].insert(0, {"role": "system", "content": SYSTEM_PROMPT})
                      
                      code, response_body, resp_headers = self._forward_request('POST', self.path, json.dumps(data))
                      self._send_response(code, response_body, resp_headers)
                  except Exception as e:
                      self._send_response(500, json.dumps({"error": str(e)}).encode())
          
          if __name__ == "__main__":
              print(f"Proxy: 0.0.0.0:{PROXY_PORT} -> {BACKEND_URL}", flush=True)
              http.server.HTTPServer(('0.0.0.0', PROXY_PORT), ProxyHandler).serve_forever()
          EOF
          
          chmod +x proxy.py
          python3 proxy.py &
          PROXY_PID=$!
          echo "PROXY_PID=${PROXY_PID}" >> $GITHUB_ENV
          echo "✅ Proxy started with PID: $PROXY_PID"
          sleep 3

      - name: Download and start cloudflared tunnel
        run: |
          echo "🌐 Setting up Cloudflare Tunnel..."
          curl -fL --retry 3 -o cloudflared \
            "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64"
          chmod +x cloudflared
          
          ./cloudflared tunnel --url "http://localhost:${{ env.PROXY_PORT }}" --no-autoupdate > tunnel.log 2>&1 &
          TUNNEL_PID=$!
          echo "TUNNEL_PID=${TUNNEL_PID}" >> $GITHUB_ENV
          
          echo "⏳ Waiting for tunnel URL..."
          PUBLIC_URL=""
          for i in {1..15}; do
            if [ -f tunnel.log ]; then
              PUBLIC_URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' tunnel.log | head -n1) || true
            fi
            if [ -z "$PUBLIC_URL" ]; then
              PUBLIC_URL=$(curl -sf "http://localhost:45678/metrics" 2>/dev/null | grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' | head -n1) || true
            fi
            if [ -n "$PUBLIC_URL" ]; then break; fi
            sleep 3
          done
          
          if [ -n "$PUBLIC_URL" ]; then
            echo "🎉 API URL: ${PUBLIC_URL}"
            echo "PUBLIC_URL=${PUBLIC_URL}" >> $GITHUB_ENV
            echo "PUBLIC_URL=${PUBLIC_URL}" >> $GITHUB_STEP_SUMMARY
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Roo Code Configuration" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Add this to your Roo Code settings:" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            echo '{' >> $GITHUB_STEP_SUMMARY
            echo '  "model": "qwen2.5-coder-7b",' >> $GITHUB_STEP_SUMMARY
            echo "  \"apiUrl\": \"${PUBLIC_URL}\"," >> $GITHUB_STEP_SUMMARY
            echo '  "apiType": "openai",' >> $GITHUB_STEP_SUMMARY
            echo '  "apiKey": "not-needed"' >> $GITHUB_STEP_SUMMARY
            echo '}' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ URL not detected. Check tunnel.log"
            tail -10 tunnel.log 2>/dev/null || true
          fi

      - name: Keep workflow alive
        run: |
          echo "⏱️ Keeping tunnel alive (6 hours)..."
          echo "📋 API endpoint: ${PUBLIC_URL}"
          
          for i in {1..720}; do
            if ! curl -sf "http://localhost:${{ env.SERVER_PORT }}/health" >/dev/null 2>&1; then
              echo "⚠️ Backend health check failed at iteration $i"
            fi
            
            if ! curl -sf "http://localhost:${{ env.PROXY_PORT }}/health" >/dev/null 2>&1; then
              echo "⚠️ Proxy health check failed at iteration $i"
            fi
            
            if [ $((i % 60)) -eq 0 ]; then
              echo "✅ Still running - iteration $i/720 (elapsed: $((i/2)) minutes)"
            fi
            
            sleep 30
          done
