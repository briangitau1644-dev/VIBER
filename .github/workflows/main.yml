name: Senior Engineer CPU - Gemma4-E4B - GitHub Actions

on:
  workflow_dispatch:

env:
  # Using Node 24 is correct for future-proofing, ignoring the warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  MODEL_URL: 'https://huggingface.co'
  MODEL_PATH: 'models/google_gemma-4-E4B-it-bf16.gguf'
  SERVER_PORT: '8080'
  PROXY_PORT: '11434'

jobs:
  senior-engineer-gemma4-cpu:
    name: Gemma4-E4B Full-Stack Senior Engineer
    runs-on: ubuntu-latest
    timeout-minutes: 400

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean Ports and Environment
        run: |
          pkill -9 -f llama-server 2>/dev/null || true
          pkill -9 -f proxy.py 2>/dev/null || true
          sudo fuser -k 8080/tcp 2>/dev/null || true
          sudo fuser -k 11434/tcp 2>/dev/null || true
          rm -rf llama.cpp # Ensure a clean build

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl wget cmake build-essential python3 git libcurl4-openssl-dev

      - name: Build Latest llama.cpp
        run: |
          # Fixed git clone path
          git clone --depth 1 https://github.com
          cd llama.cpp
          cmake -B build -DLLAMA_CURL=ON -DLLAMA_BUILD_SERVER=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)
          # Locate binary precisely
          SERVER_PATH=$(find build/bin -name llama-server -type f | head -n 1)
          echo "SERVER_BIN=$(realpath $SERVER_PATH)" >> $GITHUB_ENV

      - name: Download Model (Gemma-4)
        run: |
          mkdir -p models
          echo "Downloading 15GB GGUF... this takes time..."
          curl -fL -o "$MODEL_PATH" "$MODEL_URL"

      - name: Start Llama Server
        run: |
          $SERVER_BIN \
            --model "$MODEL_PATH" \
            --port ${{ env.SERVER_PORT }} \
            --ctx-size 8192 \
            --threads $(nproc) \
            --chat-template gemma &
          
          # Health check before moving to proxy
          echo "Waiting for server to initialize..."
          for i in {1..30}; do
            if curl -s http://localhost:${{ env.SERVER_PORT }}/health | grep -q "ok"; then
              echo "Server is UP!"
              break
            fi
            sleep 5
          done

      - name: Start Ollama-Style Proxy Wrapper
        run: |
          cat << 'PYEOF' > proxy.py
          import http.server, urllib.request, json

          # The "Ollama Modelfile" Persona Injection
          SYSTEM_PROMPT = (
              "You are a Senior Full-Stack Engineer (15+ years exp). "
              "Expert in Python Django, React, and System Design. "
              "Respond with complete, clean, production-ready code. "
              "No explanations unless asked. No placeholders."
          )

          class ProxyHandler(http.server.BaseHTTPRequestHandler):
              def log_message(self, format, *args): return # Silent logs

              def do_POST(self):
                  content_length = int(self.headers['Content-Length'])
                  body = json.loads(self.rfile.read(content_length))
                  
                  # Inject system prompt if missing (replicates Ollama SYSTEM)
                  if "messages" in body:
                      if not any(m.get("role") == "system" for m in body["messages"]):
                          body["messages"].insert(0, {"role": "system", "content": SYSTEM_PROMPT})
                  
                  try:
                      req = urllib.request.Request(
                          f"http://localhost:8080/v1/chat/completions",
                          data=json.dumps(body).encode(),
                          headers={"Content-Type": "application/json"}
                      )
                      with urllib.request.urlopen(req) as res:
                          self.send_response(res.getcode())
                          self.send_header("Content-Type", "application/json")
                          self.send_header("Access-Control-Allow-Origin", "*")
                          self.end_headers()
                          self.wfile.write(res.read())
                  except Exception as e:
                      self.send_response(500)
                      self.end_headers()
                      self.wfile.write(str(e).encode())

              def do_OPTIONS(self):
                  self.send_response(200)
                  self.send_header("Access-Control-Allow-Origin", "*")
                  self.send_header("Access-Control-Allow-Methods", "POST, OPTIONS")
                  self.send_header("Access-Control-Allow-Headers", "Content-Type, Authorization")
                  self.end_headers()

          http.server.HTTPServer(('0.0.0.0', 11434), ProxyHandler).serve_forever()
          PYEOF
          python3 proxy.py &
          sleep 5

      - name: Expose via Cloudflared
        run: |
          curl -L https://github.com -o cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:11434 &
          sleep 10
          echo "---------------------------------------------------"
          echo "ACCESS URL:"
          curl -s http://localhost:45678/metrics | grep -o 'https://[-a-z0-9.]*.trycloudflare.com'
          echo "---------------------------------------------------"

      - name: Keep Alive
        run: sleep 21600
