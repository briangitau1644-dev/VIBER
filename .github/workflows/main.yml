# .github/workflows/roo-code-gemma.yml
name: Roo Code - CodeGemma 7B Local Server

on: workflow_dispatch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # ✅ CodeGemma 7B instruction-tuned (coding-optimized)
  MODEL_URL: 'https://huggingface.co/bartowski/codegemma-7b-it-GGUF/resolve/main/codegemma-7b-it-Q4_K_M.gguf'
  MODEL_PATH: 'models/codegemma-7b-it-Q4_K_M.gguf'
  SERVER_PORT: '1234'  # LM Studio default
  PROXY_PORT: '11434'  # Ollama-compatible
  LLAMA_REPO: 'https://github.com/ggml-org/llama.cpp'

jobs:
  roo-code-server:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Clean environment
        run: |
          pkill -9 -f llama-server 2>/dev/null || true
          pkill -9 -f proxy.py 2>/dev/null || true
          sudo fuser -k 1234/tcp 2>/dev/null || true
          rm -rf llama.cpp build models proxy.py

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl cmake build-essential python3 git libcurl4-openssl-dev

      - name: Build llama.cpp
        run: |
          git clone --depth 1 "${LLAMA_REPO}"
          cd llama.cpp
          cmake -B build -DLLAMA_CURL=ON -DLLAMA_BUILD_SERVER=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)
          SERVER_BIN=$(find build -name "llama-server" -executable | head -1)
          echo "SERVER_BIN=$(realpath $SERVER_BIN)" >> $GITHUB_ENV

      - name: Download CodeGemma 7B
        run: |
          mkdir -p models
          curl -fL --retry 3 --max-time 600 -o "${MODEL_PATH}" "${MODEL_URL}"
          [ -f "${MODEL_PATH}" ] || { echo "Download failed"; exit 1; }
          echo "✅ CodeGemma 7B downloaded (~4.5GB)"

      - name: Start llama-server with ROO CODE COMPATIBLE settings
        run: |
          echo "🚀 Starting server with 8K context (required for Roo Code)..."
          $SERVER_BIN \
            --model "${MODEL_PATH}" \
            --port ${{ env.SERVER_PORT }} \
            --ctx-size 8192 \        # ✅ CRITICAL: Roo Code needs 8K+
            --threads $(nproc) \
            --chat-template gemma \
            --n-predict 2048 \
            --batch-size 512 \
            --log-disable &
          
          # Health check
          for i in {1..30}; do
            curl -sf "http://localhost:${{ env.SERVER_PORT }}/health" && break
            sleep 5
          done

      - name: Start OpenAI-compatible proxy
        run: |
          python3 - << 'EOF' > proxy.py &
import http.server, urllib.request, json, os
PORT = int(os.environ.get('PROXY_PORT', '11434'))
BACKEND = f"http://localhost:{os.environ.get('SERVER_PORT','1234')}"
class H(http.server.BaseHTTPRequestHandler):
    protocol_version='HTTP/1.1'
    def log_message(self,*a):pass
    def _cors(self):self.send_header('Access-Control-Allow-Origin','*')
    def do_OPTIONS(self):self.send_response(200);self._cors();self.end_headers()
    def do_GET(self):
        if self.path in ['/','/health']:
            self.send_response(200);self.send_header('Content-Type','application/json')
            self._cors();self.end_headers()
            self.wfile.write(json.dumps({"status":"ok","model":"codegemma-7b-it"}).encode())
            return
        # Forward other GETs
        try:
            with urllib.request.urlopen(f"{BACKEND}{self.path}",timeout=30) as r:
                self.send_response(r.status);self.send_header('Content-Type','application/json')
                self._cors();self.end_headers();self.wfile.write(r.read())
        except Exception as e:self.send_response(500);self.end_headers();self.wfile.write(str(e).encode())
    def do_POST(self):
        try:
            length=int(self.headers.get('Content-Length',0));body=self.rfile.read(length)
            data=json.loads(body) if body else {}
            # Forward to backend OpenAI endpoint
            req=urllib.request.Request(f"{BACKEND}/v1/chat/completions",
                data=json.dumps(data).encode(),headers={'Content-Type':'application/json'},method='POST')
            with urllib.request.urlopen(req,timeout=120) as r:
                self.send_response(r.status);self.send_header('Content-Type','application/json')
                self._cors();self.end_headers();self.wfile.write(r.read())
        except Exception as e:self.send_response(500);self.end_headers();self.wfile.write(str(e).encode())
http.server.HTTPServer(('0.0.0.0',PORT),H).serve_forever()
EOF
          chmod +x proxy.py; python3 proxy.py &
          sleep 3; echo "✅ Proxy started on port $PROXY_PORT"

      - name: Start cloudflared tunnel
        run: |
          curl -fsSL -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          ./cloudflared tunnel --url "http://localhost:${{ env.PROXY_PORT }}" --no-autoupdate > tunnel.log 2>&1 &
          sleep 15
          URL=$(grep -oE 'https://[a-z0-9.-]+\.trycloudflare\.com' tunnel.log | head -1) || true
          if [ -n "$URL" ]; then
            echo "::notice::🔗 Roo Code API: ${URL}"
            echo "PUBLIC_URL=${URL}" >> $GITHUB_ENV
            echo "PUBLIC_URL=${URL}" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ URL not detected - check tunnel.log"; cat tunnel.log | tail -20
          fi

      - name: Keep alive
        run: |
          echo "⏱️ Keeping server alive (6 hours)..."
          for i in {1..720}; do
            curl -sf "http://localhost:${{ env.SERVER_PORT }}/health" >/dev/null 2>&1 || echo "⚠️ Backend down at $i"
            sleep 30
          done
