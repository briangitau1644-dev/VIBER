<layout>
    # domains_identified: [Local]
</layout>
name: Senior Engineer CPU - Gemma4-E4B - GitHub Actions

on:
  workflow_dispatch:
    inputs:
      model_download_url:
        description: 'Direct GGUF download URL'
        required: false
        default: 'https://huggingface.co'
      model_filename:
        description: 'GGUF filename'
        required: false
        default: 'google_gemma-4-E4B-it-bf16.gguf'
      session_hours:
        description: 'Session duration (max 6)'
        required: false
        default: '6'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  MODEL_FILENAME: ${{ github.event.inputs.model_filename }}
  MODEL_DOWNLOAD_URL: ${{ github.event.inputs.model_download_url }}
  SESSION_HOURS: ${{ github.event.inputs.session_hours }}
  SERVER_PORT: '8080' # Internal llama-server port
  BACKEND_PORT: '11434' # Public proxy port (Ollama default)
  MODEL_PATH: 'models/google_gemma-4-E4B-it-bf16.gguf'

jobs:
  senior-engineer-gemma4-cpu:
    name: Gemma4-E4B Full-Stack Senior Engineer
    runs-on: ubuntu-latest
    timeout-minutes: 400

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Kill Any Stale Servers
        run: |
          pkill -9 -f llama-server 2>/dev/null || true
          pkill -9 -f cloudflared  2>/dev/null || true
          pkill -9 -f proxy.py     2>/dev/null || true
          sudo fuser -k 8080/tcp   2>/dev/null || true
          sudo fuser -k 11434/tcp  2>/dev/null || true

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl wget cmake build-essential python3

      - name: Clone and Build llama.cpp
        run: |
          git clone --depth 1 https://github.com/ggerganov/llama.cpp
          cd llama.cpp
          cmake -B build -DLLAMA_CURL=ON -DLLAMA_BUILD_SERVER=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)
          echo "SERVER_BIN=$(realpath build/bin/llama-server)" >> $GITHUB_ENV

      - name: Download Model
        run: |
          mkdir -p models
          curl -fL -o "$MODEL_PATH" "$MODEL_DOWNLOAD_URL"

      - name: Start Llama Server
        run: |
          # Use --chat-template to ensure the model follows Gemma's specific structure
          $SERVER_BIN \
            --model "$MODEL_PATH" \
            --port ${{ env.SERVER_PORT }} \
            --ctx-size 8192 \
            --threads $(nproc) \
            --chat-template gemma &
          
          sleep 10

      - name: Start Ollama-Style Wrapper Proxy
        run: |
          # This script acts as the "Modelfile" by injecting the persona into every request
          cat << 'PYEOF' > proxy.py
          import http.server, urllib.request, json, os

          SYSTEM_PROMPT = "You are a Senior Full-Stack Engineer (15+ years exp). Expert in Python Django, React, and DevOps. Provide complete code, no placeholders, and a professional tone."

          class ProxyHandler(http.server.BaseHTTPRequestHandler):
              def do_POST(self):
                  content_length = int(self.headers['Content-Length'])
                  body = json.loads(self.rfile.read(content_length))
                  
                  # Replicate Ollama's behavior: Ensure the system prompt is always present
                  if "messages" in body:
                      if body["messages"][0]["role"] != "system":
                          body["messages"].insert(0, {"role": "system", "content": SYSTEM_PROMPT})
                  
                  req = urllib.request.Request(
                      "http://localhost:8080/v1/chat/completions",
                      data=json.dumps(body).encode(),
                      headers={"Content-Type": "application/json"}
                  )
                  with urllib.request.urlopen(req) as res:
                      self.send_response(res.getcode())
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      self.wfile.write(res.read())

          http.server.HTTPServer(('0.0.0.0', 11434), ProxyHandler).serve_forever()
          PYEOF
          python3 proxy.py &
          sleep 5

      - name: Expose via Cloudflared
        run: |
          wget -q https://github.com
          sudo dpkg -i cloudflared-linux-amd64.deb
          cloudflared tunnel --url http://localhost:11434 &
          sleep 5
          echo "TUNNEL ENDPOINT:"
          curl -s http://localhost:45678/metrics | grep -o 'https://[-a-z0-9.]*.trycloudflare.com' || true

      - name: Keep Alive
        run: sleep $(( ${{ env.SESSION_HOURS }} * 3600 ))
