      - name: Install Ollama (Alternative - Direct Binary)
        run: |
          # Download with follow-redirects
          curl -L -o ollama-linux-amd64 https://github.com/ollama/ollama/releases/latest/download/ollama-linux-amd64
          sudo install -o root -g root -m 0755 ollama-linux-amd64 /usr/local/bin/ollama
          
          # Start Ollama
          ollama serve &
          
          sleep 5
          for i in {1..20}; do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✓ Ollama is active!"
              break
            fi
            echo "Waiting for Ollama... (attempt $i/20)"
            sleep 3
          done
