name: Senior Engineer CPU - Gemma4-E4B - GitHub Actions

on:
  workflow_dispatch:
    inputs:
      model_download_url:
        description: 'Direct GGUF download URL'
        required: false
        default: 'https://huggingface.co'
      model_filename:
        description: 'GGUF filename'
        required: false
        default: 'google_gemma-4-E4B-it-bf16.gguf'
      session_hours:
        description: 'Session duration (max 6)'
        required: false
        default: '6'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  MODEL_FILENAME: ${{ github.event.inputs.model_filename || 'google_gemma-4-E4B-it-bf16.gguf' }}
  MODEL_DOWNLOAD_URL: ${{ github.event.inputs.model_download_url || 'https://huggingface.co' }}
  SESSION_HOURS: ${{ github.event.inputs.session_hours || '6' }}
  SERVER_PORT: '8080'
  BACKEND_PORT: '11434'
  MODEL_PATH: 'models/google_gemma-4-E4B-it-bf16.gguf'

jobs:
  senior-engineer-gemma4-cpu:
    name: Gemma4-E4B Full-Stack Senior Engineer
    runs-on: ubuntu-latest
    timeout-minutes: 400

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Kill Any Stale Servers
        run: |
          pkill -9 -f llama-server 2>/dev/null || true
          pkill -9 -f cloudflared  2>/dev/null || true
          pkill -9 -f proxy.py     2>/dev/null || true
          sudo fuser -k 8080/tcp   2>/dev/null || true
          sudo fuser -k 11434/tcp  2>/dev/null || true

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl wget cmake build-essential python3

      - name: Clone and Build llama.cpp
        run: |
          git clone --depth 1 https://github.com
          cd llama.cpp
          cmake -B build -DLLAMA_CURL=ON -DLLAMA_BUILD_SERVER=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)
          echo "SERVER_BIN=$(realpath build/bin/llama-server)" >> $GITHUB_ENV

      - name: Download Model
        run: |
          mkdir -p models
          curl -fL -o "$MODEL_PATH" "$MODEL_DOWNLOAD_URL"

      - name: Start Llama Server
        run: |
          $SERVER_BIN \
            --model "$MODEL_PATH" \
            --port ${{ env.SERVER_PORT }} \
            --ctx-size 8192 \
            --threads $(nproc) \
            --chat-template gemma &
          sleep 15

      - name: Start Ollama-Style Wrapper Proxy
        run: |
          cat << 'PYEOF' > proxy.py
          import http.server, urllib.request, json

          SYSTEM_PROMPT = (
              "You are a Senior Full-Stack Engineer (15+ years exp). "
              "Expert in Python Django, React, and DevOps. "
              "Provide complete code, no placeholders, and a professional tone."
          )

          class ProxyHandler(http.server.BaseHTTPRequestHandler):
              def do_POST(self):
                  content_length = int(self.headers['Content-Length'])
                  body = json.loads(self.rfile.read(content_length))
                  
                  # Replicate Ollama's Modelfile 'SYSTEM' instruction injection
                  if "messages" in body and isinstance(body["messages"], list):
                      # Check if system prompt is already there; if not, insert it
                      if not any(m.get("role") == "system" for m in body["messages"]):
                          body["messages"].insert(0, {"role": "system", "content": SYSTEM_PROMPT})
                  
                  try:
                      req = urllib.request.Request(
                          "http://localhost:8080/v1/chat/completions",
                          data=json.dumps(body).encode(),
                          headers={"Content-Type": "application/json"}
                      )
                      with urllib.request.urlopen(req) as res:
                          self.send_response(res.getcode())
                          self.send_header("Content-Type", "application/json")
                          self.end_headers()
                          self.wfile.write(res.read())
                  except Exception as e:
                      self.send_response(500)
                      self.end_headers()
                      self.wfile.write(str(e).encode())

          http.server.HTTPServer(('0.0.0.0', 11434), ProxyHandler).serve_forever()
          PYEOF
          python3 proxy.py &
          sleep 5

      - name: Expose via Cloudflared
        run: |
          wget -q https://github.com
          sudo dpkg -i cloudflared-linux-amd64.deb
          cloudflared tunnel --url http://localhost:11434 &
          sleep 10
          echo "---------------------------------------------------"
          echo "TUNNEL ENDPOINT:"
          curl -s http://localhost:45678/metrics | grep -o 'https://[-a-z0-9.]*.trycloudflare.com' || echo "Tunnel not found yet..."
          echo "---------------------------------------------------"

      - name: Keep Alive
        run: |
          echo "Session active for ${{ env.SESSION_HOURS }} hours."
          sleep $(( ${{ env.SESSION_HOURS }} * 3600 ))
