# .github/workflows/ollama-proxy-toolcall.yml
name: Ollama Proxy with Tool Calling - 6 Hour Session

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Ollama model to use (must support tool calling)'
        required: false
        default: 'sorc/qwen3.5-claude-4.6-opus:4b'
      enable_ram_pressure:
        description: 'Enable RAM pressure to prevent idle suspension'
        required: false
        default: 'true'
      log_interval:
        description: 'Activity log interval in seconds'
        required: false
        default: '30'
      session_hours:
        description: 'Session duration in hours (max 6)'
        required: false
        default: '6'

env:
  MODEL: ${{ github.event.inputs.model || 'sorc/qwen3.5-claude-4.6-opus:4b' }}
  RAM_PRESSURE_ENABLED: ${{ github.event.inputs.enable_ram_pressure || 'true' }}
  RAM_PRESSURE_MB: '256'
  ACTIVITY_LOG_INTERVAL: ${{ github.event.inputs.log_interval || '30' }}
  KEEPALIVE_INTERVAL: '10'
  PROXY_PORT: '8000'
  OLLAMA_PORT: '11434'
  SESSION_HOURS: ${{ github.event.inputs.session_hours || '6' }}

jobs:
  ollama-proxy:
    name: Ollama Proxy with Tool Calling
    runs-on: ubuntu-latest
    timeout-minutes: 400
    
    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📥 Install System Dependencies
        run: |
          echo "🔧 Installing system packages..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl \
            wget \
            lsof \
            net-tools \
            jq \
            build-essential
          echo "✅ System packages installed"

      - name: 📥 Install Python Dependencies
        run: |
          echo "📦 Installing Python packages..."
          pip install --upgrade pip --quiet
          
          # Install regular packages from PyPI
          pip install --quiet \
            fastapi \
            uvicorn[standard] \
            requests \
            pydantic>=2.0 \
            starlette \
            psutil \
            numpy
          
          # Install PyTorch CPU version separately
          pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple
          
          echo "✅ Python packages installed"
          pip list --format=freeze | grep -E "^(fastapi|uvicorn|torch|psutil|numpy)==" 

      - name: 📥 Install Ollama
        run: |
          echo "🔧 Installing Ollama..."
          curl -fsSL https://ollama.com/install.sh | sh
          echo "✅ Ollama installed"
          ollama --version

      - name: 📥 Install Cloudflared (for optional tunneling)
        run: |
          echo "🔧 Installing cloudflared..."
          curl -fsSL -o /tmp/cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i /tmp/cloudflared.deb 2>/dev/null || true
          rm -f /tmp/cloudflared.deb
          cloudflared --version 2>/dev/null && echo "✅ Cloudflared installed" || echo "⚠️ Cloudflared install skipped"

      - name: 🚀 Start Ollama Server
        run: |
          echo "🚀 Starting Ollama server in background..."
          
          # Set Ollama environment
          export OLLAMA_HOST="127.0.0.1:${{ env.OLLAMA_PORT }}"
          export OLLAMA_ORIGINS="*"
          export OLLAMA_NUM_PARALLEL="1"
          export OLLAMA_KEEP_ALIVE="-1"
          export OLLAMA_MAX_LOADED_MODELS="1"
          
          # Start Ollama
          nohup ollama serve > ollama.log 2>&1 &
          echo $! > ollama.pid
          echo "Ollama PID: $(cat ollama.pid)"
          
          # Wait for Ollama to be ready
          echo "⏳ Waiting for Ollama to be ready (max 60s)..."
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/tags > /dev/null 2>&1; then
              echo "✅ Ollama is ready!"
              ollama list 2>/dev/null | head -5 || true
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Ollama failed to start within 60 seconds"
              echo "=== Ollama Log ==="
              tail -20 ollama.log || true
              exit 1
            fi
            echo "  Waiting... ($i/30)"
            sleep 2
          done

      - name: 📦 Pull Model
        run: |
          echo "📦 Pulling model: ${{ env.MODEL }}..."
          export OLLAMA_HOST="127.0.0.1:${{ env.OLLAMA_PORT }}"
          
          # Pull with timeout and retry
          for attempt in 1 2 3; do
            if timeout 600 ollama pull ${{ env.MODEL }}; then
              echo "✅ Model pulled successfully"
              ollama list | grep "${{ env.MODEL }}" || true
              break
            fi
            if [ $attempt -eq 3 ]; then
              echo "❌ Failed to pull model after 3 attempts"
              exit 1
            fi
            echo "⚠️  Pull attempt $attempt failed, retrying..."
            sleep 10
          done

      - name: 📝 Create Proxy Server Script (with Tool Calling Support)
        run: |
          cat > proxy_server.py << 'PYTHON_EOF'
#!/usr/bin/env python3
"""
Ollama Proxy Server with Full Tool Calling Support
GitHub Actions Edition - CPU Optimized
Supports: OpenAI /v1/chat/completions + Anthropic /v1/messages
"""

import os
import sys
import json
import time
import uuid
import threading
import random
import subprocess
import requests
from datetime import datetime
from pathlib import Path
from typing import List, Optional, Union, Dict, Any

# FastAPI imports
from fastapi import FastAPI, Request, HTTPException, BackgroundTasks
from fastapi.middleware.cors import CORSMiddleware
from fastapi.responses import StreamingResponse, JSONResponse, Response
from pydantic import BaseModel, Field

# ─────────────────────────────────────────────────────────────────────────────
# CONFIGURATION FROM ENVIRONMENT
# ─────────────────────────────────────────────────────────────────────────────

MODEL = os.getenv('MODEL', 'sorc/qwen3.5-claude-4.6-opus:4b')
OLLAMA_BASE = f"http://127.0.0.1:{os.getenv('OLLAMA_PORT', '11434')}"
PROXY_PORT = int(os.getenv('PROXY_PORT', '8000'))
RAM_PRESSURE_ENABLED = os.getenv('RAM_PRESSURE_ENABLED', 'true').lower() == 'true'
RAM_PRESSURE_MB = int(os.getenv('RAM_PRESSURE_MB', '256'))
ACTIVITY_LOG_INTERVAL = float(os.getenv('ACTIVITY_LOG_INTERVAL', '30'))
KEEPALIVE_INTERVAL = float(os.getenv('KEEPALIVE_INTERVAL', '10'))

def log(msg: str):
    """Print timestamped log message"""
    timestamp = datetime.now().strftime('%H:%M:%S')
    print(f"[{timestamp}] {msg}", flush=True)

log(f"⚡ Proxy Starting - Model: {MODEL}, RAM_PRESSURE: {RAM_PRESSURE_ENABLED}")

# ─────────────────────────────────────────────────────────────────────────────
# TOOL DEFINITIONS (Built-in Tools for the Model)
# ─────────────────────────────────────────────────────────────────────────────

TOOL_DEFINITIONS = [
    {
        "type": "function",
        "function": {
            "name": "get_current_time",
            "description": "Get the current date and time in ISO format.",
            "parameters": {
                "type": "object",
                "properties": {},
                "required": []
            }
        }
    },
    {
        "type": "function",
        "function": {
