name: Host Gemma 4B for Roo Code
on:
  workflow_dispatch: # Manual start

jobs:
  host-gemma:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Ollama
        uses: ai-action/setup-ollama@v2
        with:
          ollama-version: 'latest'

      - name: Start Ollama and Pull Gemma 4B
        run: |
          # Start Ollama in the background
          ollama serve & 
          
          # Wait for the API to be ready (Health Check)
          echo "Waiting for Ollama server..."
          until curl -s http://localhost:11434/api/tags > /dev/null; do
            sleep 5
          done
          
          echo "Ollama is up! Pulling Gemma 4B..."
          ollama pull gemma:4b

      - name: Setup Cloudflare Tunnel
        uses: AnimMouse/setup-cloudflared@v2
        with:
          cloudflare_tunnel_credential: ${{ secrets.CLOUDFLARE_TUNNEL_CREDENTIAL }}
          cloudflare_tunnel_id: ${{ vars.CLOUDFLARE_TUNNEL_ID }}
          cloudflare_tunnel_configuration: ${{ vars.CLOUDFLARE_TUNNEL_CONFIGURATION }}

      - name: Keep Runner Alive
        # Standard GitHub runners time out after 6 hours
        run: sleep 21600 

      - name: Shutdown Tunnel
        if: always()
        uses: AnimMouse/setup-cloudflared/shutdown@v2
