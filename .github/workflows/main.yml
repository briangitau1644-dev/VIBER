name: LM Studio Direct — gemma4:e4b — llama.cpp Server + Cloudflare Tunnel

on:
  workflow_dispatch:
    inputs:
      model_repo:
        description: 'HuggingFace model repo (GGUF)'
        required: false
        default: 'bartowski/gemma-2-9b-it-GGUF'
      model_file:
        description: 'GGUF filename to use'
        required: false
        default: 'gemma-2-9b-it-Q4_K_M.gguf'
      session_hours:
        description: 'Session duration in hours (max 6)'
        required: false
        default: '6'
      ctx_size:
        description: 'Context size (tokens)'
        required: false
        default: '4096'
      n_gpu_layers:
        description: 'GPU layers (-1 = all, 0 = CPU)'
        required: false
        default: '-1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  MODEL_REPO: ${{ github.event.inputs.model_repo || 'bartowski/gemma-2-9b-it-GGUF' }}
  MODEL_FILE: ${{ github.event.inputs.model_file || 'gemma-2-9b-it-Q4_K_M.gguf' }}
  SESSION_HOURS: ${{ github.event.inputs.session_hours || '6' }}
  CTX_SIZE: ${{ github.event.inputs.ctx_size || '4096' }}
  N_GPU_LAYERS: ${{ github.event.inputs.n_gpu_layers || '-1' }}
  SERVER_PORT: '1234'
  SERVER_HOST: '0.0.0.0'

jobs:
  lm-studio-direct:
    name: llama.cpp Server + gemma-2-9b + Cloudflare Tunnel
    runs-on: ubuntu-latest
    timeout-minutes: 400

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: 📥 Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl wget jq grep bash procps cmake build-essential \
            git libcurl4-openssl-dev

      - name: 📥 Build llama.cpp (with server + OpenAI API)
        run: |
          git clone --depth 1 --branch b4300 https://github.com/ggerganov/llama.cpp
          cd llama.cpp
          make server -j$(nproc) LLAMA_CURL=1
          ./server --help | head -20
          echo "✅ llama.cpp server built"

      - name: 📥 Download Model (GGUF)
        run: |
          echo "⏳ Downloading model: ${{ env.MODEL_REPO }} / ${{ env.MODEL_FILE }}"
          
          # Create models directory
          mkdir -p models
          
          # Download from HuggingFace (using hf.co direct link)
          MODEL_URL="https://huggingface.co/${{ env.MODEL_REPO }}/resolve/main/${{ env.MODEL_FILE }}"
          
          if ! curl -fL --retry 3 --retry-delay 10 \
            -o "models/${{ env.MODEL_FILE }}" \
            "$MODEL_URL"; then
            echo "❌ Failed to download model"
            echo "Trying alternative mirror..."
            # Fallback: try with ?download=1
            curl -fL --retry 3 --retry-delay 10 \
              -o "models/${{ env.MODEL_FILE }}" \
              "${MODEL_URL}?download=1" || exit 1
          fi
          
          # Verify download
          if [ ! -f "models/${{ env.MODEL_FILE }}" ]; then
            echo "❌ Model file not found after download"
            exit 1
          fi
          
          FILE_SIZE=$(du -h "models/${{ env.MODEL_FILE }}" | cut -f1)
          echo "✅ Model downloaded: $FILE_SIZE"
          ls -lh models/

      - name: 🚀 Start llama.cpp Server (OpenAI-compatible API)
        run: |
          cd llama.cpp
          
          # Start server in background with OpenAI API compatibility
          nohup ./server \
            --model "../models/${{ env.MODEL_FILE }}" \
            --host "${{ env.SERVER_HOST }}" \
            --port "${{ env.SERVER_PORT }}" \
            --ctx-size "${{ env.CTX_SIZE }}" \
            --n-gpu-layers ${{ env.N_GPU_LAYERS }} \
            --chat-template gemma \
            --slots \
            --log-disable \
            > ../server.log 2>&1 &
          
          echo $! > ../server.pid
          echo "⏳ Waiting for llama.cpp server to be ready..."
          
          # Wait for server to respond
          for i in {1..60}; do
            if curl -sf "http://127.0.0.1:${{ env.SERVER_PORT }}/health" > /dev/null 2>&1; then
              echo "✅ Server ready after ${i} attempts"
              break
            fi
            [ $i -eq 60 ] && { 
              echo "❌ Server did not start"
              cat ../server.log | tail -50
              exit 1
            }
            sleep 3
          done
          
          # Verify OpenAI-compatible endpoint
          echo "📦 Testing /v1/models endpoint..."
          curl -sf "http://127.0.0.1:${{ env.SERVER_PORT }}/v1/models" | jq . || echo "(no models endpoint)"

      - name: 📥 Install Cloudflared
        run: |
          curl -fsSL -o /tmp/cf.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i /tmp/cf.deb 2>/dev/null || true
          rm -f /tmp/cf.deb
          cloudflared --version
          echo "✅ Cloudflared installed"

      - name: 🌐 Start Cloudflare Tunnel → llama.cpp Server
        run: |
          pkill -9 -f cloudflared 2>/dev/null || true
          sleep 2

          # Tunnel directly to llama.cpp server port (1234)
          nohup cloudflared tunnel \
            --url http://127.0.0.1:${{ env.SERVER_PORT }} \
            --no-autoupdate \
            --loglevel info \
            > tunnel.log 2>&1 &
          echo $! > tunnel.pid

          echo "⏳ Waiting for Cloudflare tunnel URL..."
          TUNNEL_URL=""
          for i in {1..40}; do
            RAW=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log 2>/dev/null | head -1)
            if [ -n "$RAW" ]; then
              TUNNEL_URL="${RAW//__/}"
              TUNNEL_URL="${TUNNEL_URL%/}"
              echo "✅ Tunnel URL: $TUNNEL_URL"
              break
            fi
            [ $i -eq 40 ] && { echo "❌ Tunnel URL not found"; cat tunnel.log; exit 1; }
            sleep 2
          done

          if [ -n "$TUNNEL_URL" ]; then
            echo "CLOUDFLARE_URL=${TUNNEL_URL}" >> "$GITHUB_ENV"

            # Verify tunnel serves OpenAI-compatible API
            echo "⏳ Verifying tunnel serves OpenAI API..."
            for j in {1..20}; do
              RESPONSE=$(curl -sf --max-time 10 "${TUNNEL_URL}/v1/models" 2>/dev/null || echo "")
              if echo "$RESPONSE" | jq -e '.data' > /dev/null 2>&1; then
                echo "✅ Tunnel verified — serving OpenAI-compatible API"
                echo "   Models: $(echo "$RESPONSE" | jq -r '.data[].id' 2>/dev/null | head -3)"
                break
              fi
              echo "  Attempt $j — waiting for tunnel..."
              [ $j -eq 20 ] && echo "⚠️  Proceeding anyway"
              sleep 3
            done

            # Print client config
            echo ""
            echo "╔════════════════════════════════════════════════════════════════╗"
            echo "║   🦙  LM STUDIO DIRECT — llama.cpp Server — READY              ║"
            echo "╠════════════════════════════════════════════════════════════════╣"
            printf "║  Tunnel URL: %-52s║\n" "${TUNNEL_URL}"
            printf "║  Model:      %-52s║\n" "${{ env.MODEL_FILE }}"
            echo "║                                                                  ║"
            echo "║  ✅ USE THIS IN LM STUDIO / CONTINUE / ROO CODE:                ║"
            echo "║                                                                  ║"
            printf "║    Server URL: %-52s║\n" "${TUNNEL_URL}"
            printf "║    Model ID:   %-52s║\n" "${{ env.MODEL_FILE }}"
            echo "║                                                                  ║"
            echo "║  ✅ OpenAI-Compatible Endpoints:                                ║"
            echo "║    • GET  /v1/models       — List available models              ║"
            echo "║    • POST /v1/chat/completions — Chat with model               ║"
            echo "║    • POST /v1/completions  — Legacy completions                 ║"
            echo "║    • GET  /health          — Server health check                ║"
            echo "║                                                                  ║"
            echo "║  ⚠️  Note: Custom server-side tools are not available.          ║"
            echo "║     Use client-side function calling for tools.                 ║"
            echo "╚════════════════════════════════════════════════════════════════╝"
            echo ""
            echo "==> Server URL: ${TUNNEL_URL}"
            echo "==> Model ID:   ${{ env.MODEL_FILE }}"
          fi

      - name: 🧪 Test OpenAI-Compatible Endpoints
        if: env.CLOUDFLARE_URL != ''
        run: |
          BASE="${{ env.CLOUDFLARE_URL }}"
          BASE="${BASE%/}"

          echo "═══════════════════════════════════════════════"
          echo "🧪 Testing OpenAI-compatible endpoints"
          echo "   BASE = ${BASE}"
          echo "═══════════════════════════════════════════════"

          if [[ ! "$BASE" =~ ^https://[a-zA-Z0-9-]+\.trycloudflare\.com ]]; then
            echo "❌ Invalid BASE URL — skipping tests"
            exit 0
          fi

          PASS=0; FAIL=0

          do_get() {
            local url="$1"; local timeout="${2:-20}"
            local code body
            body=$(curl -s --max-time "$timeout" --retry 2 --retry-delay 3 \
              -w "\n__HTTP_CODE__%{http_code}" "$url" 2>/dev/null)
            code=$(echo "$body" | grep -oP '(?<=__HTTP_CODE__)\d+' || echo "000")
            body=$(echo "$body" | sed '/__HTTP_CODE__/d')
            echo "${code}|${body}"
          }

          do_post() {
            local url="$1"; local data="$2"; local timeout="${3:-150}"
            local code body
            body=$(curl -s --max-time "$timeout" --retry 2 --retry-delay 3 \
              -H "Content-Type: application/json" -d "$data" \
              -w "\n__HTTP_CODE__%{http_code}" "$url" 2>/dev/null)
            code=$(echo "$body" | grep -oP '(?<=__HTTP_CODE__)\d+' || echo "000")
            body=$(echo "$body" | sed '/__HTTP_CODE__/d')
            echo "${code}|${body}"
          }

          check() {
            local name="$1" body="$2" code="$3"
            if [ "$code" = "200" ]; then
              echo "✅ $name (HTTP $code)"
              PASS=$((PASS+1))
            else
              echo "❌ $name (HTTP $code)"
              echo "   Body: ${body:0:300}"
              FAIL=$((FAIL+1))
            fi
          }

          echo ""
          echo "1️⃣  GET /v1/models"
          R=$(do_get "${BASE}/v1/models"); CODE="${R%%|*}"; B="${R#*|}"
          check "GET /v1/models" "$B" "$CODE"
          echo "$B" | jq '.data[].id' 2>/dev/null || true
          echo ""

          echo "2️⃣  GET /health"
          R=$(do_get "${BASE}/health"); CODE="${R%%|*}"; B="${R#*|}"
          check "GET /health" "$B" "$CODE"
          echo "$B" | jq . 2>/dev/null || true
          echo ""

          echo "3️⃣  POST /v1/chat/completions (non-streaming)"
          DATA='{"model":"${{ env.MODEL_FILE }}","messages":[{"role":"user","content":"Reply with one word: pong"}],"max_tokens":20,"stream":false}'
          R=$(do_post "${BASE}/v1/chat/completions" "$DATA"); CODE="${R%%|*}"; B="${R#*|}"
          check "POST /v1/chat/completions" "$B" "$CODE"
          echo "$B" | jq '{finish:.choices[0].finish_reason, reply:.choices[0].message.content}' 2>/dev/null || true
          echo ""

          echo "4️⃣  POST /v1/chat/completions (streaming)"
          DATA='{"model":"${{ env.MODEL_FILE }}","messages":[{"role":"user","content":"hi"}],"max_tokens":10,"stream":true}'
          CODE=$(curl -s --max-time 30 -H "Content-Type: application/json" -d "$DATA" \
            -w "%{http_code}" -o /dev/null "${BASE}/v1/chat/completions" 2>/dev/null || echo "000")
          if [ "$CODE" = "200" ]; then
            echo "✅ POST /v1/chat/completions (stream) (HTTP $CODE)"
            PASS=$((PASS+1))
          else
            echo "❌ POST /v1/chat/completions (stream) (HTTP $CODE)"
            FAIL=$((FAIL+1))
          fi
          echo ""

          echo "═══════════════════════════════════════════════"
          echo "Results: ✅ $PASS passed  ❌ $FAIL failed"
          echo "═══════════════════════════════════════════════"
          exit 0

      - name: ⏱️ Session Keepalive (${{ env.SESSION_HOURS }}h)
        run: |
          SESSION_SECONDS=$(( ${{ env.SESSION_HOURS }} * 3600 ))
          echo "⏱️  Session: ${SESSION_SECONDS}s (${{ env.SESSION_HOURS }}h)"

          RAW_URL="${{ env.CLOUDFLARE_URL }}"
          CF_URL="${RAW_URL//__/}"
          CF_URL="${CF_URL%/}"
          [ -n "$CF_URL" ] && echo "🌐 $CF_URL"

          START=$(date +%s)
          END=$(( START + SESSION_SECONDS ))
          PING_COUNT=0

          while [ "$(date +%s)" -lt "$END" ]; do
            NOW=$(date +%s)
            REMAIN_MIN=$(( (END - NOW) / 60 ))

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "⏰ $(date '+%Y-%m-%d %H:%M:%S UTC') | ${REMAIN_MIN}m remaining"

            # Tunnel health via OpenAI endpoint
            if [ -n "$CF_URL" ]; then
              MODELS=$(curl -sf --max-time 10 "${CF_URL}/v1/models" 2>/dev/null | jq -r '.data[].id' 2>/dev/null | head -1 || echo "unreachable")
              echo "🟢 Server via tunnel: ${MODELS:-unreachable}"
            fi

            # Local server health
            HEALTH=$(curl -sf --max-time 5 "http://127.0.0.1:${{ env.SERVER_PORT }}/health" 2>/dev/null || echo '{"status":"down"}')
            echo "🟢 Server local: $(echo "$HEALTH" | jq -r .status 2>/dev/null || echo unreachable)"

            # Process check
            SERVER_PIDS=$(pgrep -f "llama.cpp.*server" || pgrep -f "./server" || true)
            if [ -n "$SERVER_PIDS" ]; then
              echo "🦙 Server: alive (PIDs: $SERVER_PIDS)"
            else
              echo "❌ Server not found — restarting..."
              cd llama.cpp
              nohup ./server \
                --model "../models/${{ env.MODEL_FILE }}" \
                --host "${{ env.SERVER_HOST }}" \
                --port "${{ env.SERVER_PORT }}" \
                --ctx-size "${{ env.CTX_SIZE }}" \
                --n-gpu-layers ${{ env.N_GPU_LAYERS }} \
                --chat-template gemma \
                --slots \
                --log-disable \
                > ../server.log 2>&1 &
              sleep 5
              echo "🦙 Server restarted"
            fi

            echo "💾 $(free -h | awk '/^Mem/{printf "RAM: %s / %s", $3, $2}')"
            PING_COUNT=$((PING_COUNT+1))
            echo "📊 Ping #$PING_COUNT"
            sleep 300
          done

          echo "🏁 Session complete"

      - name: 📊 Final Report
        if: always()
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║        FINAL REPORT — LM STUDIO DIRECT       ║"
          echo "╚══════════════════════════════════════════════╝"
          RAW="${{ env.CLOUDFLARE_URL }}"
          CF="${RAW//__/}"
          [ -n "$CF" ] && echo "🌐 $CF"

          echo ""
          echo "── Tunnel Test (/v1/models) ──"
          curl -sf "${CF}/v1/models" 2>/dev/null | jq . || echo "unreachable"

          echo ""
          echo "── Local Server Health ──"
          curl -sf "http://127.0.0.1:${{ env.SERVER_PORT }}/health" 2>/dev/null | jq . || echo "unreachable"

          echo ""
          echo "── server.log (last 30 lines) ──"
          tail -30 server.log 2>/dev/null | sed 's/^/  /' || echo "  (none)"

          echo ""
          echo "── tunnel.log (last 10 lines) ──"
          tail -10 tunnel.log 2>/dev/null | sed 's/^/  /' || echo "  (none)"

      - name: 🛑 Cleanup
        if: always()
        run: |
          echo "🧹 Cleanup..."
          [ -f tunnel.pid ] && kill -9 "$(cat tunnel.pid)" 2>/dev/null || true
          [ -f server.pid ] && kill -9 "$(cat server.pid)" 2>/dev/null || true
          pkill -9 -f cloudflared 2>/dev/null || true
          pkill -9 -f "llama.cpp.*server" 2>/dev/null || true
          pkill -9 -f "./server" 2>/dev/null || true
          sudo fuser -k ${{ env.SERVER_PORT }}/tcp 2>/dev/null || true
          rm -f ./*.pid 2>/dev/null || true
          echo "✅ Done"
