# .github/workflows/senior-engineer-gemma4-cpu.yml
name: Senior Engineer CPU - Gemma4-E4B - GitHub Actions

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  MODEL_URL: 'https://huggingface.co/bartowski/google_gemma-4-E4B-it-GGUF/resolve/main/google_gemma-4-E4B-it-Q4_K_M.gguf?download=true'
  MODEL_PATH: 'models/google_gemma-4-E4B-it-Q4_K_M.gguf'
  MODEL_FILENAME: 'google_gemma-4-E4B-it-Q4_K_M.gguf'
  SERVER_PORT: '8080'
  PROXY_PORT: '11434'
  LLAMA_REPO: 'https://github.com/ggml-org/llama.cpp'
  LLAMA_BRANCH: 'master'

jobs:
  senior-engineer-gemma4-cpu:
    name: Gemma4-E4B Full-Stack Senior Engineer
    runs-on: ubuntu-latest
    timeout-minutes: 400
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean environment and ports
        run: |
          pkill -9 -f llama-server 2>/dev/null || true
          pkill -9 -f proxy.py 2>/dev/null || true
          pkill -9 -f cloudflared 2>/dev/null || true
          sudo fuser -k ${{ env.SERVER_PORT }}/tcp 2>/dev/null || true
          sudo fuser -k ${{ env.PROXY_PORT }}/tcp 2>/dev/null || true
          rm -rf llama.cpp build models cloudflared proxy.py

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl wget cmake build-essential python3 python3-pip git \
            libcurl4-openssl-dev libssl-dev

      - name: Build latest llama.cpp from source
        run: |
          echo "🔧 Cloning llama.cpp..."
          git clone --depth 1 --branch "${LLAMA_BRANCH}" "${LLAMA_REPO}"
          cd llama.cpp
          echo "🔨 Configuring cmake build..."
          cmake -B build \
            -DLLAMA_CURL=ON \
            -DLLAMA_BUILD_SERVER=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_NATIVE=OFF
          echo "⚙️ Building llama-server..."
          cmake --build build --config Release -j$(nproc)
          SERVER_BIN=$(find build -name "llama-server" -type f -executable | head -n 1)
          if [ -z "$SERVER_BIN" ]; then
            echo "❌ ERROR: llama-server binary not found!"
            exit 1
          fi
          echo "SERVER_BIN=$(realpath $SERVER_BIN)" >> $GITHUB_ENV
          $SERVER_BIN --help | head -3

      - name: Download Gemma-4 Q4_K_M GGUF model
        run: |
          mkdir -p models
          echo "📦 Downloading Q4_K_M quantized model (~4.5GB)..."
          curl -fL --retry 3 --retry-delay 10 --connect-timeout 30 --max-time 900 \
            -o "${MODEL_PATH}" \
            "${MODEL_URL}"
          if [ ! -f "${MODEL_PATH}" ]; then
            echo "❌ ERROR: Model download failed!"
            exit 1
          fi
          FILE_SIZE=$(stat -c%s "${MODEL_PATH}" 2>/dev/null || echo "unknown")
          echo "✅ Model downloaded: ${MODEL_FILENAME} ($(numfmt --to=iec-i --suffix=B ${FILE_SIZE} 2>/dev/null || echo ${FILE_SIZE} bytes))"

      - name: Start llama-server with OpenAI-compatible API
        run: |
          echo "🚀 Starting llama-server..."
          $SERVER_BIN \
            --model "${MODEL_PATH}" \
            --port ${{ env.SERVER_PORT }} \
            --ctx-size 8192 \
            --threads $(nproc) \
            --chat-template gemma \
            --n-predict 2048 \
            --batch-size 512 \
            --ubatch-size 256 \
            --log-disable &
          SERVER_PID=$!
          echo "SERVER_PID=${SERVER_PID}" >> $GITHUB_ENV
          echo "⏳ Waiting for server initialization..."
          for i in {1..30}; do
            if curl -sf "http://localhost:${{ env.SERVER_PORT }}/health" | grep -qE '"status"|"ok"'; then
              echo "✅ Server is UP!"
              break
            fi
            [ $i -eq 30 ] && { echo "❌ Server failed to start"; exit 1; }
            echo "   Waiting... ($i/30)"
            sleep 5
          done

      - name: Start Ollama-compatible proxy wrapper
        run: |
          echo "🔗 Creating proxy with full HTTP method support..."
          python3 - << 'PYEOF'
          proxy_code = '''#!/usr/bin/env python3
          import http.server, urllib.request, urllib.parse, json, os, sys
          
          SERVER_PORT = os.environ.get('SERVER_PORT', '8080')
          PROXY_PORT = int(os.environ.get('PROXY_PORT', '11434'))
          BACKEND_URL = f"http://localhost:{SERVER_PORT}"
          SYSTEM_PROMPT = "You are a Senior Full-Stack Engineer with 15+ years of experience. Expert in Python, Django, FastAPI, React, TypeScript, Node.js, and System Design. Respond with complete, clean, production-ready code following best practices. Include proper error handling, type hints, and documentation. No explanations unless explicitly asked. No placeholders or TODOs."
          
          class ProxyHandler(http.server.BaseHTTPRequestHandler):
              protocol_version = 'HTTP/1.1'
              def log_message(self, format, *args):
                  if os.environ.get('DEBUG_PROXY'): print(f"[PROXY] {args[0]}", file=sys.stderr)
              def _send_cors(self):
                  self.send_header("Access-Control-Allow-Origin", "*")
                  self.send_header("Access-Control-Allow-Methods", "GET, POST, OPTIONS")
                  self.send_header("Access-Control-Allow-Headers", "Content-Type, Authorization, Accept")
              def _forward(self, method, path, body=None):
                  url = f"{BACKEND_URL}{path}"
                  headers = {"Content-Type": "application/json", "Accept": "application/json"}
                  data = body.encode() if body else None
                  if data: headers["Content-Length"] = str(len(data))
                  req = urllib.request.Request(url, data=data, headers=headers, method=method)
                  with urllib.request.urlopen(req, timeout=180) as r:
                      return r.getcode(), r.read(), dict(r.headers)
              def _respond(self, code, body, hdrs=None):
                  self.send_response(code)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", len(body))
                  if hdrs:
                      for k,v in hdrs.items():
                          if k.lower() not in ['content-type','content-length','transfer-encoding']: self.send_header(k,v)
                  self._send_cors()
                  self.end_headers()
                  self.wfile.write(body)
              def do_OPTIONS(self): self.send_response(200); self._send_cors(); self.end_headers()
              def do_GET(self):
                  path = urllib.parse.urlparse(self.path).path
                  if path in ['/','/health']:
                      self._respond(200, json.dumps({"status":"ok","proxy":"running","backend":BACKEND_URL,"model":"gemma-4-q4km"}).encode()); return
                  if path in ['/api/tags','/v1/models']:
                      self._respond(200, json.dumps({"models":[{"id":"gemma-4-q4km","name":"Gemma 4 E4B Q4_K_M","object":"model","created":1704067200,"owned_by":"google","quantization":"Q4_K_M"}]}).encode()); return
                  try: code,body,hdrs = self._forward('GET', path); self._respond(code,body,hdrs)
                  except urllib.error.HTTPError as e: self._respond(e.code, e.read())
                  except Exception as e: self._respond(500, json.dumps({"error":str(e)}).encode())
              def do_POST(self):
                  try:
                      length = int(self.headers.get('Content-Length',0))
                      body = self.rfile.read(length)
                      data = json.loads(body) if body else {}
                      if "messages" in data and not any(m.get("role")=="system" for m in data["messages"]):
                          data["messages"].insert(0, {"role":"system", "content":SYSTEM_PROMPT})
                      code,resp,hdrs = self._forward('POST', self.path, json.dumps(data))
                      self._respond(code, resp, hdrs)
                  except urllib.error.HTTPError as e: self._respond(e.code, e.read())
                  except json.JSONDecodeError: self._respond(400, json.dumps({"error":"Invalid JSON"}).encode())
                  except Exception as e: self._respond(500, json.dumps({"error":str(e)}).encode())
              def do_HEAD(self):
                  try: code,_,hdrs = self._forward('HEAD', self.path); self.send_response(code)
                  except: self.send_response(500)
                  self.end_headers()
          
          if __name__ == "__main__":
              print(f"🔗 Proxy: 0.0.0.0:{PROXY_PORT} -> {BACKEND_URL}")
              http.server.HTTPServer(('0.0.0.0', PROXY_PORT), ProxyHandler).serve_forever()
          '''
          with open('proxy.py', 'w') as f: f.write(proxy_code)
          PYEOF
          chmod +x proxy.py
          python3 proxy.py &
          echo "PROXY_PID=$!" >> $GITHUB_ENV
          sleep 3
          echo "✅ Proxy started"

      - name: Download and start cloudflared tunnel
        run: |
          echo "🌐 Setting up Cloudflare Tunnel..."
          curl -fL --retry 3 -o cloudflared "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64"
          chmod +x cloudflared
          ./cloudflared tunnel --url "http://localhost:${{ env.PROXY_PORT }}" --no-autoupdate > tunnel.log 2>&1 &
          echo "TUNNEL_PID=$!" >> $GITHUB_ENV
          echo "⏳ Waiting for tunnel..."
          PUBLIC_URL=""
          for i in {1..20}; do
            [ -f tunnel.log ] && PUBLIC_URL=$(grep -oP 'https://[a-z0-9.-]+\.trycloudflare\.com' tunnel.log | head -n1) && break
            sleep 2
          done
          if [ -n "$PUBLIC_URL" ]; then
            echo ""; echo "╔════════════════════════════════════════╗"
            echo "║  🎉 Gemma-4 Q4_K_M API is live!              ║"
            echo "╠════════════════════════════════════════╣"
            echo "║  URL: ${PUBLIC_URL}║"
            echo "║  Chat: ${PUBLIC_URL}/v1/chat/completions    ║"
            echo "║  Ollama: ${PUBLIC_URL}/api/chat             ║"
            echo "╚════════════════════════════════════════╝"; echo ""
            echo "PUBLIC_URL=${PUBLIC_URL}" >> $GITHUB_ENV
            echo "PUBLIC_URL=${PUBLIC_URL}" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️  Could not detect URL - check tunnel.log"
            cat tunnel.log 2>/dev/null || true
          fi

      - name: Display usage examples
        if: env.PUBLIC_URL
        run: |
          echo "📋 Test your API:"
          echo "# Health: curl ${PUBLIC_URL}/health"
          echo "# Chat: curl -X POST ${PUBLIC_URL}/v1/chat/completions -H 'Content-Type: application/json' -d '{\"model\":\"gemma-4-q4km\",\"messages\":[{\"role\":\"user\",\"content\":\"Write a Python email validator\"}]}'"

      - name: Keep workflow alive
        run: |
          echo "⏱️  Keeping tunnel alive (6 hours)..."
          for i in {1..720}; do
            curl -sf "http://localhost:${{ env.SERVER_PORT }}/health" >/dev/null 2>&1 || echo "⚠️  Health check failed at $i"
            sleep 30
          done
