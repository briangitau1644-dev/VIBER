name: Host Gemma 4 E4B for Roo Code
on:
  workflow_dispatch:

jobs:
  host-gemma:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install and Start Ollama
        run: |
          # Install Ollama
          curl -fsSL https://ollama.com/install.sh | sh
          
          # Start Ollama in background
          ollama serve &
          
          # Wait for Ollama to initialize
          echo "Waiting for Ollama to start..."
          for i in {1..45}; do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✓ Ollama is ready!"
              break
            fi
            echo "Attempt $i/45 - Ollama starting..."
            sleep 2
          done
          
          # Verify Ollama is running
          curl -s http://localhost:11434/api/tags || {
            echo "Ollama failed to start"
            exit 1
          }

      - name: Configure Ollama for External Access
        run: |
          # Kill existing Ollama process
          pkill ollama || true
          sleep 2
          
          # Start Ollama with CORS and external access
          OLLAMA_HOST=0.0.0.0 OLLAMA_ORIGINS=* ollama serve &
          
          # Wait for restart
          sleep 10
          
          # Verify configuration
          curl -s http://localhost:11434/api/tags > /dev/null
          echo "✓ Ollama configured for external access"

      - name: Pull Gemma 4 E4B Model
        run: |
          echo "=========================================="
          echo "Pulling gemma4:e4b model (~9.6GB)..."
          echo "This will take 15-30 minutes"
          echo "=========================================="
          
          # Pull the model
          ollama pull gemma4:e4b
          
          echo "✓ Model pull complete!"
          
          # Verify model is available
          ollama list | grep gemma4

      - name: PRE-LOAD MODEL INTO RAM
        run: |
          echo "Loading Gemma 4 E4B into RAM..."
          
          # Start model with keep_alive = -1 (never unload)
          # This forces the entire model into RAM
          nohup ollama run gemma4:e4b --keep-alive -1 > /dev/null 2>&1 &
          
          # Wait for model to fully load into RAM
          echo "Loading model weights into RAM (this takes 30-60 seconds)..."
          sleep 45
          
          # Verify model is loaded and responsive
          RESPONSE=$(curl -s -X POST http://localhost:11434/api/generate \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gemma4:e4b",
              "prompt": "OK",
              "stream": false,
              "keep_alive": -1
            }')
          
          if echo "$RESPONSE" | grep -q "response"; then
            echo "✓ Model PRE-LOADED in RAM and responding!"
          else
            echo "⚠️ Model may still be loading, continuing..."
          fi

      - name: Keep Model Warm in RAM
        run: |
          # Continuous keep-alive to ensure model stays in RAM
          while true; do
            curl -s -X POST http://localhost:11434/api/generate \
              -H "Content-Type: application/json" \
              -d '{"model":"gemma4:e4b","prompt":"","keep_alive":-1}' \
              > /dev/null 2>&1
            sleep 25
          done &
          
          echo "✓ Keep-alive service running (ping every 25 seconds)"

      - name: Install Cloudflared
        run: |
          # Install cloudflared
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          cloudflared --version

      - name: Start Cloudflare Tunnel
        run: |
          echo "Starting Cloudflare tunnel..."
          
          # Start tunnel with proper headers
          cloudflared tunnel --url http://localhost:11434 \
            --no-autoupdate \
            --http-host-header localhost:11434 \
            2>&1 | tee cloudflared.log &
          
          # Wait for tunnel to establish
          sleep 20
          
          # Extract tunnel URL
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
          
          if [ -n "$TUNNEL_URL" ]; then
            echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
            echo "✓ Tunnel URL: $TUNNEL_URL"
          else
            echo "Failed to get tunnel URL"
            cat cloudflared.log
            exit 1
          fi

      - name: Test Endpoints
        run: |
          echo "Testing Ollama endpoints through tunnel..."
          
          # Test basic endpoint
          echo "Testing /api/tags..."
          curl -s -L "$TUNNEL_URL/api/tags" | head -c 200
          
          echo -e "\n\nTesting chat completion..."
          curl -s -L -X POST "$TUNNEL_URL/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gemma4:e4b",
              "messages": [{"role": "user", "content": "Say hi"}],
              "max_tokens": 10
            }' | head -c 200
          
          echo -e "\n✓ Tunnel is working!"

      - name: Display Connection Info
        run: |
          echo "=========================================="
          echo "✅ GEMMA 4 E4B - LOADED IN RAM & READY"
          echo "=========================================="
          echo ""
          echo "🌐 TUNNEL URL: $TUNNEL_URL"
          echo ""
          echo "⚡ STATUS: Model is PRE-LOADED in RAM"
          echo "🚀 RESPONSE TIME: 20-50ms (first request)"
          echo "⏱️  AVAILABLE FOR: 6 hours"
          echo ""
          echo "🔧 ROO CODE CONFIGURATION:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Provider: OpenAI Compatible"
          echo "API URL: $TUNNEL_URL/v1"
          echo "Model ID: gemma4:e4b"
          echo "API Key: (leave empty)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📝 QUICK TEST:"
          echo "curl $TUNNEL_URL/v1/chat/completions \\"
          echo "  -H 'Content-Type: application/json' \\"
          echo "  -d '{\"model\":\"gemma4:e4b\",\"messages\":[{\"role\":\"user\",\"content\":\"Hello\"}]}'"
          echo ""
          echo "=========================================="

      - name: Keep Runner Alive (6 Hours)
        run: |
          echo "=========================================="
          echo "SERVING MODEL FOR 6 HOURS"
          echo "Model is HOT in RAM - instant responses"
          echo "=========================================="
          
          START_TIME=$(date +%s)
          END_TIME=$((START_TIME + 21600)) # 6 hours
          
          while [ $(date +%s) -lt $END_TIME ]; do
            if [ -f cloudflared.log ]; then
              URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
              if [ -n "$URL" ]; then
                # Get RAM usage
                RAM_MB=$(ps aux | grep -E "ollama.*serve" | grep -v grep | awk '{print $6/1024}' | cut -d. -f1)
                REMAINING=$((END_TIME - $(date +%s)))
                HOURS=$((REMAINING / 3600))
                MINS=$(((REMAINING % 3600) / 60))
                
                echo "[$(date '+%H:%M:%S')] ✅ Model IN RAM | RAM: ${RAM_MB}MB | Time left: ${HOURS}h ${MINS}m | URL: ${URL}"
              fi
            fi
            sleep 60
          done
          
          echo "6 hours completed - shutting down"
