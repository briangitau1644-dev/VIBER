# .github/workflows/main.yml
name: Roo Code - Qwen2.5-Coder 7B Server

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  
  MODEL_URL: 'https://huggingface.co/bartowski/Qwen2.5-Coder-7B-Instruct-GGUF/resolve/main/Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf'
  MODEL_PATH: 'models/Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf'
  SERVER_PORT: '1234'
  PROXY_PORT: '11434'
  LLAMA_REPO: 'https://github.com/ggml-org/llama.cpp'
  LLAMA_BRANCH: 'master'

jobs:
  qwen-coder-server:
    name: Qwen2.5-Coder-7B for Roo Code
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean environment
        run: |
          pkill -9 -f llama-server 2>/dev/null || true
          pkill -9 -f python3 2>/dev/null || true
          pkill -9 -f cloudflared 2>/dev/null || true
          sudo fuser -k 1234/tcp 2>/dev/null || true
          sudo fuser -k 11434/tcp 2>/dev/null || true
          rm -rf llama.cpp build models cloudflared proxy.py tunnel.log

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl wget cmake build-essential python3 python3-pip git

      - name: Build llama.cpp
        run: |
          git clone --depth 1 --branch master https://github.com/ggml-org/llama.cpp
          cd llama.cpp
          cmake -B build -DLLAMA_CURL=ON -DLLAMA_BUILD_SERVER=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)
          echo "SERVER_BIN=$(realpath build/bin/llama-server)" >> $GITHUB_ENV

      - name: Download model
        run: |
          mkdir -p models
          curl -fL --retry 3 -o "$MODEL_PATH" "$MODEL_URL"
          [ -f "$MODEL_PATH" ] && echo "Model downloaded" || exit 1

      - name: Start llama-server
        run: |
          $SERVER_BIN --model "$MODEL_PATH" --port 1234 --ctx-size 32768 --threads $(nproc) --chat-template qwen2.5 &
          sleep 10
          curl -sf http://localhost:1234/health || exit 1

      - name: Create and start proxy
        run: |
          cat > proxy.py << 'EOF'
          #!/usr/bin/env python3
          import http.server, urllib.request, urllib.parse, json, os
          
          BACKEND = "http://localhost:1234"
          PORT = 11434
          
          class Handler(http.server.BaseHTTPRequestHandler):
              def log_message(self, *args): pass
              
              def do_OPTIONS(self):
                  self.send_response(200)
                  self.send_header("Access-Control-Allow-Origin", "*")
                  self.send_header("Access-Control-Allow-Methods", "GET, POST, OPTIONS")
                  self.send_header("Access-Control-Allow-Headers", "*")
                  self.end_headers()
              
              def _forward(self, method, path, body=None):
                  req = urllib.request.Request(f"{BACKEND}{path}", data=body, headers={"Content-Type": "application/json"}, method=method)
                  try:
                      with urllib.request.urlopen(req, timeout=180) as resp:
                          return resp.getcode(), resp.read()
                  except urllib.error.HTTPError as e:
                      return e.code, e.read()
              
              def _send(self, code, data):
                  self.send_response(code)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", len(data))
                  self.send_header("Access-Control-Allow-Origin", "*")
                  self.end_headers()
                  self.wfile.write(data)
              
              def do_GET(self):
                  if self.path in ['/', '/health']:
                      self._send(200, json.dumps({"status": "ok"}).encode())
                  elif self.path == '/v1/models':
                      self._send(200, json.dumps({"data": [{"id": "qwen2.5-coder"}]}).encode())
                  else:
                      self._send(404, json.dumps({"error": "not found"}).encode())
              
              def do_POST(self):
                  length = int(self.headers.get('Content-Length', 0))
                  body = self.rfile.read(length)
                  
                  try:
                      data = json.loads(body) if body else {}
                      path = urllib.parse.urlparse(self.path).path
                      
                      # Handle chat completions
                      if '/chat/completions' in path:
                          messages = data.get('messages', [])
                          if not any(m.get('role') == 'system' for m in messages):
                              messages.insert(0, {"role": "system", "content": "You are Qwen2.5-Coder, a coding assistant."})
                          
                          # Format with Qwen2.5 template
                          prompt = ""
                          for m in messages:
                              role = m['role']
                              content = m['content']
                              if role == 'system':
                                  prompt += f"<|im_start|>system\n{content}<|im_end|>\n"
                              elif role == 'user':
                                  prompt += f"<|im_start|>user\n{content}<|im_end|>\n"
                              elif role == 'assistant':
                                  prompt += f"<|im_start|>assistant\n{content}<|im_end|>\n"
                          prompt += "<|im_start|>assistant\n"
                          
                          # Send to llama.cpp
                          llama_req = {
                              "prompt": prompt,
                              "n_predict": data.get('max_tokens', 4096),
                              "temperature": data.get('temperature', 0.7),
                              "stop": ["<|im_end|>"]
                          }
                          code, resp = self._forward('POST', '/completion', json.dumps(llama_req).encode())
                          
                          if code == 200:
                              llama_resp = json.loads(resp)
                              response_text = llama_resp.get('content', '')
                              
                              # Format as OpenAI response
                              openai_resp = {
                                  "choices": [{
                                      "message": {"role": "assistant", "content": response_text},
                                      "finish_reason": "stop"
                                  }]
                              }
                              self._send(200, json.dumps(openai_resp).encode())
                          else:
                              self._send(code, resp)
                          return
                      
                      # Handle Responses API
                      elif '/responses' in path:
                          messages = []
                          if 'input' in data:
                              inp = data['input']
                              if isinstance(inp, str):
                                  messages = [{"role": "user", "content": inp}]
                              elif isinstance(inp, list):
                                  for item in inp:
                                      if isinstance(item, dict):
                                          content = item.get('content', '')
                                          if isinstance(content, list):
                                              for c in content:
                                                  if isinstance(c, dict) and c.get('type') == 'input_text':
                                                      messages.append({"role": item.get('role', 'user'), "content": c.get('text', '')})
                                          else:
                                              messages.append({"role": item.get('role', 'user'), "content": content})
                          
                          if not any(m.get('role') == 'system' for m in messages):
                              messages.insert(0, {"role": "system", "content": "You are Qwen2.5-Coder."})
                          
                          # Format prompt
                          prompt = ""
                          for m in messages:
                              prompt += f"<|im_start|>{m['role']}\n{m['content']}<|im_end|>\n"
                          prompt += "<|im_start|>assistant\n"
                          
                          llama_req = {
                              "prompt": prompt,
                              "n_predict": data.get('max_output_tokens', 4096),
                              "temperature": data.get('temperature', 0.7)
                          }
                          code, resp = self._forward('POST', '/completion', json.dumps(llama_req).encode())
                          
                          if code == 200:
                              llama_resp = json.loads(resp)
                              responses_resp = {
                                  "output": [{
                                      "type": "message",
                                      "role": "assistant",
                                      "content": [{"type": "output_text", "text": llama_resp.get('content', '')}]
                                  }]
                              }
                              self._send(200, json.dumps(responses_resp).encode())
                          else:
                              self._send(code, resp)
                          return
                      
                      else:
                          code, resp = self._forward('POST', path, body)
                          self._send(code, resp)
                          
                  except Exception as e:
                      self._send(500, json.dumps({"error": str(e)}).encode())
          
          http.server.HTTPServer(('0.0.0.0', PORT), Handler).serve_forever()
          EOF
          
          python3 proxy.py &
          sleep 3

      - name: Start tunnel
        run: |
          curl -fL -o cloudflared "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64"
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:11434 --no-autoupdate > tunnel.log 2>&1 &
          
          sleep 10
          PUBLIC_URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' tunnel.log | head -n1)
          echo "PUBLIC_URL=${PUBLIC_URL}" >> $GITHUB_ENV
          echo "PUBLIC_URL=${PUBLIC_URL}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tunnel URL: ${PUBLIC_URL}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Continue config:" >> $GITHUB_STEP_SUMMARY
          echo "apiBase: ${PUBLIC_URL}/v1" >> $GITHUB_STEP_SUMMARY
          echo "model: qwen2.5-coder" >> $GITHUB_STEP_SUMMARY

      - name: Keep alive
        run: while true; do sleep 300; done
