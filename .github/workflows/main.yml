# .github/workflows/main.yml
name: Roo Code - Qwen2.5-Coder 7B Server

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  
  # === MODEL CONFIGURATION ===
  MODEL_URL: 'https://huggingface.co/bartowski/Qwen2.5-Coder-7B-Instruct-GGUF/resolve/main/Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf'
  MODEL_PATH: 'models/Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf'
  MODEL_FILENAME: 'Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf'
  
  # === SERVER CONFIGURATION ===
  SERVER_PORT: '1234'
  PROXY_PORT: '11434'
  
  # === LLAMA.CPP CONFIGURATION ===
  LLAMA_REPO: 'https://github.com/ggml-org/llama.cpp'
  LLAMA_BRANCH: 'master'

jobs:
  qwen-coder-server:
    name: Qwen2.5-Coder-7B for Roo Code
    runs-on: ubuntu-latest
    timeout-minutes: 300
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean environment and ports
        run: |
          pkill -9 -f llama-server 2>/dev/null || true
          pkill -9 -f proxy.py 2>/dev/null || true
          pkill -9 -f cloudflared 2>/dev/null || true
          sudo fuser -k ${{ env.SERVER_PORT }}/tcp 2>/dev/null || true
          sudo fuser -k ${{ env.PROXY_PORT }}/tcp 2>/dev/null || true
          rm -rf llama.cpp build models cloudflared proxy.py tunnel.log

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl wget cmake build-essential python3 python3-pip git \
            libcurl4-openssl-dev libssl-dev

      - name: Build latest llama.cpp from source
        run: |
          echo "Building llama.cpp..."
          git clone --depth 1 --branch "${LLAMA_BRANCH}" "${LLAMA_REPO}"
          cd llama.cpp
          cmake -B build -DLLAMA_CURL=ON -DLLAMA_BUILD_SERVER=ON -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF
          cmake --build build --config Release -j$(nproc)
          SERVER_BIN=$(find build -name "llama-server" -type f -executable | head -n 1)
          if [ -z "$SERVER_BIN" ]; then
            echo "ERROR: llama-server binary not found!"
            exit 1
          fi
          echo "SERVER_BIN=$(realpath $SERVER_BIN)" >> $GITHUB_ENV

      - name: Download Qwen2.5-Coder 7B GGUF model
        run: |
          mkdir -p models
          echo "Downloading Qwen2.5-Coder-7B..."
          curl -fL --retry 3 --retry-delay 10 --connect-timeout 30 --max-time 1200 \
            -o "${MODEL_PATH}" \
            "${MODEL_URL}"
          if [ ! -f "${MODEL_PATH}" ]; then
            echo "ERROR: Model download failed!"
            exit 1
          fi
          echo "Model downloaded successfully"

      - name: Start llama-server
        run: |
          echo "Starting llama-server..."
          $SERVER_BIN \
            --model "${MODEL_PATH}" \
            --port ${{ env.SERVER_PORT }} \
            --ctx-size 32768 \
            --threads $(nproc) \
            --chat-template qwen2.5 \
            --n-predict 4096 \
            --batch-size 2048 \
            --ubatch-size 512 \
            --log-disable \
            --no-mmap &
          SERVER_PID=$!
          echo "SERVER_PID=${SERVER_PID}" >> $GITHUB_ENV
          echo "Waiting for server..."
          for i in {1..40}; do
            if curl -sf "http://localhost:${{ env.SERVER_PORT }}/health" >/dev/null 2>&1; then
              echo "Server is UP!"
              break
            fi
            [ $i -eq 40 ] && { echo "Server failed to start"; exit 1; }
            sleep 5
          done

      - name: Create proxy script
        run: |
          cat > proxy.py << 'EOF'
          #!/usr/bin/env python3
          import http.server
          import urllib.request
          import urllib.parse
          import json
          import os
          
          SERVER_PORT = os.environ.get('SERVER_PORT', '1234')
          PROXY_PORT = int(os.environ.get('PROXY_PORT', '11434'))
          BACKEND_URL = f"http://localhost:{SERVER_PORT}"
          
          SYSTEM_PROMPT = "You are an expert Senior Full-Stack Engineer. Write clean, production-ready code."
          
          class ProxyHandler(http.server.BaseHTTPRequestHandler):
              protocol_version = 'HTTP/1.1'
              
              def log_message(self, *args):
                  pass
              
              def _cors(self):
                  self.send_header("Access-Control-Allow-Origin", "*")
                  self.send_header("Access-Control-Allow-Methods", "GET, POST, OPTIONS")
                  self.send_header("Access-Control-Allow-Headers", "*")
          
              def _forward_request(self, method, path, body=None):
                  target_url = f"{BACKEND_URL}{path}"
                  headers = {"Content-Type": "application/json"}
                  data = body.encode('utf-8') if body else None
                  if data:
                      headers["Content-Length"] = str(len(data))
                  req = urllib.request.Request(target_url, data=data, headers=headers, method=method)
                  try:
                      with urllib.request.urlopen(req, timeout=180) as response:
                          return response.getcode(), response.read(), dict(response.headers)
                  except urllib.error.HTTPError as e:
                      return e.code, e.read(), dict(e.headers)
          
              def _send_response(self, code, body, headers=None):
                  self.send_response(code)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(body)))
                  self._cors()
                  self.end_headers()
                  self.wfile.write(body)
          
              def do_OPTIONS(self):
                  self.send_response(200)
                  self._cors()
                  self.end_headers()
          
              def do_GET(self):
                  path = urllib.parse.urlparse(self.path).path
                  if path == '/health' or path == '/':
                      self._send_response(200, json.dumps({"status": "ok"}).encode())
                  elif path == '/v1/models':
                      self._send_response(200, json.dumps({
                          "object": "list",
                          "data": [{"id": "qwen2.5-coder-7b", "object": "model"}]
                      }).encode())
                  else:
                      self._send_response(404, json.dumps({"error": "Not found"}).encode())
          
              def do_POST(self):
                  try:
                      length = int(self.headers.get('Content-Length', 0))
                      body = self.rfile.read(length)
                      data = json.loads(body) if body else {}
                      path = urllib.parse.urlparse(self.path).path
                      
                      if '/responses' in path:
                          messages = []
                          if 'input' in data:
                              inp = data['input']
                              if isinstance(inp, str):
                                  messages = [{"role": "user", "content": inp}]
                              elif isinstance(inp, list):
                                  for item in inp:
                                      if isinstance(item, dict) and 'content' in item:
                                          messages.append({"role": item.get('role', 'user'), "content": item['content']})
                                      elif isinstance(item, str):
                                          messages.append({"role": "user", "content": item})
                          
                          if 'instructions' in data:
                              messages.insert(0, {"role": "system", "content": data['instructions']})
                          
                          chat_data = {
                              "messages": messages,
                              "stream": data.get('stream', False),
                              "max_tokens": data.get('max_output_tokens', 4096)
                          }
                          
                          if not any(m.get('role') == 'system' for m in chat_data['messages']):
                              chat_data['messages'].insert(0, {"role": "system", "content": SYSTEM_PROMPT})
                          
                          code, resp_body, _ = self._forward_request('POST', '/v1/chat/completions', json.dumps(chat_data))
                          
                          if code == 200:
                              chat_resp = json.loads(resp_body)
                              responses_resp = {
                                  "id": "resp_123",
                                  "object": "response",
                                  "status": "completed",
                                  "output": [{
                                      "type": "message",
                                      "role": "assistant",
                                      "content": [{"type": "output_text", "text": chat_resp['choices'][0]['message']['content']}]
                                  }]
                              }
                              self._send_response(200, json.dumps(responses_resp).encode())
                          else:
                              self._send_response(code, resp_body)
                          return
                      
                      elif '/chat/completions' in path:
                          if "messages" in data:
                              if not any(m.get("role") == "system" for m in data["messages"]):
                                  data["messages"].insert(0, {"role": "system", "content": SYSTEM_PROMPT})
                          code, resp_body, _ = self._forward_request('POST', path, json.dumps(data))
                          self._send_response(code, resp_body)
                          return
                      
                      else:
                          code, resp_body, _ = self._forward_request('POST', path, json.dumps(data))
                          self._send_response(code, resp_body)
                          
                  except Exception as e:
                      self._send_response(500, json.dumps({"error": str(e)}).encode())
          
          if __name__ == "__main__":
              print(f"Proxy running on 0.0.0.0:{PROXY_PORT}", flush=True)
              http.server.HTTPServer(('0.0.0.0', PROXY_PORT), ProxyHandler).serve_forever()
          EOF
          
          chmod +x proxy.py
          echo "Proxy script created"

      - name: Start proxy
        run: |
          python3 proxy.py &
          PROXY_PID=$!
          echo "PROXY_PID=${PROXY_PID}" >> $GITHUB_ENV
          sleep 3
          echo "Proxy started"

      - name: Start cloudflared tunnel
        run: |
          echo "Setting up Cloudflare Tunnel..."
          curl -fL --retry 3 -o cloudflared \
            "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64"
          chmod +x cloudflared
          
          ./cloudflared tunnel --url "http://localhost:${{ env.PROXY_PORT }}" --no-autoupdate > tunnel.log 2>&1 &
          TUNNEL_PID=$!
          echo "TUNNEL_PID=${TUNNEL_PID}" >> $GITHUB_ENV
          
          echo "Waiting for tunnel URL..."
          PUBLIC_URL=""
          for i in {1..15}; do
            if [ -f tunnel.log ]; then
              PUBLIC_URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' tunnel.log | head -n1) || true
            fi
            if [ -n "$PUBLIC_URL" ]; then break; fi
            sleep 3
          done
          
          if [ -n "$PUBLIC_URL" ]; then
            echo "API URL: ${PUBLIC_URL}"
            echo "PUBLIC_URL=${PUBLIC_URL}" >> $GITHUB_ENV
            echo "PUBLIC_URL=${PUBLIC_URL}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Continue Config:" >> $GITHUB_STEP_SUMMARY
            echo "apiBase: ${PUBLIC_URL}/v1" >> $GITHUB_STEP_SUMMARY
            echo "model: qwen2.5-coder-7b" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Keep workflow alive
        run: |
          echo "Keeping tunnel alive..."
          while true; do
            sleep 300
          done
