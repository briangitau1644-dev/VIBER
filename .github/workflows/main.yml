name: Ollama Direct — gemma4:e4b — RAM-Resident + Cloudflare Tunnel

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Ollama model to use'
        required: false
        default: 'gemma4:e4b'
      session_hours:
        description: 'Session duration in hours (max 6)'
        required: false
        default: '6'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  MODEL: ${{ github.event.inputs.model || 'gemma4:e4b' }}
  OLLAMA_PORT: '11434'
  SESSION_HOURS: ${{ github.event.inputs.session_hours || '6' }}
  OLLAMA_KEEP_ALIVE: '-1'
  OLLAMA_MAX_LOADED_MODELS: '1'
  OLLAMA_NUM_PARALLEL: '4'
  OLLAMA_FLASH_ATTENTION: '1'

jobs:
  ollama-direct:
    name: Ollama Direct + gemma4:e4b + RAM-Resident + Cloudflare Tunnel
    runs-on: ubuntu-latest
    timeout-minutes: 400

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: 📥 Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl wget jq grep bash procps

      - name: 📥 Install Ollama (latest)
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama --version
          echo "✅ Ollama installed"

      - name: 📥 Install Cloudflared
        run: |
          curl -fsSL -o /tmp/cf.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i /tmp/cf.deb 2>/dev/null || true
          rm -f /tmp/cf.deb
          cloudflared --version
          echo "✅ Cloudflared installed"

      - name: 🚀 Start Ollama Server (RAM-optimised)
        run: |
          # Kernel tuning for better RAM retention
          sudo sysctl -w vm.swappiness=10 2>/dev/null || true
          sudo sysctl -w vm.dirty_ratio=60 2>/dev/null || true

          # Ollama environment
          export OLLAMA_HOST="0.0.0.0:${{ env.OLLAMA_PORT }}"
          export OLLAMA_ORIGINS="*"
          export OLLAMA_KEEP_ALIVE="${{ env.OLLAMA_KEEP_ALIVE }}"
          export OLLAMA_MAX_LOADED_MODELS="${{ env.OLLAMA_MAX_LOADED_MODELS }}"
          export OLLAMA_NUM_PARALLEL="${{ env.OLLAMA_NUM_PARALLEL }}"
          export OLLAMA_FLASH_ATTENTION="${{ env.OLLAMA_FLASH_ATTENTION }}"

          # Start Ollama in background
          nohup ollama serve > ollama.log 2>&1 &
          echo $! > ollama.pid
          echo "⏳ Waiting for Ollama to be ready..."

          # Wait for Ollama to respond
          for i in {1..40}; do
            if curl -sf http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/version > /dev/null 2>&1; then
              echo "✅ Ollama ready after ${i} attempts"
              break
            fi
            [ $i -eq 40 ] && { echo "❌ Ollama did not start"; cat ollama.log; exit 1; }
            sleep 2
          done

          echo "📦 Ollama version: $(curl -sf http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/version | jq -r .version)"

      - name: 📥 Pull and Pre-Load Model into RAM
        run: |
          echo "⏳ Pulling model: ${{ env.MODEL }}"
          if ! timeout 1200 ollama pull ${{ env.MODEL }}; then
            echo "❌ Failed to pull model"
            ollama list
            tail -30 ollama.log
            exit 1
          fi

          echo "✅ Model pulled. Forcing load into RAM with keep_alive=-1..."
          
          # Warm-up request to load weights into RAM permanently
          curl -sf --max-time 300 \
            -X POST http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/generate \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"${{ env.MODEL }}\",\"prompt\":\"ready\",\"stream\":false,\"keep_alive\":-1,\"options\":{\"num_predict\":1}}" \
            > /dev/null 2>&1

          echo "📋 Model status (/api/ps):"
          curl -sf http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/ps | jq . || echo "(no /api/ps endpoint)"

      - name: 🌐 Start Cloudflare Tunnel → Ollama Direct
        run: |
          pkill -9 -f cloudflared 2>/dev/null || true
          sleep 2

          # ⚠️ TUNNEL DIRECTLY TO OLLAMA PORT (11434), NO PROXY
          nohup cloudflared tunnel \
            --url http://127.0.0.1:${{ env.OLLAMA_PORT }} \
            --no-autoupdate \
            --loglevel info \
            > tunnel.log 2>&1 &
          echo $! > tunnel.pid

          echo "⏳ Waiting for Cloudflare tunnel URL..."
          TUNNEL_URL=""
          for i in {1..40}; do
            RAW=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log 2>/dev/null | head -1)
            if [ -n "$RAW" ]; then
              TUNNEL_URL="${RAW//__/}"
              TUNNEL_URL="${TUNNEL_URL%/}"
              echo "✅ Tunnel URL: $TUNNEL_URL"
              break
            fi
            [ $i -eq 40 ] && { echo "❌ Tunnel URL not found"; cat tunnel.log; exit 1; }
            sleep 2
          done

          if [ -n "$TUNNEL_URL" ]; then
            echo "CLOUDFLARE_URL=${TUNNEL_URL}" >> "$GITHUB_ENV"

            # Verify tunnel responds with raw Ollama API
            echo "⏳ Verifying tunnel serves raw Ollama API..."
            for j in {1..20}; do
              RESPONSE=$(curl -sf --max-time 10 "${TUNNEL_URL}/api/version" 2>/dev/null || echo "")
              if echo "$RESPONSE" | jq -e '.version' > /dev/null 2>&1; then
                echo "✅ Tunnel verified — serving raw Ollama API"
                echo "   Response: $RESPONSE"
                break
              fi
              echo "  Attempt $j — waiting for tunnel..."
              [ $j -eq 20 ] && echo "⚠️  Proceeding anyway"
              sleep 3
            done

            # Print client config
            echo ""
            echo "╔════════════════════════════════════════════════════════════════╗"
            echo "║   🦙  OLLAMA DIRECT — gemma4:e4b — READY                       ║"
            echo "╠════════════════════════════════════════════════════════════════╣"
            printf "║  Tunnel URL: %-52s║\n" "${TUNNEL_URL}"
            echo "║                                                                  ║"
            echo "║  ✅ USE THIS URL DIRECTLY IN YOUR CLIENT:                       ║"
            echo "║                                                                  ║"
            echo "║  [Open WebUI / Ollama CLI / Any Ollama client]                  ║"
            printf "║    Base URL: %-54s║\n" "${TUNNEL_URL}"
            printf "║    Model:    %-54s║\n" "${MODEL}"
            echo "║                                                                  ║"
            echo "║  [OpenAI-compatible clients]                                    ║"
            printf "║    apiBase:  %-54s║\n" "${TUNNEL_URL}/v1"
            printf "║    model:    %-54s║\n" "${MODEL}"
            echo "║                                                                  ║"
            echo "║  ⚠️  NO PROXY — This is raw Ollama API                          ║"
            echo "║     Visit ${TUNNEL_URL}/api/tags to see models           ║"
            echo "╚════════════════════════════════════════════════════════════════╝"
            echo ""
            echo "==> Direct Ollama: ${TUNNEL_URL}"
            echo "==> OpenAI compat: ${TUNNEL_URL}/v1"
          fi

      - name: 🧪 Test Direct Ollama Endpoints
        if: env.CLOUDFLARE_URL != ''
        run: |
          BASE="${{ env.CLOUDFLARE_URL }}"
          BASE="${BASE%/}"  # strip trailing slash

          echo "═══════════════════════════════════════════════"
          echo "🧪 Testing DIRECT Ollama endpoints"
          echo "   BASE = ${BASE}"
          echo "═══════════════════════════════════════════════"

          if [[ ! "$BASE" =~ ^https://[a-zA-Z0-9-]+\.trycloudflare\.com ]]; then
            echo "❌ Invalid BASE URL — skipping tests"
            exit 0
          fi

          PASS=0; FAIL=0

          do_get() {
            local url="$1"; local timeout="${2:-20}"
            local code body
            body=$(curl -s --max-time "$timeout" --retry 2 --retry-delay 3 \
              -w "\n__HTTP_CODE__%{http_code}" "$url" 2>/dev/null)
            code=$(echo "$body" | grep -oP '(?<=__HTTP_CODE__)\d+' || echo "000")
            body=$(echo "$body" | sed '/__HTTP_CODE__/d')
            echo "${code}|${body}"
          }

          do_post() {
            local url="$1"; local data="$2"; local timeout="${3:-150}"
            local code body
            body=$(curl -s --max-time "$timeout" --retry 2 --retry-delay 3 \
              -H "Content-Type: application/json" -d "$data" \
              -w "\n__HTTP_CODE__%{http_code}" "$url" 2>/dev/null)
            code=$(echo "$body" | grep -oP '(?<=__HTTP_CODE__)\d+' || echo "000")
            body=$(echo "$body" | sed '/__HTTP_CODE__/d')
            echo "${code}|${body}"
          }

          check() {
            local name="$1" body="$2" code="$3"
            if [ "$code" = "200" ]; then
              echo "✅ $name (HTTP $code)"
              PASS=$((PASS+1))
            else
              echo "❌ $name (HTTP $code)"
              echo "   Body: ${body:0:300}"
              FAIL=$((FAIL+1))
            fi
          }

          echo ""
          echo "1️⃣  GET /api/version (raw Ollama)"
          R=$(do_get "${BASE}/api/version"); CODE="${R%%|*}"; B="${R#*|}"
          check "GET /api/version" "$B" "$CODE"
          echo "$B" | jq . 2>/dev/null || true
          echo ""

          echo "2️⃣  GET /api/tags (raw Ollama)"
          R=$(do_get "${BASE}/api/tags"); CODE="${R%%|*}"; B="${R#*|}"
          check "GET /api/tags" "$B" "$CODE"
          echo "$B" | jq '.models[].name' 2>/dev/null || true
          echo ""

          echo "3️⃣  GET /api/ps (raw Ollama)"
          R=$(do_get "${BASE}/api/ps"); CODE="${R%%|*}"; B="${R#*|}"
          check "GET /api/ps" "$B" "$CODE"
          echo "$B" | jq '.models[].name' 2>/dev/null || true
          echo ""

          echo "4️⃣  POST /api/generate (raw Ollama)"
          DATA="{\"model\":\"${{ env.MODEL }}\",\"prompt\":\"hi\",\"stream\":false,\"options\":{\"num_predict\":5}}"
          R=$(do_post "${BASE}/api/generate" "$DATA"); CODE="${R%%|*}"; B="${R#*|}"
          check "POST /api/generate" "$B" "$CODE"
          echo "$B" | jq '{response, done}' 2>/dev/null || true
          echo ""

          echo "5️⃣  POST /api/chat (raw Ollama)"
          DATA="{\"model\":\"${{ env.MODEL }}\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"stream\":false}"
          R=$(do_post "${BASE}/api/chat" "$DATA"); CODE="${R%%|*}"; B="${R#*|}"
          check "POST /api/chat" "$B" "$CODE"
          echo "$B" | jq '{message, done}' 2>/dev/null || true
          echo ""

          echo "═══════════════════════════════════════════════"
          echo "Results: ✅ $PASS passed  ❌ $FAIL failed"
          echo "═══════════════════════════════════════════════"
          exit 0

      - name: ⏱️ Session Keepalive (${{ env.SESSION_HOURS }}h)
        run: |
          SESSION_SECONDS=$(( ${{ env.SESSION_HOURS }} * 3600 ))
          echo "⏱️  Session: ${SESSION_SECONDS}s (${{ env.SESSION_HOURS }}h)"

          RAW_URL="${{ env.CLOUDFLARE_URL }}"
          CF_URL="${RAW_URL//__/}"
          CF_URL="${CF_URL%/}"
          [ -n "$CF_URL" ] && echo "🌐 $CF_URL"

          START=$(date +%s)
          END=$(( START + SESSION_SECONDS ))
          PING_COUNT=0

          while [ "$(date +%s)" -lt "$END" ]; do
            NOW=$(date +%s)
            REMAIN_MIN=$(( (END - NOW) / 60 ))

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "⏰ $(date '+%Y-%m-%d %H:%M:%S UTC') | ${REMAIN_MIN}m remaining"

            # Direct Ollama health via tunnel
            if [ -n "$CF_URL" ]; then
              VER=$(curl -sf --max-time 10 "${CF_URL}/api/version" 2>/dev/null | jq -r .version 2>/dev/null || echo "unreachable")
              echo "🟢 Ollama via tunnel: $VER"
            fi

            # Local Ollama check
            VER_LOCAL=$(curl -sf --max-time 5 "http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/version" 2>/dev/null | jq -r .version 2>/dev/null || echo "unreachable")
            echo "🟢 Ollama local: $VER_LOCAL"

            # RAM check — reload model if evicted
            PS=$(curl -sf --max-time 5 "http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/ps" 2>/dev/null || echo '{"models":[]}')
            COUNT=$(echo "$PS" | jq '.models|length' 2>/dev/null || echo 0)
            echo "🧠 Models in RAM: $COUNT"

            if [ "${COUNT}" -eq "0" ]; then
              echo "⚠️  Model evicted — reloading with keep_alive=-1..."
              curl -sf --max-time 90 \
                -X POST "http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/generate" \
                -H "Content-Type: application/json" \
                -d "{\"model\":\"${{ env.MODEL }}\",\"prompt\":\"hi\",\"stream\":false,\"keep_alive\":-1,\"options\":{\"num_predict\":1}}" \
                > /dev/null 2>&1 \
                && echo "✅ Reloaded" || echo "❌ Reload failed"
            fi

            # Process check
            OLLAMA_PIDS=$(pgrep -f "ollama serve" || true)
            if [ -n "$OLLAMA_PIDS" ]; then
              echo "🦙 Ollama: alive (PIDs: $OLLAMA_PIDS)"
            else
              echo "❌ Ollama not found — restarting..."
              export OLLAMA_HOST="0.0.0.0:${{ env.OLLAMA_PORT }}"
              export OLLAMA_KEEP_ALIVE="-1"
              nohup ollama serve > ollama.log 2>&1 &
              sleep 5
              echo "🦙 Ollama restarted"
            fi

            echo "💾 $(free -h | awk '/^Mem/{printf "RAM: %s / %s", $3, $2}')"
            PING_COUNT=$((PING_COUNT+1))
            echo "📊 Ping #$PING_COUNT"
            sleep 300
          done

          echo "🏁 Session complete"

      - name: 📊 Final Report
        if: always()
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║           FINAL REPORT — OLLAMA DIRECT       ║"
          echo "╚══════════════════════════════════════════════╝"
          RAW="${{ env.CLOUDFLARE_URL }}"
          CF="${RAW//__/}"
          [ -n "$CF" ] && echo "🌐 $CF"

          echo ""
          echo "── Tunnel Test (/api/version) ──"
          curl -sf "${CF}/api/version" 2>/dev/null | jq . || echo "unreachable"

          echo ""
          echo "── Local Ollama (/api/ps) ──"
          curl -sf "http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/ps" 2>/dev/null | jq . || echo "unreachable"

          echo ""
          echo "── ollama.log (last 20 lines) ──"
          tail -20 ollama.log 2>/dev/null | sed 's/^/  /' || echo "  (none)"

          echo ""
          echo "── tunnel.log (last 10 lines) ──"
          tail -10 tunnel.log 2>/dev/null | sed 's/^/  /' || echo "  (none)"

      - name: 🛑 Cleanup
        if: always()
        run: |
          echo "🧹 Cleanup..."
          [ -f tunnel.pid ] && kill -9 "$(cat tunnel.pid)" 2>/dev/null || true
          [ -f ollama.pid ] && kill -9 "$(cat ollama.pid)" 2>/dev/null || true
          pkill -9 -f cloudflared 2>/dev/null || true
          pkill -9 -f "ollama serve" 2>/dev/null || true
          sudo fuser -k ${{ env.OLLAMA_PORT }}/tcp 2>/dev/null || true
          rm -f ./*.pid 2>/dev/null || true
          echo "✅ Done"
