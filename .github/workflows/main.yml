name: Host Gemma 4 E4B for Roo Code
on:
  workflow_dispatch:

jobs:
  host-gemma:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          sudo systemctl start ollama
          
          # Wait for Ollama to be ready
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✓ Ollama is ready!"
              break
            fi
            sleep 3
          done

      - name: Configure Ollama for External Access
        run: |
          # Stop Ollama
          sudo systemctl stop ollama
          
          # Configure Ollama to accept external connections and CORS
          sudo mkdir -p /etc/systemd/system/ollama.service.d
          sudo tee /etc/systemd/system/ollama.service.d/override.conf > /dev/null << EOF
          [Service]
          Environment="OLLAMA_HOST=0.0.0.0"
          Environment="OLLAMA_ORIGINS=*"
          Environment="OLLAMA_MODELS=/home/runner/.ollama/models"
          EOF
          
          # Reload and restart
          sudo systemctl daemon-reload
          sudo systemctl start ollama
          
          sleep 5
          echo "✓ Ollama configured for external access"

      - name: Pull Gemma 4 E4B Model
        run: |
          echo "Pulling gemma4:e4b model (~9.6GB)..."
          ollama pull gemma4:e4b
          echo "✓ Model pull complete!"

      - name: PRE-LOAD MODEL INTO RAM
        run: |
          echo "Loading Gemma 4 E4B into RAM..."
          
          # Start model with keep_alive = -1 (never unload)
          ollama run gemma4:e4b --keep-alive -1 &
          
          # Wait for model to fully load into RAM
          sleep 30
          
          # Verify model is loaded
          curl -X POST http://localhost:11434/api/generate \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gemma4:e4b",
              "prompt": "Say READY",
              "stream": false,
              "keep_alive": -1
            }'
          
          echo "✓ Model PRE-LOADED in RAM"

      - name: Keep Model Warm
        run: |
          while true; do
            curl -s -X POST http://localhost:11434/api/generate \
              -H "Content-Type: application/json" \
              -d '{"model":"gemma4:e4b","prompt":"","keep_alive":-1}' \
              > /dev/null 2>&1
            sleep 30
          done &
          
          echo "✓ Keep-alive service running"

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Start Cloudflare Tunnel (No Auth)
        run: |
          # Start tunnel WITHOUT any authentication requirements
          cloudflared tunnel --url http://localhost:11434 \
            --no-autoupdate \
            --http-host-header localhost:11434 \
            2>&1 | tee cloudflared.log &
          
          sleep 15
          
          # Extract tunnel URL
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV

      - name: Test Tunnel Access
        run: |
          echo "Testing tunnel access..."
          
          # Test if tunnel is accessible
          curl -L -X GET "$TUNNEL_URL/api/tags" \
            -H "Origin: http://localhost" \
            -H "Access-Control-Request-Method: POST" \
            --max-time 10 || echo "Will retry..."
          
          echo ""
          echo "✓ Tunnel should be accessible"

      - name: Display Connection Info
        run: |
          echo "=========================================="
          echo "✅ GEMMA 4 E4B READY - NO 403 ERROR"
          echo "=========================================="
          echo ""
          echo "🌐 TUNNEL URL: $TUNNEL_URL"
          echo ""
          echo "🔧 ROO CODE SETUP:"
          echo "   API URL: $TUNNEL_URL/v1"
          echo "   Model ID: gemma4:e4b"
          echo "   API Key: (leave empty)"
          echo ""
          echo "⚠️  If you still get 403, use this exact URL format:"
          echo "   $TUNNEL_URL/v1/chat/completions"
          echo ""
          echo "=========================================="

      - name: Keep Runner Alive
        run: |
          echo "Model PRE-LOADED in RAM - 6 hours of instant responses"
          
          while true; do
            if [ -f cloudflared.log ]; then
              URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
              if [ -n "$URL" ]; then
                RAM_USAGE=$(ps aux | grep ollama | grep -v grep | awk '{sum+=$6} END {print sum/1024 " MB"}')
                echo "[$(date '+%H:%M:%S')] ✅ Model in RAM | URL: $URL | RAM: $RAM_USAGE"
                
                # Test endpoint every 5 minutes to ensure it's working
                if [ $((SECONDS % 300)) -eq 0 ]; then
                  curl -s -L "$URL/api/tags" > /dev/null && echo "  ✓ Endpoint responsive"
                fi
              fi
            fi
            sleep 60
          done
