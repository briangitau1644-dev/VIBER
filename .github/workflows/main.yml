name: Host Gemma 4 E4B for Roo Code
on:
  workflow_dispatch:

jobs:
  host-gemma:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install LM Studio via NPM
        run: |
          # Install Node.js if not present
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs
          
          # Install LM Studio CLI from npm
          npm install -g lm-studio-cli
          
          echo "✓ LM Studio CLI installed"

      - name: Download and Run Model with llama.cpp
        run: |
          # Install llama.cpp as alternative backend
          git clone https://github.com/ggerganov/llama.cpp
          cd llama.cpp
          make -j4
          
          # Download Gemma 4 E4B GGUF
          wget -O models/gemma-4-e4b.Q4_K_M.gguf \
            https://huggingface.co/bartowski/Google_Gemma-4-E4B-it-GGUF/resolve/main/Google_Gemma-4-E4B-it-Q4_K_M.gguf
          
          # Start server
          ./server -m models/gemma-4-e4b.Q4_K_M.gguf \
            --host 0.0.0.0 \
            --port 1234 \
            -ngl 32 \
            --ctx-size 4096 &
          
          # Wait for server
          sleep 10
          for i in {1..20}; do
            if curl -s http://localhost:1234/health > /dev/null 2>&1; then
              echo "✓ Server is ready!"
              break
            fi
            sleep 3
          done

      - name: Setup Cloudflare Tunnel
        uses: AnimMouse/setup-cloudflared@v2
        with:
          cloudflare_tunnel_credential: ${{ secrets.CLOUDFLARE_TUNNEL_CREDENTIAL }}
          cloudflare_tunnel_id: ${{ vars.CLOUDFLARE_TUNNEL_ID }}
          cloudflare_tunnel_configuration: ${{ vars.CLOUDFLARE_TUNNEL_CONFIGURATION }}

      - name: Keep Runner Alive
        run: sleep 21600
