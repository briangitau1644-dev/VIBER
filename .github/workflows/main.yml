# .github/workflows/main.yml
name: Roo Code - Qwen2.5-Coder 7B Server

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  
  MODEL_URL: 'https://huggingface.co/bartowski/Qwen2.5-Coder-7B-Instruct-GGUF/resolve/main/Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf'
  MODEL_PATH: 'models/Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf'
  SERVER_PORT: '1234'
  PROXY_PORT: '11434'
  LLAMA_REPO: 'https://github.com/ggml-org/llama.cpp'
  LLAMA_BRANCH: 'master'

jobs:
  qwen-coder-server:
    name: Qwen2.5-Coder-7B for Roo Code
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean environment
        run: |
          pkill -9 -f llama-server 2>/dev/null || true
          pkill -9 -f python3 2>/dev/null || true
          pkill -9 -f cloudflared 2>/dev/null || true
          sudo fuser -k 1234/tcp 2>/dev/null || true
          sudo fuser -k 11434/tcp 2>/dev/null || true
          rm -rf llama.cpp build models cloudflared proxy.py tunnel.log

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl wget cmake build-essential python3 python3-pip git

      - name: Build llama.cpp
        run: |
          git clone --depth 1 --branch master https://github.com/ggml-org/llama.cpp
          cd llama.cpp
          cmake -B build -DLLAMA_CURL=ON -DLLAMA_BUILD_SERVER=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)
          echo "SERVER_BIN=$(realpath build/bin/llama-server)" >> $GITHUB_ENV

      - name: Download model
        run: |
          mkdir -p models
          curl -fL --retry 3 -o "$MODEL_PATH" "$MODEL_URL"
          [ -f "$MODEL_PATH" ] && echo "Model downloaded" || exit 1

      - name: Start llama-server
        run: |
          $SERVER_BIN --model "$MODEL_PATH" --port 1234 --ctx-size 32768 --threads $(nproc) --chat-template qwen2.5 &
          sleep 15
          curl -sf http://localhost:1234/health || exit 1
          echo "llama-server running"

      - name: Create and start proxy
        run: |
          cat > proxy.py << 'EOF'
          #!/usr/bin/env python3
          import http.server
          import urllib.request
          import urllib.parse
          import json
          import time
          
          BACKEND = "http://localhost:1234"
          PORT = 11434
          
          class OpenAIProxy(http.server.BaseHTTPRequestHandler):
              def log_message(self, *args):
                  pass
              
              def do_OPTIONS(self):
                  self.send_response(200)
                  self.send_header("Access-Control-Allow-Origin", "*")
                  self.send_header("Access-Control-Allow-Methods", "GET, POST, OPTIONS")
                  self.send_header("Access-Control-Allow-Headers", "*")
                  self.end_headers()
              
              def _forward(self, method, path, body=None):
                  url = f"{BACKEND}{path}"
                  req = urllib.request.Request(url, data=body, headers={"Content-Type": "application/json"}, method=method)
                  try:
                      with urllib.request.urlopen(req, timeout=180) as resp:
                          return resp.getcode(), resp.read()
                  except urllib.error.HTTPError as e:
                      return e.code, e.read()
                  except Exception as e:
                      return 500, json.dumps({"error": str(e)}).encode()
              
              def _send(self, code, data):
                  self.send_response(code)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", len(data))
                  self.send_header("Access-Control-Allow-Origin", "*")
                  self.end_headers()
                  self.wfile.write(data)
              
              def _format_prompt(self, messages):
                  prompt = ""
                  for msg in messages:
                      role = msg.get('role', 'user')
                      content = msg.get('content', '')
                      prompt += f"<|im_start|>{role}\n{content}<|im_end|>\n"
                  prompt += "<|im_start|>assistant\n"
                  return prompt
              
              def do_GET(self):
                  path = urllib.parse.urlparse(self.path).path
                  if path in ['/', '/health', '/healthz']:
                      self._send(200, json.dumps({"status": "ok"}).encode())
                  elif path == '/v1/models':
                      self._send(200, json.dumps({"data": [{"id": "qwen2.5-coder"}]}).encode())
                  else:
                      self._send(404, json.dumps({"error": "Not found"}).encode())
              
              def do_POST(self):
                  length = int(self.headers.get('Content-Length', 0))
                  body = self.rfile.read(length)
                  path = urllib.parse.urlparse(self.path).path
                  
                  try:
                      data = json.loads(body) if body else {}
                      
                      if '/chat/completions' in path:
                          messages = data.get('messages', [])
                          if not any(m.get('role') == 'system' for m in messages):
                              messages.insert(0, {"role": "system", "content": "You are Qwen2.5-Coder, a helpful programming assistant."})
                          
                          prompt = self._format_prompt(messages)
                          llama_req = {
                              "prompt": prompt,
                              "n_predict": data.get('max_tokens', 4096),
                              "temperature": data.get('temperature', 0.7),
                              "stop": ["<|im_end|>"]
                          }
                          
                          code, resp = self._forward('POST', '/completion', json.dumps(llama_req).encode())
                          if code == 200:
                              llama_resp = json.loads(resp)
                              result = {
                                  "choices": [{
                                      "message": {"role": "assistant", "content": llama_resp.get('content', '')}
                                  }]
                              }
                              self._send(200, json.dumps(result).encode())
                          else:
                              self._send(code, resp)
                          return
                      
                      elif '/responses' in path:
                          messages = []
                          if 'input' in data:
                              inp = data['input']
                              if isinstance(inp, str):
                                  messages = [{"role": "user", "content": inp}]
                              elif isinstance(inp, list):
                                  for item in inp:
                                      if isinstance(item, dict):
                                          messages.append({"role": item.get('role', 'user'), "content": item.get('content', '')})
                          
                          if not any(m.get('role') == 'system' for m in messages):
                              messages.insert(0, {"role": "system", "content": "You are Qwen2.5-Coder."})
                          
                          prompt = self._format_prompt(messages)
                          llama_req = {"prompt": prompt, "n_predict": data.get('max_output_tokens', 4096)}
                          code, resp = self._forward('POST', '/completion', json.dumps(llama_req).encode())
                          
                          if code == 200:
                              llama_resp = json.loads(resp)
                              result = {
                                  "output": [{
                                      "type": "message",
                                      "role": "assistant",
                                      "content": [{"type": "output_text", "text": llama_resp.get('content', '')}]
                                  }]
                              }
                              self._send(200, json.dumps(result).encode())
                          else:
                              self._send(code, resp)
                          return
                      
                      else:
                          code, resp = self._forward('POST', path, body)
                          self._send(code, resp)
                          
                  except Exception as e:
                      self._send(500, json.dumps({"error": str(e)}).encode())
          
          http.server.HTTPServer(('0.0.0.0', PORT), OpenAIProxy).serve_forever()
          EOF
          
          python3 proxy.py &
          sleep 5
          curl -sf http://localhost:11434/health || exit 1
          echo "Proxy running"

      - name: Start Cloudflare Tunnel
        run: |
          # Download cloudflared with curl (more reliable)
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          ls -la cloudflared  # Verify it exists
          
          # Start tunnel
          ./cloudflared tunnel --url http://localhost:11434 --no-autoupdate > tunnel.log 2>&1 &
          CF_PID=$!
          echo "CF_PID=${CF_PID}" >> $GITHUB_ENV
          
          # Wait for URL
          echo "Waiting for tunnel URL..."
          TUNNEL_URL=""
          for i in {1..30}; do
            sleep 2
            if [ -f tunnel.log ]; then
              TUNNEL_URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' tunnel.log | head -1)
              if [ -n "$TUNNEL_URL" ]; then
                echo "TUNNEL_URL=${TUNNEL_URL}" >> $GITHUB_ENV
                echo "Found tunnel: ${TUNNEL_URL}"
                break
              fi
            fi
            echo "Attempt $i/30..."
          done
          
          # Show log for debugging
          echo "Tunnel log:"
          cat tunnel.log

      - name: Display connection info
        if: env.TUNNEL_URL != ''
        run: |
          echo "========================================="
          echo "✅ SERVER IS RUNNING!"
          echo "========================================="
          echo ""
          echo "🌐 TUNNEL URL: ${TUNNEL_URL}"
          echo ""
          echo "📝 CONTINUE CONFIGURATION:"
          echo "-----------------------------------------"
          echo "name: Qwen2.5-Coder"
          echo "version: 1.0.0"
          echo "schema: v1"
          echo "models:"
          echo "  - name: Qwen2.5-Coder"
          echo "    provider: openai"
          echo "    model: qwen2.5-coder"
          echo "    apiBase: ${TUNNEL_URL}/v1"
          echo "    apiKey: any"
          echo "    stream: false"
          echo "    timeout: 900"
          echo ""
          echo "🧪 TEST WITH CURL:"
          echo "-----------------------------------------"
          echo "curl -X POST ${TUNNEL_URL}/v1/chat/completions \\"
          echo "  -H \"Content-Type: application/json\" \\"
          echo "  -d '{\"messages\":[{\"role\":\"user\",\"content\":\"Say hello\"}]}'"
          echo ""
          echo "========================================="
          
          # Save to step summary
          echo "## 🚀 Server is Running!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tunnel URL:** \`${TUNNEL_URL}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Continue Configuration:" >> $GITHUB_STEP_SUMMARY
          echo '```yaml' >> $GITHUB_STEP_SUMMARY
          echo "apiBase: ${TUNNEL_URL}/v1" >> $GITHUB_STEP_SUMMARY
          echo "model: qwen2.5-coder" >> $GITHUB_STEP_SUMMARY
          echo "apiKey: any" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Command:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "curl -X POST ${TUNNEL_URL}/v1/chat/completions \\" >> $GITHUB_STEP_SUMMARY
          echo "  -H \"Content-Type: application/json\" \\" >> $GITHUB_STEP_SUMMARY
          echo "  -d '{\"messages\":[{\"role\":\"user\",\"content\":\"Hello\"}]}'" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Fallback - Show tunnel log if no URL
        if: env.TUNNEL_URL == ''
        run: |
          echo "⚠️ No tunnel URL found. Showing log:"
          cat tunnel.log
          echo ""
          echo "Checking if cloudflared is running:"
          ps aux | grep cloudflared

      - name: Keep workflow alive
        run: |
          echo "Keeping server alive..."
          while true; do
            if [ -n "${TUNNEL_URL}" ]; then
              echo "✅ Tunnel active: ${TUNNEL_URL}"
            else
              echo "⚠️ Waiting for tunnel URL..."
              # Check if we can get it now
              if [ -f tunnel.log ]; then
                NEW_URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' tunnel.log | head -1)
                if [ -n "$NEW_URL" ]; then
                  echo "TUNNEL_URL=${NEW_URL}" >> $GITHUB_ENV
                  echo "✅ Found tunnel: ${NEW_URL}"
                fi
              fi
            fi
            sleep 60
          done
