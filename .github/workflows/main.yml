app = FastAPI(
    title="Ollama Proxy with Tool Calling",
    description="OpenAI & Anthropic compatible proxy for Ollama with full tool calling support",
    version="1.0.0"
)

app.add_middleware(
    CORSMiddleware,
    allow_origins=["*"],
    allow_credentials=True,
    allow_methods=["*"],
    allow_headers=["*"],
    expose_headers=["*"]
)

# Pydantic models for request validation
class ChatMessage(BaseModel):
    role: str
    content: Union[str, List[Dict]] = ""
    tool_calls: Optional[List[Dict]] = None
    tool_call_id: Optional[str] = None
    name: Optional[str] = None

class ChatCompletionRequest(BaseModel):
    model: Optional[str] = MODEL
    messages: List[ChatMessage]
    max_tokens: Optional[int] = 2048
    temperature: Optional[float] = 0.7
    stream: Optional[bool] = False
    tools: Optional[List[Dict]] = None
    tool_choice: Optional[Union[str, Dict]] = "auto"

@app.get("/")
async def root():
    return {
        "service": "Ollama Proxy with Tool Calling",
        "version": "1.0.0",
        "model": MODEL,
        "endpoints": [
            "/v1/chat/completions (OpenAI)",
            "/v1/messages (Anthropic)",
            "/v1/models",
            "/v1/tools",
            "/health"
        ]
    }

@app.get("/health")
async def health():
    """Health check endpoint"""
    try:
        resp = ollama_session.get(f"{OLLAMA_BASE}/api/tags", timeout=3)
        if resp.status_code == 200:
            models = [m.get("name", "") for m in resp.json().get("models", [])]
            return {
                "status": "ready" if MODEL in models else "degraded",
                "model": MODEL,
                "model_loaded": MODEL in models,
                "ollama_ok": True,
                "available_models": models[:10]  # Limit response size
            }
    except Exception as e:
        pass
    return {"status": "down", "model": MODEL, "error": str(e)}

@app.get("/v1/models")
async def list_models():
    """List available models (OpenAI format)"""
    try:
        resp = ollama_session.get(f"{OLLAMA_BASE}/api/tags", timeout=5)
        if resp.status_code == 200:
            data = [
                {
                    "id": m.get("name", ""),
                    "object": "model",
                    "owned_by": "ollama",
                    "created": int(time.time())
                }
                for m in resp.json().get("models", [])
            ]
            return {"object": "list", "data": data if data else [{"id": MODEL, "object": "model", "owned_by": "ollama"}]}
    except:
        pass
    return {"object": "list", "data": [{"id": MODEL, "object": "model", "owned_by": "ollama"}]}

@app.get("/v1/tools")
async def list_tools():
    """List available built-in tools"""
    return {
        "tools": TOOL_DEFINITIONS,
        "count": len(TOOL_DEFINITIONS),
        "note": "These tools are executed server-side when the model requests them"
    }

@app.post("/v1/chat/completions")
async def openai_chat(request: Request):
    """OpenAI-compatible chat completions endpoint with tool calling"""
    # Parse request
    try:
        body = await request.json()
    except json.JSONDecodeError:
        raise HTTPException(400, "Invalid JSON body")
    
    try:
        req = ChatCompletionRequest(**body)
    except Exception as e:
        raise HTTPException(400, f"Request validation failed: {e}")
    
    # Convert messages
    messages = [m.model_dump() for m in req.messages]
    
    # Handle tool_choice
    tool_choice = req.tool_choice
    if isinstance(tool_choice, dict):
        tool_choice = tool_choice.get("type", "auto")
    
    # Determine effective tools
    if tool_choice == "none":
        effective_tools = None
    elif req.tools is not None:
        effective_tools = req.tools
    else:
        effective_tools = TOOL_DEFINITIONS  # Use built-in tools
    
    # Streaming response
    if req.stream:
        return StreamingResponse(
            _generate_openai_stream(messages, effective_tools, req.max_tokens, req.temperature),
            media_type="text/event-stream",
            headers={
                "Cache-Control": "no-cache",
                "Connection": "keep-alive",
                "X-Accel-Buffering": "no"
            }
        )
    
    # Non-streaming response
    try:
        result = _ollama_chat_sync(messages, effective_tools, req.max_tokens, req.temperature)
        msg = result.get("message", {})
        content = msg.get("content") or ""
        ollama_tcs = msg.get("tool_calls") or []
        
        # Build response message
        response_msg = {"role": "assistant", "content": content or None}
        finish_reason = "stop"
        
        if ollama_tcs:
            response_msg["tool_calls"] = _ollama_tool_calls_to_oai(ollama_tcs)
            finish_reason = "tool_calls"
        
        return {
            "id": f"chatcmpl-{uuid.uuid4().hex[:8]}",
            "object": "chat.completion",
            "created": int(time.time()),
            "model": MODEL,
            "choices": [{
                "index": 0,
                "message": response_msg,
                "finish_reason": finish_reason
            }],
            "usage": {
                "prompt_tokens": result.get("prompt_eval_count", 0),
                "completion_tokens": result.get("eval_count", 0),
                "total_tokens": result.get("prompt_eval_count", 0) + result.get("eval_count", 0)
            }
        }
        
    except HTTPException:
        raise
    except Exception as e:
        raise HTTPException(503, f"Chat completion failed: {e}")

@app.post("/v1/messages")
async def anthropic_messages(request: Request):
    """Anthropic-compatible messages endpoint with tool calling"""
    try:
        body = await request.json()
    except json.JSONDecodeError:
        raise HTTPException(400, "Invalid JSON body")
    
    # Extract parameters
    system = body.get("system", "")
    messages = body.get("messages", [])
    max_tokens = body.get("max_tokens", 2048)
    temperature = body.get("temperature", 0.7)
    stream = body.get("stream", False)
    tools = body.get("tools")
    tool_choice = body.get("tool_choice", {"type": "auto"})
    
    # Handle tool_choice
    if isinstance(tool_choice, dict):
        tc_type = tool_choice.get("type", "auto")
    else:
        tc_type = str(tool_choice)
    
    # Build full messages list with system
    full_messages = []
    if system:
        full_messages.append({"role": "system", "content": system})
    full_messages.extend(messages)
    
    # Determine effective tools
    if tc_type == "none":
        effective_tools = None
    elif tools:
        effective_tools = _anthropic_tools_to_ollama(tools)
    else:
        effective_tools = _oai_tools_to_ollama(TOOL_DEFINITIONS)
    
    # Streaming response
    if stream:
        return StreamingResponse(
            _generate_anthropic_stream(full_messages, effective_tools, max_tokens, temperature),
            media_type="text/event-stream",
            headers={
                "Cache-Control": "no-cache",
                "Connection": "keep-alive",
                "X-Accel-Buffering": "no"
            }
        )
    
    # Non-streaming response
    try:
        result = _ollama_chat_sync(full_messages, effective_tools, max_tokens, temperature)
        msg = result.get("message", {})
        content = msg.get("content") or ""
        ollama_tcs = msg.get("tool_calls") or []
        
        # Build content blocks
        content_blocks = []
        if content:
            content_blocks.append({"type": "text", "text": content})
        
        stop_reason = "end_turn"
        
        # Add tool calls
        for tc in ollama_tcs:
            fn = tc.get("function", {})
            args = fn.get("arguments", {})
            content_blocks.append({
                "type": "tool_use",
                "id": f"toolu_{uuid.uuid4().hex[:8]}",
                "name": fn.get("name", ""),
                "input": args if isinstance(args, dict) else {}
            })
            stop_reason = "tool_use"
        
        return {
            "id": f"msg_{uuid.uuid4().hex[:8]}",
            "type": "message",
            "role": "assistant",
            "model": MODEL,
            "content": content_blocks,
            "stop_reason": stop_reason,
            "stop_sequence": None,
            "usage": {
                "input_tokens": result.get("prompt_eval_count", 0),
                "output_tokens": result.get("eval_count", 0)
            }
        }
        
    except HTTPException:
        raise
    except Exception as e:
        raise HTTPException(503, f"Messages endpoint failed: {e}")

@app.post("/v1/tool/execute")
async def execute_tool(request: Request):
    """Direct tool execution endpoint for testing"""
    try:
        body = await request.json()
        tool_name = body.get("name")
        arguments = body.get("arguments", {})
        
        if not tool_name:
            raise HTTPException(400, "Missing 'name' field")
        
        result = tool_executor.execute(tool_name, arguments)
        return {"tool": tool_name, "result": json.loads(result)}
        
    except HTTPException:
        raise
    except Exception as e:
        raise HTTPException(500, f"Tool execution failed: {e}")

# Catch-all for undefined routes
@app.api_route("/{path:path}", methods=["GET", "POST", "PUT", "DELETE"])
async def catch_all(path: str):
    return JSONResponse(
        {"error": "Not found", "path": f"/{path}", "available_endpoints": [
            "/", "/health", "/v1/models", "/v1/tools", 
            "/v1/chat/completions", "/v1/messages", "/v1/tool/execute"
        ]},
        status_code=404
    )

