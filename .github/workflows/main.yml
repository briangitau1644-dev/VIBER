name: Host Gemma 4 E4B for Roo Code
on:
  workflow_dispatch:

jobs:
  host-gemma:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ollama
        run: |
          # Get the latest version number from GitHub API
          echo "Fetching latest Ollama version..."
          LATEST_VERSION=$(curl -s https://api.github.com/repos/ollama/ollama/releases/latest | grep -oP '"tag_name": "\K(.*?)(?=")')
          echo "Latest version: $LATEST_VERSION"
          
          # Download Ollama binary from GitHub releases (correct URL)
          echo "Downloading Ollama binary..."
          sudo curl -L "https://github.com/ollama/ollama/releases/download/${LATEST_VERSION}/ollama-linux-amd64" -o /usr/local/bin/ollama
          
          # Make it executable
          sudo chmod +x /usr/local/bin/ollama
          
          # Verify download was successful (should be ~100MB+)
          FILE_SIZE=$(stat -c%s /usr/local/bin/ollama 2>/dev/null || stat -f%z /usr/local/bin/ollama 2>/dev/null)
          echo "Downloaded file size: $FILE_SIZE bytes"
          
          if [ "$FILE_SIZE" -lt 10000000 ]; then
            echo "ERROR: Ollama binary download failed - file too small ($FILE_SIZE bytes)"
            echo "Trying alternative download method..."
            
            # Alternative: Use wget with specific user agent
            sudo wget --user-agent="Mozilla/5.0" -O /usr/local/bin/ollama "https://github.com/ollama/ollama/releases/download/v0.3.14/ollama-linux-amd64"
            sudo chmod +x /usr/local/bin/ollama
            
            NEW_SIZE=$(stat -c%s /usr/local/bin/ollama 2>/dev/null || stat -f%z /usr/local/bin/ollama 2>/dev/null)
            if [ "$NEW_SIZE" -lt 10000000 ]; then
              echo "ERROR: Still failing. Installing via official script instead..."
              curl -fsSL https://ollama.com/install.sh | sh
            fi
          fi
          
          # Start Ollama
          echo "Starting Ollama service..."
          ollama serve > ollama.log 2>&1 &
          
          # Wait for Ollama to be ready
          echo "Waiting for Ollama API to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✓ Ollama is ready!"
              break
            fi
            echo "Attempt $i/30 - Ollama starting up..."
            sleep 3
          done
          
          # Final verification
          if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
            echo "✓ Ollama API is responding"
            ollama --version
          else
            echo "ERROR: Ollama failed to start. Showing log:"
            cat ollama.log
            exit 1
          fi

      - name: Pull Gemma 4 E4B
        run: |
          echo "Pulling gemma4:e4b model..."
          echo "Size: ~9.6GB"
          echo "This may take 20-40 minutes..."
          ollama pull gemma4:e4b
          echo "✓ Model pull complete!"

      - name: Verify Model
        run: |
          echo "Available models:"
          ollama list
          echo ""
          echo "Testing model..."
          echo '{"model":"gemma4:e4b","prompt":"Say hello","stream":false}' | \
            curl -X POST http://localhost:11434/api/generate -H "Content-Type: application/json" -d @- | \
            grep -o '"response":"[^"]*"' || echo "Test completed"

      - name: Setup Cloudflare Tunnel
        uses: AnimMouse/setup-cloudflared@v2
        with:
          cloudflare_tunnel_credential: ${{ secrets.CLOUDFLARE_TUNNEL_CREDENTIAL }}
          cloudflare_tunnel_id: ${{ vars.CLOUDFLARE_TUNNEL_ID }}
          cloudflare_tunnel_configuration: ${{ vars.CLOUDFLARE_TUNNEL_CONFIGURATION }}

      - name: Display Connection Info
        run: |
          echo "=========================================="
          echo "✓ Ollama API: http://localhost:11434"
          echo "✓ Model: gemma4:e4b"
          echo "✓ Status: Ready for connections"
          echo "=========================================="
          echo ""
          echo "Runner will stay alive for 6 hours"

      - name: Keep Runner Alive
        run: sleep 21600
