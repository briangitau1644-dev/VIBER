# .github/workflows/ollama-proxy.yml
name: Ollama Proxy - 6 Hour Session

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Ollama model to use'
        required: false
        default: 'sorc/qwen3.5-claude-4.6-opus:4b'
      enable_gpu_busy:
        description: 'Enable GPU busy loop'
        required: false
        default: 'true'
      enable_ram_pressure:
        description: 'Enable RAM pressure'
        required: false
        default: 'false'
      activity_log_interval:
        description: 'Activity log interval (seconds)'
        required: false
        default: '15'

env:
  MODEL: ${{ github.event.inputs.model || 'sorc/qwen3.5-claude-4.6-opus:4b' }}
  GPU_BUSY_ENABLED: ${{ github.event.inputs.enable_gpu_busy || 'true' }}
  RAM_PRESSURE_ENABLED: ${{ github.event.inputs.enable_ram_pressure || 'false' }}
  ACTIVITY_LOG_INTERVAL: ${{ github.event.inputs.activity_log_interval || '15' }}
  KEEPALIVE_INTERVAL: '10'
  PROXY_PORT: '8000'
  OLLAMA_PORT: '11434'
  SESSION_DURATION: 21600  # 6 hours in seconds

jobs:
  ollama-proxy:
    name: Ollama Proxy Server (6h)
    runs-on: ubuntu-latest
    timeout-minutes: 400  # ~6.6 hours
    
    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 Install System Dependencies
        run: |
          echo "🔧 Installing system packages..."
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            wget \
            lsof \
            net-tools \
            build-essential \
            git
          echo "✅ System packages installed"

      - name: 📥 Install Python Dependencies
        run: |
          echo " Installing Python packages..."
          pip install --upgrade pip
          pip install \
            fastapi \
            uvicorn[standard] \
            requests \
            pydantic \
            starlette \
            torch --index-url https://download.pytorch.org/whl/cpu
          echo "✅ Python packages installed"

      - name: 📥 Install Ollama
        run: |
          echo "🔧 Installing Ollama..."
          curl -fsSL https://ollama.com/install.sh | sh
          echo "✅ Ollama installed"
          
      - name: 📥 Install Cloudflared
        run: |
          echo "🔧 Installing cloudflared..."
          curl -fsSL -o /tmp/cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i /tmp/cloudflared.deb
          rm -f /tmp/cloudflared.deb
          cloudflared --version
          echo "✅ Cloudflared installed"

      - name: 🚀 Start Ollama Server
        run: |
          echo "🚀 Starting Ollama server in background..."
          export OLLAMA_HOST="127.0.0.1:${{ env.OLLAMA_PORT }}"
          export OLLAMA_ORIGINS="*"
          export OLLAMA_NUM_PARALLEL="1"
          export OLLAMA_KEEP_ALIVE="-1"
          export OLLAMA_MAX_LOADED_MODELS="1"
          nohup ollama serve > ollama.log 2>&1 &
          OLLAMA_PID=$!
          echo "Ollama PID: $OLLAMA_PID"
          echo "OLLAMA_PID=$OLLAMA_PID" >> $GITHUB_ENV
          
          echo "⏳ Waiting for Ollama to be ready..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/tags > /dev/null 2>&1; then
              echo "✅ Ollama is ready!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Ollama failed to start"
              exit 1
            fi
            echo "  Waiting... ($i/30)"
            sleep 2
          done

      - name: 📦 Pull Model
        run: |
          echo "📦 Pulling model: ${{ env.MODEL }}..."
          export OLLAMA_HOST="127.0.0.1:${{ env.OLLAMA_PORT }}"
          ollama pull ${{ env.MODEL }}
          echo "✅ Model pulled successfully"

      - name: 📝 Create Proxy Script
        run: |
          cat > proxy_server.py << 'PYTHON_SCRIPT'
          #!/usr/bin/env python3
          """
          Ollama Proxy Server - GitHub Actions Edition
          Simplified version for CI/CD environment
          """
          
          import os
          import sys
          import json
          import time
          import threading
          import random
          import subprocess
          from datetime import datetime
          from pathlib import Path
          
          # Try to import torch for GPU busy loop
          try:
              import torch
              TORCH_AVAILABLE = True
          except ImportError:
              TORCH_AVAILABLE = False
          
          # Config from environment
          MODEL = os.getenv('MODEL', 'sorc/qwen3.5-claude-4.6-opus:4b')
          OLLAMA_BASE = f"http://127.0.0.1:{os.getenv('OLLAMA_PORT', '11434')}"
          PROXY_PORT = int(os.getenv('PROXY_PORT', '8000'))
          GPU_BUSY_ENABLED = os.getenv('GPU_BUSY_ENABLED', 'true').lower() == 'true'
          RAM_PRESSURE_ENABLED = os.getenv('RAM_PRESSURE_ENABLED', 'false').lower() == 'true'
          RAM_PRESSURE_MB = int(os.getenv('RAM_PRESSURE_MB', '512'))
          ACTIVITY_LOG_INTERVAL = float(os.getenv('ACTIVITY_LOG_INTERVAL', '15'))
          KEEPALIVE_INTERVAL = float(os.getenv('KEEPALIVE_INTERVAL', '10'))
          SESSION_DURATION = int(os.getenv('SESSION_DURATION', '21600'))
          
          print(f"⚡ GitHub Actions Proxy - GPU_BUSY={GPU_BUSY_ENABLED}, RAM_PRESSURE={RAM_PRESSURE_ENABLED}")
          
          # Global RAM buffer
          _ram_buffer = None
          
          def log(msg):
              """Print timestamped log message"""
              timestamp = datetime.now().strftime('%H:%M:%S')
              print(f"[{timestamp}] {msg}", flush=True)
          
          def get_gpu_stats():
              """Get GPU stats if available"""
              if not TORCH_AVAILABLE or not torch.cuda.is_available():
                  return "N/A (no CUDA)"
              try:
                  used = torch.cuda.memory_allocated() / 1024**2
                  total = torch.cuda.get_device_properties(0).total_memory / 1024**2
                  return f"{used:.0f}MB/{total:.0f}MB"
              except:
                  return "N/A"
          
          def gpu_busy_loop():
              """Keep GPU busy with periodic operations"""
              if not GPU_BUSY_ENABLED or not TORCH_AVAILABLE or not torch.cuda.is_available():
                  log("⚠️  GPU busy loop disabled or CUDA unavailable")
                  return
              
              log("⚡ Starting GPU busy loop...")
              device = torch.device("cuda:0")
              
              while True:
                  try:
                      # Small matrix multiply
                      a = torch.randn(128, 128, device=device, dtype=torch.float16)
                      b = torch.randn(128, 128, device=device, dtype=torch.float16)
                      _ = torch.mm(a, b)
                      torch.cuda.synchronize()
                      log(f"🎯 GPU pulse @ {datetime.now().strftime('%H:%M:%S')}")
                  except Exception as e:
                      log(f"⚠️  GPU op failed: {e}")
                  time.sleep(5 + random.uniform(-1, 1))
          
          def ram_pressure_thread():
              """Maintain RAM pressure"""
              global _ram_buffer
              if not RAM_PRESSURE_ENABLED or RAM_PRESSURE_MB <= 0:
                  log("💾 RAM pressure disabled")
                  return
              
              log(f"💾 Allocating {RAM_PRESSURE_MB} MB RAM pressure...")
              try:
                  _ram_buffer = bytearray(RAM_PRESSURE_MB * 1024 * 1024)
                  for i in range(0, len(_ram_buffer), 4096):
                      _ram_buffer[i] = 1
                  log(f"✅ Reserved {RAM_PRESSURE_MB} MB")
              except MemoryError:
                  log(f"⚠️  Could not reserve {RAM_PRESSURE_MB} MB")
              
              while True:
                  if _ram_buffer:
                      _ram_buffer[0] = 1
                      _ram_buffer[-1] = 1
                  time.sleep(30)
          
          def activity_logger():
              """Log system activity periodically"""
              import psutil
              
              while True:
                  try:
                      gpu_stats = get_gpu_stats()
                      ram = psutil.virtual_memory()
                      cpu = psutil.cpu_percent(interval=1)
                      
                      log(f"📊 Status | GPU: {gpu_stats} | RAM: {ram.percent}% | CPU: {cpu}%")
                  except Exception as e:
                      log(f"⚠️  Logger error: {e}")
                  
                  time.sleep(ACTIVITY_LOG_INTERVAL)
          
          def ollama_keepalive():
              """Keep Ollama model loaded"""
              import requests
              
              session = requests.Session()
              log(f"⚡ Starting Ollama keepalive (every {KEEPALIVE_INTERVAL}s)...")
              
              while True:
                  try:
                      resp = session.post(
                          f"{OLLAMA_BASE}/api/generate",
                          json={
                              "model": MODEL,
                              "prompt": ".",
                              "keep_alive": -1,
                              "stream": False,
                              "options": {"num_predict": 1}
                          },
                          timeout=(5, 30)
                      )
                      if resp.status_code == 200:
                          log(f"💓 Model ping OK @ {datetime.now().strftime('%H:%M:%S')}")
                      else:
                          log(f"⚠️  Model ping failed: HTTP {resp.status_code}")
                  except Exception as e:
                      log(f"⚠️  Keepalive error: {e}")
                  
                  time.sleep(KEEPALIVE_INTERVAL + random.uniform(-1, 1))
          
          def start_background_threads():
              """Start all background maintenance threads"""
              threads = []
              
              # GPU busy loop
              if GPU_BUSY_ENABLED:
                  t = threading.Thread(target=gpu_busy_loop, daemon=True, name="gpu_busy")
                  t.start()
                  threads.append(t)
              
              # RAM pressure
              if RAM_PRESSURE_ENABLED:
                  t = threading.Thread(target=ram_pressure_thread, daemon=True, name="ram_pressure")
                  t.start()
                  threads.append(t)
              
              # Activity logger
              t = threading.Thread(target=activity_logger, daemon=True, name="activity_logger")
              t.start()
              threads.append(t)
              
              # Ollama keepalive
              t = threading.Thread(target=ollama_keepalive, daemon=True, name="ollama_keepalive")
              t.start()
              threads.append(t)
              
              log(f"✅ Started {len(threads)} background threads")
              return threads
          
          def run_proxy_server():
              """Run the FastAPI proxy server"""
              import requests
              from fastapi import FastAPI, Request, HTTPException
              from fastapi.middleware.cors import CORSMiddleware
              from fastapi.responses import StreamingResponse, JSONResponse
              import uvicorn
              
              app = FastAPI(title="Ollama Proxy", version="1.0.0")
              app.add_middleware(CORSMiddleware, allow_origins=["*"], allow_credentials=True,
                               allow_methods=["*"], allow_headers=["*"])
              
              ollama_session = requests.Session()
              
              @app.get("/")
              async def root():
                  return {"service": "Ollama Proxy", "model": MODEL, "status": "running"}
              
              @app.get("/health")
              async def health():
                  try:
                      resp = ollama_session.get(f"{OLLAMA_BASE}/api/tags", timeout=3)
                      if resp.status_code == 200:
                          models = [m.get("name", "") for m in resp.json().get("models", [])]
                          return {
                              "status": "ready",
                              "model": MODEL,
                              "model_loaded": MODEL in models,
                              "ollama_ok": True
                          }
                  except:
                      pass
                  return {"status": "down", "model": MODEL}
              
              @app.post("/v1/chat/completions")
              async def chat_completions(request: Request):
                  try:
                      body = await request.json()
                  except:
                      raise HTTPException(400, "Invalid JSON")
                  
                  messages = body.get("messages", [])
                  stream = body.get("stream", False)
                  
                  try:
                      resp = ollama_session.post(
                          f"{OLLAMA_BASE}/api/chat",
                          json={
                              "model": MODEL,
                              "messages": messages,
                              "stream": stream,
                              "keep_alive": -1
                          },
                          timeout=(10, 300),
                          stream=stream
                      )
                      
                      if stream:
                          def generate():
                              for chunk in resp.iter_content(chunk_size=1024):
                                  if chunk:
                                      yield chunk
                          return StreamingResponse(generate(), media_type="text/event-stream")
                      else:
                          return JSONResponse(content=resp.json())
                  
                  except Exception as e:
                      raise HTTPException(503, f"Ollama error: {e}")
              
              @app.get("/v1/models")
              async def list_models():
                  try:
                      resp = ollama_session.get(f"{OLLAMA_BASE}/api/tags", timeout=5)
                      if resp.status_code == 200:
                          data = [{"id": m.get("name"), "object": "model", "owned_by": "ollama"}
                                  for m in resp.json().get("models", [])]
                          return {"object": "list", "data": data}
                  except:
                      pass
                  return {"object": "list", "data": []}
              
              log(f"🚀 Starting proxy server on port {PROXY_PORT}...")
              
              # Start background threads
              start_background_threads()
              
              # Run uvicorn
              uvicorn.run(app, host="0.0.0.0", port=PROXY_PORT, log_level="warning")
          
          if __name__ == "__main__":
              log("=" * 68)
              log("  Ollama Proxy Server - GitHub Actions Edition")
              log("=" * 68)
              log(f"🤖 Model: {MODEL}")
              log(f"⏱️  Session Duration: {SESSION_DURATION}s ({SESSION_DURATION/3600:.1f}h)")
              log(f"🌐 Proxy Port: {PROXY_PORT}")
              log(f"🔌 Ollama Port: {os.getenv('OLLAMA_PORT', '11434')}")
              log("=" * 68)
              
              # Install psutil if needed
              try:
                  import psutil
              except ImportError:
                  import subprocess
                  log("📦 Installing psutil...")
                  subprocess.run([sys.executable, "-m", "pip", "install", "psutil", "-q"], check=True)
                  import psutil
              
              # Run the proxy
              run_proxy_server()
          PYTHON_SCRIPT
          
          chmod +x proxy_server.py
          echo "✅ Proxy script created"

      - name: 🚀 Start Proxy Server
        run: |
          echo "🚀 Starting proxy server..."
          
          # Kill any existing processes on ports
          sudo fuser -k ${{ env.PROXY_PORT }}/tcp 2>/dev/null || true
          sudo fuser -k ${{ env.OLLAMA_PORT }}/tcp 2>/dev/null || true
          sleep 2
          
          # Start proxy in background
          nohup python3 proxy_server.py > proxy.log 2>&1 &
          PROXY_PID=$!
          echo "Proxy PID: $PROXY_PID"
          echo "PROXY_PID=$PROXY_PID" >> $GITHUB_ENV
          
          # Wait for proxy to be ready
          echo "⏳ Waiting for proxy to be ready..."
          for i in {1..20}; do
            if curl -s http://127.0.0.1:${{ env.PROXY_PORT }}/health > /dev/null 2>&1; then
              echo "✅ Proxy is ready!"
              curl -s http://127.0.0.1:${{ env.PROXY_PORT }}/health | python3 -m json.tool
              break
            fi
            if [ $i -eq 20 ]; then
              echo "❌ Proxy failed to start"
              echo "=== Proxy Log ==="
              cat proxy.log || true
              exit 1
            fi
            echo "  Waiting... ($i/20)"
            sleep 3
          done

      - name: 📡 Show Tunnel Info (Optional)
        run: |
          echo "📡 To expose via cloudflared tunnel, run in separate terminal:"
          echo "   cloudflared tunnel --url http://localhost:${{ env.PROXY_PORT }}"
          echo ""
          echo "📊 Current proxy health:"
          curl -s http://127.0.0.1:${{ env.PROXY_PORT }}/health | python3 -m json.tool || echo "Proxy not responding"

      - name: ⏱️  Session Pulser (6 Hours)
        run: |
          echo "⏱️  Starting 6-hour session pulser..."
          echo "📝 This will keep the workflow active and log status"
          echo ""
          
          START_TIME=$(date +%s)
          END_TIME=$((START_TIME + ${{ env.SESSION_DURATION }}))
          INTERVAL=300  # Log every 5 minutes
          
          while [ $(date +%s) -lt $END_TIME ]; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            REMAINING=$((END_TIME - CURRENT_TIME))
            
            # Calculate percentages
            ELAPSED_PCT=$((ELAPSED * 100 / ${{ env.SESSION_DURATION }}))
            REMAINING_HOURS=$((REMAINING / 3600))
            REMAINING_MINS=$(((REMAINING % 3600) / 60))
            
            echo ""
            echo "═══════════════════════════════════════════════════════════"
            echo "⏰ Session Status - $(date '+%Y-%m-%d %H:%M:%S')"
            echo "═══════════════════════════════════════════════════════════"
            echo "⏱️  Elapsed:  ${ELAPSED_PCT}% (${ELAPSED}s / ${{ env.SESSION_DURATION }}s)"
            echo "⏳ Remaining: ${REMAINING_HOURS}h ${REMAINING_MINS}m"
            echo "═══════════════════════════════════════════════════════════"
            
            # Check proxy health
            HEALTH=$(curl -s http://127.0.0.1:${{ env.PROXY_PORT }}/health 2>/dev/null || echo '{"status":"error"}')
            STATUS=$(echo $HEALTH | python3 -c "import sys, json; print(json.load(sys.stdin).get('status', 'unknown'))" 2>/dev/null || echo "unknown")
            echo "🏥 Proxy Status: $STATUS"
            
            # Check Ollama
            OLLAMA_STATUS=$(curl -s http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/tags 2>/dev/null | python3 -c "import sys, json; d=json.load(sys.stdin); print(f'✅ {len(d.get(\"models\", []))} models loaded')" 2>/dev/null || echo "❌ Not responding")
            echo "🤖 Ollama: $OLLAMA_STATUS"
            
            # System stats
            echo "💻 System:"
            echo "   CPU: $(top -bn1 | grep "Cpu(s)" | awk '{print $2 + $4 "%"}' 2>/dev/null || echo "N/A")"
            echo "   RAM: $(free -h | awk '/^Mem:/ {print $3 "/" $2 " (" $3/$2*100 "%)"}' 2>/dev/null || echo "N/A")"
            echo "   Disk: $(df -h / | awk 'NR==2 {print $3 "/" $2 " (" $5 ")"}' 2>/dev/null || echo "N/A")"
            
            # Show proxy log tail
            echo ""
            echo "📝 Recent proxy activity:"
            tail -n 10 proxy.log 2>/dev/null | sed 's/^/   /' || echo "   (no logs)"
            
            echo "═══════════════════════════════════════════════════════════"
            echo ""
            
            # Sleep until next interval
            sleep $INTERVAL
          done
          
          echo ""
          echo "🏁 Session completed! Total duration: ${{ env.SESSION_DURATION }}s"

      - name: 📊 Final Status
        if: always()
        run: |
          echo "📊 Final Session Report"
          echo "═══════════════════════════════════════════════════════════"
          
          # Show final proxy health
          echo "🏥 Final Proxy Health:"
          curl -s http://127.0.0.1:${{ env.PROXY_PORT }}/health 2>/dev/null | python3 -m json.tool || echo "Proxy not responding"
          
          echo ""
          echo "📝 Last 20 lines of proxy log:"
          tail -n 20 proxy.log 2>/dev/null || echo "(no logs)"
          
          echo ""
          echo "📝 Last 20 lines of Ollama log:"
          tail -n 20 ollama.log 2>/dev/null || echo "(no logs)"
          
          echo ""
          echo "═══════════════════════════════════════════════════════════"
          echo "✅ Session completed successfully!"

      - name: 🛑 Cleanup
        if: always()
        run: |
          echo "🛑 Cleaning up..."
          
          # Kill proxy
          if [ ! -z "${{ env.PROXY_PID }}" ]; then
            kill -9 ${{ env.PROXY_PID }} 2>/dev/null || true
            echo "✅ Killed proxy (PID ${{ env.PROXY_PID }})"
          fi
          
          # Kill Ollama
          if [ ! -z "${{ env.OLLAMA_PID }}" ]; then
            kill -9 ${{ env.OLLAMA_PID }} 2>/dev/null || true
            echo "✅ Killed Ollama (PID ${{ env.OLLAMA_PID }})"
          fi
          
          # Kill any remaining processes on ports
          sudo fuser -k ${{ env.PROXY_PORT }}/tcp 2>/dev/null || true
          sudo fuser -k ${{ env.OLLAMA_PORT }}/tcp 2>/dev/null || true
          
          echo "✅ Cleanup complete"
