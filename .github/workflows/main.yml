name: Ollama Gemma 4 E4B Tunnel

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'How long to keep runner alive (hours)'
        required: true
        default: '4'
        type: choice
        options:
          - '2'
          - '4'
          - '6'

jobs:
  ollama-tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    
    steps:
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          echo "✅ Ollama installed successfully"
      
      - name: Start Ollama Server with RAM Optimization
        run: |
          export OLLAMA_HOST=0.0.0.0
          export OLLAMA_ORIGINS="*"
          export OLLAMA_NUM_PARALLEL=4
          export OLLAMA_MAX_LOADED_MODELS=2
          export OLLAMA_KEEP_ALIVE=-1  # Keep model in RAM indefinitely
          export OLLAMA_LOAD_TIMEOUT=300  # Longer timeout for loading
          export OLLAMA_FLASH_ATTENTION=1  # Enable flash attention for speed
          export OLLAMA_NUM_GPU=1  # Use GPU if available
          
          nohup ollama serve > ollama.log 2>&1 &
          
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✅ Ollama server is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Ollama server failed to start"
              cat ollama.log
              exit 1
            fi
            echo "Waiting for Ollama server... ($i/30)"
            sleep 2
          done
      
      - name: Pull Gemma 4 E4B Model
        run: |
          echo "📥 Pulling gemma4:e4b model (this may take 5-10 minutes)..."
          ollama pull gemma4:e4b
          
          if ollama list | grep -q "gemma4:e4b"; then
            echo "✅ Model pulled successfully"
          else
            echo "❌ Model pull failed"
            exit 1
          fi
      
      - name: Load Model into RAM and Keep Alive
        run: |
          echo "🚀 Loading gemma4:e4b into RAM (this may take 30-60 seconds)..."
          
          # First load - this will take time but keep model in RAM
          curl -X POST http://localhost:11434/api/generate \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gemma4:e4b",
              "prompt": "Initialize model and load into memory",
              "stream": false,
              "options": {
                "num_keep": 2048,
                "num_ctx": 8192,
                "num_predict": 1
              }
            }' > /dev/null 2>&1
          
          # Verify model is loaded and warm
          echo "🔍 Verifying model is loaded..."
          sleep 5
          
          # Warmup inference to ensure model is fully loaded
          WARMUP_RESPONSE=$(curl -X POST http://localhost:11434/api/generate \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gemma4:e4b",
              "prompt": "Say ready",
              "stream": false
            }' | jq -r '.response')
          
          if [[ "$WARMUP_RESPONSE" == *"ready"* ]] || [[ "$WARMUP_RESPONSE" == *"Ready"* ]]; then
            echo "✅ Model loaded into RAM and ready for inference"
          else
            echo "⚠️ Model response: $WARMUP_RESPONSE"
            echo "✅ Model appears to be loaded"
          fi
          
          # Check memory usage
          echo ""
          echo "📊 Memory usage:"
          free -h
          
          # Keep model alive by sending periodic keepalive pings
          # This runs in background to keep model in RAM
          while true; do
            sleep 60
            curl -s -X POST http://localhost:11434/api/generate \
              -H "Content-Type: application/json" \
              -d '{"model": "gemma4:e4b", "prompt": "ping", "stream": false, "options": {"num_predict": 1}}' \
              > /dev/null 2>&1
          done &
          echo $! > keepalive.pid
      
      - name: Create Model Aliases for Continue
        run: |
          ollama cp gemma4:e4b gpt-4o
          ollama cp gemma4:e4b codestral
          echo "✅ Aliases created: gpt-4o, codestral"
      
      - name: Test Model Performance
        run: |
          echo "⚡ Testing model performance with loaded RAM..."
          
          # Test response time
          START_TIME=$(date +%s%N)
          curl -X POST http://localhost:11434/api/generate \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gemma4:e4b",
              "prompt": "Hello",
              "stream": false
            }' > /dev/null 2>&1
          END_TIME=$(date +%s%N)
          DURATION=$((($END_TIME - $START_TIME) / 1000000))
          
          echo "✅ Response time: ${DURATION}ms"
          echo ""
          
          # Show model status
          echo "📊 Model status:"
          curl -s http://localhost:11434/api/show -d '{"name": "gemma4:e4b"}' | jq '{modelfile, parameters}'
      
      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/
          cloudflared --version
          echo "✅ cloudflared installed"
      
      - name: Create Cloudflare Tunnel
        id: tunnel
        run: |
          # Start tunnel with correct flags
          cloudflared tunnel --url http://localhost:11434 \
            --http-host-header localhost:11434 \
            --logfile cloudflared.log &
          
          TUNNEL_PID=$!
          
          # Wait for tunnel to establish
          sleep 15
          
          # Extract tunnel URL from logs
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
          
          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to get tunnel URL"
            echo "Cloudflared log contents:"
            cat cloudflared.log 2>/dev/null || echo "No log file"
            exit 1
          fi
          
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
          echo "tunnel_url=$TUNNEL_URL" >> $GITHUB_OUTPUT
          
          # Test tunnel is working
          echo "🔍 Testing tunnel..."
          sleep 5
          if curl -s "$TUNNEL_URL/api/tags" > /dev/null 2>&1; then
            echo "✅ Tunnel is working"
          else
            echo "⚠️ Tunnel test failed, but continuing..."
          fi
          
          echo ""
          echo "=========================================="
          echo "✅ TUNNEL ACTIVE: $TUNNEL_URL"
          echo "=========================================="
          echo ""
          echo "📋 COPY THIS CONFIGURATION for VS Code Continue:"
          echo ""
          echo "{"
          echo '  "models": ['
          echo "    {"
          echo '      "title": "Gemma 4 E4B (RAM Loaded)",'
          echo '      "provider": "ollama",'
          echo '      "model": "gemma4:e4b",'
          echo "      \"apiBase\": \"$TUNNEL_URL\","
          echo '      "roles": ["chat", "edit", "apply"],'
          echo '      "capabilities": ["tool_use"],'
          echo '      "requestOptions": {'
          echo '        "headers": {'
          echo '          "Content-Type": "application/json",'
          echo '          "Accept": "application/json"'
          echo '        },'
          echo '        "timeout": 120000'
          echo '      },'
          echo '      "completionOptions": {'
          echo '        "temperature": 1.0,'
          echo '        "topP": 0.95,'
          echo '        "topK": 64'
          echo '      }'
          echo "    }"
          echo "  ],"
          echo '  "tabAutocompleteModel": {'
          echo '    "provider": "ollama",'
          echo '    "model": "gemma4:e4b",'
          echo "    \"apiBase\": \"$TUNNEL_URL\","
          echo '    "requestOptions": {'
          echo '      "headers": {'
          echo '        "Content-Type": "application/json",'
          echo '        "Accept": "application/json"'
          echo '      },'
          echo '      "timeout": 60000'
          echo '    }'
          echo "  }"
          echo "}"
          echo ""
          echo "⚡ PERFORMANCE NOTES:"
          echo "   - Model loaded in RAM (first response: ~2-5s, subsequent: ~200-500ms)"
          echo "   - Keep-alive active: model stays in memory"
          echo "   - Parallel requests: 4 concurrent supported"
          echo ""
          echo "🧪 TEST COMMAND: curl $TUNNEL_URL/api/tags"
          echo "⏱️ Tunnel active for ${{ github.event.inputs.duration }} hours"
          echo ""
          
          # Save URL to file for heartbeat step
          echo "$TUNNEL_URL" > tunnel_url.txt
      
      - name: Keep Runner Alive with Model Heartbeat
        run: |
          if [ -f tunnel_url.txt ]; then
            TUNNEL_URL=$(cat tunnel_url.txt)
          else
            TUNNEL_URL="${{ steps.tunnel.outputs.tunnel_url }}"
          fi
          
          DURATION_HOURS=${{ github.event.inputs.duration }}
          DURATION_SECONDS=$((DURATION_HOURS * 3600))
          ELAPSED=0
          
          echo "🟢 Tunnel active at: $TUNNEL_URL"
          echo "🟢 Model loaded in RAM and kept alive"
          echo "🟢 Will run for $DURATION_HOURS hours"
          echo "🟢 Press 'Cancel workflow' in GitHub Actions to stop early"
          echo ""
          
          while [ $ELAPSED -lt $DURATION_SECONDS ]; do
            # Send heartbeat and keep model alive
            if curl -s -m 5 "$TUNNEL_URL/api/generate" \
              -H "Content-Type: application/json" \
              -d '{"model":"gemma4:e4b","prompt":"ping","stream":false,"options":{"num_predict":1}}' \
              > /dev/null 2>&1; then
              echo "✅ [$(date '+%H:%M:%S')] Model alive in RAM - Tunnel responding"
            else
              echo "⚠️ [$(date '+%H:%M:%S')] Heartbeat WARNING - Checking model..."
              
              # Check if cloudflared is still running
              if ! pgrep -f "cloudflared" > /dev/null; then
                echo "🔄 Restarting cloudflared..."
                cloudflared tunnel --url http://localhost:11434 --http-host-header localhost:11434 --logfile cloudflared.log &
              fi
              
              # Check if model needs reloading
              if ! curl -s -m 2 "http://localhost:11434/api/generate" \
                -d '{"model":"gemma4:e4b","prompt":"ping","stream":false}' \
                > /dev/null 2>&1; then
                echo "🔄 Model not responding, reloading into RAM..."
                curl -X POST http://localhost:11434/api/generate \
                  -d '{"model":"gemma4:e4b","prompt":"Reload","stream":false}' \
                  > /dev/null 2>&1 &
              fi
            fi
            
            sleep 30  # Shorter heartbeat interval for faster response
            ELAPSED=$((ELAPSED + 30))
            
            # Show progress every hour
            if [ $((ELAPSED % 3600)) -eq 0 ]; then
              HOURS_ELAPSED=$((ELAPSED / 3600))
              HOURS_REMAINING=$((DURATION_HOURS - HOURS_ELAPSED))
              echo "📊 Status: $HOURS_ELAPSED/$DURATION_HOURS hours elapsed, $HOURS_REMAINING hours remaining"
              
              # Show memory stats
              echo "📊 Memory usage:"
              free -h | grep -E "Mem|Swap"
            fi
          done
          
          echo ""
          echo "⏰ Workflow completed after $DURATION_HOURS hours"
      
      - name: Cleanup on Failure
        if: failure()
        run: |
          echo "❌ Workflow failed. Collecting logs..."
          echo ""
          echo "=== OLLAMA LOGS ==="
          tail -50 ollama.log 2>/dev/null || echo "No ollama.log found"
          echo ""
          echo "=== CLOUDFLARE LOGS ==="
          tail -50 cloudflared.log 2>/dev/null || echo "No cloudflared.log found"
          echo ""
          echo "=== OLLAMA PROCESS STATUS ==="
          ps aux | grep ollama | grep -v grep || echo "Ollama not running"
          echo ""
          echo "=== MEMORY USAGE ==="
          free -h
          echo ""
          echo "=== PORT STATUS ==="
          netstat -tlnp 2>/dev/null | grep 11434 || ss -tlnp | grep 11434 || echo "Port 11434 not listening"
