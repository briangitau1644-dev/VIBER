name: Host Gemma 4 E4B for Roo Code
on:
  workflow_dispatch:

jobs:
  host-gemma:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ollama (Official Method)
        run: |
          # Install Ollama using official script
          curl -fsSL https://ollama.com/install.sh | sh
          
          # Start Ollama service
          sudo systemctl start ollama
          
          # Wait for Ollama to be ready
          echo "Waiting for Ollama to start..."
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✓ Ollama is ready!"
              break
            fi
            echo "Attempt $i/30 - Ollama starting..."
            sleep 3
          done
          
          # Verify installation
          ollama --version

      - name: Pull Gemma 4 E4B Model
        run: |
          echo "=========================================="
          echo "Pulling gemma4:e4b model..."
          echo "This model is approximately 9.6GB"
          echo "Download may take 15-30 minutes"
          echo "=========================================="
          
          # Pull the model
          ollama pull gemma4:e4b
          
          echo "✓ Model pull complete!"

      - name: Run Gemma 4 E4B Model
        run: |
          echo "Starting gemma4:e4b model..."
          
          # Start the model and keep it running
          ollama run gemma4:e4b --keep-alive 6h &
          
          # Wait for model to load into memory
          sleep 10
          
          # Test the model
          echo "Testing model with simple prompt..."
          echo '{"model":"gemma4:e4b","prompt":"Say ready in one word","stream":false}' | \
            curl -X POST http://localhost:11434/api/generate \
            -H "Content-Type: application/json" \
            -d @- | \
            python3 -c "import sys, json; print('Response:', json.load(sys.stdin).get('response', 'N/A'))"
          
          echo "✓ Model is running and ready for requests"

      - name: Verify Model Status
        run: |
          echo "=========================================="
          echo "Model Status:"
          echo "=========================================="
          ollama list
          echo ""
          echo "Running processes:"
          ps aux | grep ollama | grep -v grep || echo "No ollama process found"

      - name: Setup Cloudflare Tunnel
        uses: AnimMouse/setup-cloudflared@v2
        with:
          cloudflare_tunnel_credential: ${{ secrets.CLOUDFLARE_TUNNEL_CREDENTIAL }}
          cloudflare_tunnel_id: ${{ vars.CLOUDFLARE_TUNNEL_ID }}
          cloudflare_tunnel_configuration: ${{ vars.CLOUDFLARE_TUNNEL_CONFIGURATION }}

      - name: Display API Information
        run: |
          echo "=========================================="
          echo "✓ Ollama API: http://localhost:11434"
          echo "✓ Model: gemma4:e4b"
          echo "✓ Status: Running"
          echo ""
          echo "API Endpoints:"
          echo "  - Generate: POST /api/generate"
          echo "  - Chat: POST /api/chat"
          echo "  - List Models: GET /api/tags"
          echo ""
          echo "OpenAI Compatible Endpoint:"
          echo "  - http://localhost:11434/v1/chat/completions"
          echo ""
          echo "To use with Roo Code:"
          echo "  1. Set API URL to your Cloudflare tunnel URL"
          echo "  2. Add /v1/chat/completions to the end"
          echo "  3. Model name: gemma4:e4b"
          echo "  4. API format: OpenAI Compatible"
          echo ""
          echo "Example curl command:"
          echo "  curl -X POST http://localhost:11434/api/generate \\"
          echo "    -H 'Content-Type: application/json' \\"
          echo "    -d '{\"model\":\"gemma4:e4b\",\"prompt\":\"Hello\"}'"
          echo "=========================================="
          echo ""
          echo "Runner will stay alive for 6 hours"
          echo "Press Ctrl+C to stop early"

      - name: Keep Runner Alive
        # Keeps the tunnel and model running for 6 hours (max GitHub limit)
        run: |
          echo "Keeping runner alive for 6 hours..."
          echo "gemma4:e4b is ready to accept requests via Cloudflare tunnel"
          sleep 21600
