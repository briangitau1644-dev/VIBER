name: Host Gemma 4 E4B for Roo Code
on:
  workflow_dispatch:

jobs:
  host-gemma:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install and Start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          
          # Start Ollama with proper config
          ollama serve &
          
          # Wait for Ollama to be ready
          for i in {1..45}; do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✓ Ollama is ready!"
              break
            fi
            sleep 2
          done

      - name: Configure Ollama for Stable Connections
        run: |
          # Kill existing Ollama process
          pkill ollama || true
          sleep 3
          
          # Start with timeout and connection settings
          OLLAMA_HOST=0.0.0.0 OLLAMA_ORIGINS=* OLLAMA_NUM_PARALLEL=1 ollama serve &
          
          sleep 10
          
          # Verify configuration
          curl -s http://localhost:11434/api/tags > /dev/null
          echo "✓ Ollama configured"

      - name: Pull Gemma 4 E4B Model
        run: |
          echo "Pulling gemma4:e4b model (~9.6GB)..."
          ollama pull gemma4:e4b
          echo "✓ Model pull complete!"

      - name: PRE-LOAD MODEL INTO RAM
        run: |
          echo "Loading Gemma 4 E4B into RAM..."
          
          # Start model with keep_alive = -1
          nohup ollama run gemma4:e4b --keep-alive -1 > ollama.log 2>&1 &
          
          # Wait for model to load
          sleep 45
          
          # Verify model is loaded
          curl -X POST http://localhost:11434/api/generate \
            -H "Content-Type: application/json" \
            -d '{"model":"gemma4:e4b","prompt":"OK","stream":false,"keep_alive":-1}'
          
          echo "✓ Model PRE-LOADED in RAM"

      - name: Keep Model Warm
        run: |
          while true; do
            curl -s -X POST http://localhost:11434/api/generate \
              -H "Content-Type: application/json" \
              -d '{"model":"gemma4:e4b","prompt":"","keep_alive":-1}' \
              > /dev/null 2>&1
            sleep 20
          done &
          
          echo "✓ Keep-alive running"

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Start Cloudflare Tunnel (Stable)
        run: |
          # Start tunnel with connection keepalive
          cloudflared tunnel --url http://localhost:11434 \
            --no-autoupdate \
            --http-host-header localhost:11434 \
            --keepalive 30s \
            --protocol http2 \
            2>&1 | tee cloudflared.log &
          
          sleep 20
          
          # Extract tunnel URL
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
          
          echo "✓ Tunnel: $TUNNEL_URL"

      - name: Test with Correct Endpoint
        run: |
          echo "Testing correct endpoints..."
          
          # Test 1: Ollama API endpoint (not /api/chat)
          echo "Testing /api/generate..."
          curl -v -X POST "$TUNNEL_URL/api/generate" \
            -H "Content-Type: application/json" \
            -d '{"model":"gemma4:e4b","prompt":"Hi","stream":false}' \
            --max-time 30 || echo "Will retry..."
          
          echo ""
          echo "Testing /v1/chat/completions (OpenAI compatible)..."
          curl -v -X POST "$TUNNEL_URL/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -d '{"model":"gemma4:e4b","messages":[{"role":"user","content":"Hi"}],"max_tokens":10}' \
            --max-time 30

      - name: Display Correct Connection Info
        run: |
          echo "=========================================="
          echo "✅ GEMMA 4 E4B READY - NO ECONNRESET"
          echo "=========================================="
          echo ""
          echo "🌐 TUNNEL URL: $TUNNEL_URL"
          echo ""
          echo "⚠️  IMPORTANT: Use these EXACT endpoints:"
          echo ""
          echo "🔧 FOR ROO CODE (OpenAI Compatible):"
          echo "   API URL: $TUNNEL_URL/v1"
          echo "   Model ID: gemma4:e4b"
          echo "   API Key: (leave empty)"
          echo ""
          echo "🔧 FOR DIRECT TESTING:"
          echo "   Chat: POST $TUNNEL_URL/v1/chat/completions"
          echo "   Generate: POST $TUNNEL_URL/api/generate"
          echo ""
          echo "❌ DO NOT use: $TUNNEL_URL/api/chat"
          echo "   (That endpoint doesn't exist - causes 405 error)"
          echo ""
          echo "=========================================="
          echo "TEST COMMAND:"
          echo "curl $TUNNEL_URL/v1/chat/completions \\"
          echo "  -H 'Content-Type: application/json' \\"
          echo "  -d '{\"model\":\"gemma4:e4b\",\"messages\":[{\"role\":\"user\",\"content\":\"Hello\"}]}'"
          echo "=========================================="

      - name: Keep Runner Alive
        run: |
          echo "Model HOT in RAM - 6 hours of instant responses"
          echo "Using endpoint: /v1/chat/completions (NOT /api/chat)"
          
          while true; do
            if [ -f cloudflared.log ]; then
              URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
              if [ -n "$URL" ]; then
                echo "[$(date '+%H:%M:%S')] ✅ Ready | URL: $URL/v1"
              fi
            fi
            sleep 60
          done
