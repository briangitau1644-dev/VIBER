name: Host Gemma 4 E4B for Roo Code
on:
  workflow_dispatch:

jobs:
  host-gemma:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          sudo systemctl start ollama
          
          # Wait for Ollama to be ready
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✓ Ollama is ready!"
              break
            fi
            sleep 3
          done

      - name: Pull Gemma 4 E4B Model
        run: |
          echo "Pulling gemma4:e4b model (~9.6GB)..."
          ollama pull gemma4:e4b
          echo "✓ Model pull complete!"

      - name: PRE-LOAD MODEL INTO RAM (KEEP ALWAYS READY)
        run: |
          echo "Loading Gemma 4 E4B into RAM..."
          
          # Start model with keep_alive = -1 (never unload)
          # This forces the entire model into RAM and keeps it there
          ollama run gemma4:e4b --keep-alive -1 &
          
          # Wait for model to fully load into RAM
          echo "Waiting for model to load into RAM..."
          sleep 30
          
          # Verify model is loaded and responsive
          echo "Testing model response..."
          curl -X POST http://localhost:11434/api/generate \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gemma4:e4b",
              "prompt": "Say READY",
              "stream": false,
              "keep_alive": -1
            }'
          
          echo "✓ Model is PRE-LOADED in RAM and ready for instant responses"

      - name: Keep Model Warm (Prevent Unloading)
        run: |
          # Send keep-alive ping every 30 seconds to ensure model stays in RAM
          while true; do
            curl -s -X POST http://localhost:11434/api/generate \
              -H "Content-Type: application/json" \
              -d '{"model":"gemma4:e4b","prompt":"","keep_alive":-1}' \
              > /dev/null 2>&1
            sleep 30
          done &
          
          echo "✓ Keep-alive service started - model will stay in RAM"

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Start Cloudflare Tunnel
        run: |
          # Start tunnel to expose Ollama
          cloudflared tunnel --url http://localhost:11434 --no-autoupdate 2>&1 | tee cloudflared.log &
          sleep 15
          
          # Extract tunnel URL
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV

      - name: Display Connection Info
        run: |
          echo "=========================================="
          echo "✅ GEMMA 4 E4B IS PRE-LOADED IN RAM!"
          echo "=========================================="
          echo ""
          echo "🌐 TUNNEL URL: $TUNNEL_URL"
          echo ""
          echo "⚡ MODEL STATUS: ALWAYS IN RAM - READY FOR INSTANT RESPONSES"
          echo ""
          echo "🔧 ROO CODE CONFIGURATION:"
          echo "   Provider: OpenAI Compatible"
          echo "   API URL: $TUNNEL_URL/v1"
          echo "   Model ID: gemma4:e4b"
          echo "   API Key: (leave empty)"
          echo ""
          echo "⏱️  Model will stay in RAM for the full 6 hours"
          echo "=========================================="

      - name: Keep Runner Alive with RAM-loaded Model
        run: |
          echo "Model is PRE-LOADED in RAM - serving requests for 6 hours"
          echo ""
          
          # Display memory usage to confirm model is in RAM
          while true; do
            if [ -f cloudflared.log ]; then
              URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
              if [ -n "$URL" ]; then
                # Show RAM usage (Ollama process)
                RAM_USAGE=$(ps aux | grep ollama | grep -v grep | awk '{sum+=$6} END {print sum/1024 " MB"}')
                echo "[$(date '+%H:%M:%S')] ✅ Model in RAM | URL: $URL/v1 | RAM: $RAM_USAGE"
              fi
            fi
            sleep 60
          done
