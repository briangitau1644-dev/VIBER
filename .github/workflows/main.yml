name: Ollama Gemma 4 E4B Tunnel

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'How long to keep runner alive (hours)'
        required: true
        default: '4'
        type: choice
        options:
          - '2'
          - '4'
          - '6'

jobs:
  ollama-tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    
    steps:
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          echo "✅ Ollama installed successfully"
      
      - name: Start Ollama Server
        run: |
          export OLLAMA_HOST=0.0.0.0
          export OLLAMA_ORIGINS="*"
          export OLLAMA_NUM_PARALLEL=4
          export OLLAMA_MAX_LOADED_MODELS=2
          export OLLAMA_KEEP_ALIVE=-1
          
          nohup ollama serve > ollama.log 2>&1 &
          
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✅ Ollama server is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Ollama server failed to start"
              cat ollama.log
              exit 1
            fi
            echo "Waiting for Ollama server... ($i/30)"
            sleep 2
          done
      
      - name: Pull Gemma 4 E4B Model
        run: |
          echo "📥 Pulling gemma4:e4b model (this may take 5-10 minutes)..."
          ollama pull gemma4:e4b
          
          if ollama list | grep -q "gemma4:e4b"; then
            echo "✅ Model pulled successfully"
          else
            echo "❌ Model pull failed"
            exit 1
          fi
      
      - name: Test Gemma 4 Model
        run: |
          echo "🧪 Testing model..."
          TEST_RESPONSE=$(curl -X POST http://localhost:11434/api/generate \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gemma4:e4b",
              "prompt": "Say exactly: READY",
              "stream": false
            }' | jq -r '.response')
          
          if [[ "$TEST_RESPONSE" == *"READY"* ]]; then
            echo "✅ Model test passed: $TEST_RESPONSE"
          else
            echo "❌ Model test failed"
            exit 1
          fi
      
      - name: Create Model Aliases for Continue
        run: |
          ollama cp gemma4:e4b gpt-4o
          ollama cp gemma4:e4b codestral
          echo "✅ Aliases created: gpt-4o, codestral"
      
      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/
          cloudflared --version
          echo "✅ cloudflared installed"
      
      - name: Create Cloudflare Tunnel
        id: tunnel
        run: |
          # Start tunnel with correct flags (no -keepalive flag)
          cloudflared tunnel --url http://localhost:11434 \
            --http-host-header localhost:11434 \
            --logfile cloudflared.log &
          
          TUNNEL_PID=$!
          
          # Wait for tunnel to establish
          sleep 15
          
          # Extract tunnel URL from logs
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
          
          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to get tunnel URL"
            echo "Cloudflared log contents:"
            cat cloudflared.log 2>/dev/null || echo "No log file"
            exit 1
          fi
          
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
          echo "tunnel_url=$TUNNEL_URL" >> $GITHUB_OUTPUT
          
          # Test tunnel is working
          echo "🔍 Testing tunnel..."
          sleep 5
          if curl -s "$TUNNEL_URL/api/tags" > /dev/null 2>&1; then
            echo "✅ Tunnel is working"
          else
            echo "⚠️ Tunnel test failed, but continuing..."
          fi
          
          echo ""
          echo "=========================================="
          echo "✅ TUNNEL ACTIVE: $TUNNEL_URL"
          echo "=========================================="
          echo ""
          echo "📋 COPY THIS CONFIGURATION for VS Code Continue:"
          echo ""
          echo "{"
          echo '  "models": ['
          echo "    {"
          echo '      "title": "Gemma 4 E4B",'
          echo '      "provider": "ollama",'
          echo '      "model": "gemma4:e4b",'
          echo "      \"apiBase\": \"$TUNNEL_URL\","
          echo '      "roles": ["chat", "edit", "apply"],'
          echo '      "capabilities": ["tool_use"],'
          echo '      "requestOptions": {'
          echo '        "headers": {'
          echo '          "Content-Type": "application/json",'
          echo '          "Accept": "application/json"'
          echo '        },'
          echo '        "timeout": 120000'
          echo '      },'
          echo '      "completionOptions": {'
          echo '        "temperature": 1.0,'
          echo '        "topP": 0.95,'
          echo '        "topK": 64'
          echo '      }'
          echo "    }"
          echo "  ],"
          echo '  "tabAutocompleteModel": {'
          echo '    "provider": "ollama",'
          echo '    "model": "gemma4:e4b",'
          echo "    \"apiBase\": \"$TUNNEL_URL\","
          echo '    "requestOptions": {'
          echo '      "headers": {'
          echo '        "Content-Type": "application/json",'
          echo '        "Accept": "application/json"'
          echo '      },'
          echo '      "timeout": 60000'
          echo '    }'
          echo "  }"
          echo "}"
          echo ""
          echo "🧪 TEST COMMAND: curl $TUNNEL_URL/api/tags"
          echo "⏱️ Tunnel active for ${{ github.event.inputs.duration }} hours"
          echo ""
          
          # Save URL to file for heartbeat step
          echo "$TUNNEL_URL" > tunnel_url.txt
      
      - name: Keep Runner Alive with Heartbeat
        run: |
          if [ -f tunnel_url.txt ]; then
            TUNNEL_URL=$(cat tunnel_url.txt)
          else
            TUNNEL_URL="${{ steps.tunnel.outputs.tunnel_url }}"
          fi
          
          DURATION_HOURS=${{ github.event.inputs.duration }}
          DURATION_SECONDS=$((DURATION_HOURS * 3600))
          ELAPSED=0
          
          echo "🟢 Tunnel active at: $TUNNEL_URL"
          echo "🟢 Will run for $DURATION_HOURS hours"
          echo "🟢 Press 'Cancel workflow' in GitHub Actions to stop early"
          echo ""
          
          while [ $ELAPSED -lt $DURATION_SECONDS ]; do
            if curl -s -m 5 "$TUNNEL_URL/api/tags" > /dev/null 2>&1; then
              echo "✅ [$(date '+%H:%M:%S')] Heartbeat OK - Tunnel responding"
            else
              echo "⚠️ [$(date '+%H:%M:%S')] Heartbeat WARNING - Tunnel not responding"
              # Check if cloudflared is still running
              if ! pgrep -f "cloudflared" > /dev/null; then
                echo "🔄 Restarting cloudflared..."
                cloudflared tunnel --url http://localhost:11434 --http-host-header localhost:11434 --logfile cloudflared.log &
              fi
            fi
            
            sleep 60
            ELAPSED=$((ELAPSED + 60))
            
            # Show progress every hour
            if [ $((ELAPSED % 3600)) -eq 0 ]; then
              HOURS_ELAPSED=$((ELAPSED / 3600))
              HOURS_REMAINING=$((DURATION_HOURS - HOURS_ELAPSED))
              echo "📊 Status: $HOURS_ELAPSED/$DURATION_HOURS hours elapsed, $HOURS_REMAINING hours remaining"
            fi
          done
          
          echo ""
          echo "⏰ Workflow completed after $DURATION_HOURS hours"
      
      - name: Cleanup on Failure
        if: failure()
        run: |
          echo "❌ Workflow failed. Collecting logs..."
          echo ""
          echo "=== OLLAMA LOGS ==="
          tail -50 ollama.log 2>/dev/null || echo "No ollama.log found"
          echo ""
          echo "=== CLOUDFLARE LOGS ==="
          tail -50 cloudflared.log 2>/dev/null || echo "No cloudflared.log found"
          echo ""
          echo "=== OLLAMA PROCESS STATUS ==="
          ps aux | grep ollama | grep -v grep || echo "Ollama not running"
          echo ""
          echo "=== PORT STATUS ==="
          netstat -tlnp 2>/dev/null | grep 11434 || ss -tlnp | grep 11434 || echo "Port 11434 not listening"
