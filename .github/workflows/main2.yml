name: Ollama Proxy — gemma4:e4b — Always-Loaded RAM Mode

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Ollama model to use'
        required: false
        default: 'gemma4:e4b'
      working_dir:
        description: 'Working directory for file operations'
        required: false
        default: '/home/runner/work'
      enable_ram_pressure:
        description: 'Enable RAM pressure'
        required: false
        default: 'true'
      session_hours:
        description: 'Session duration in hours (max 6)'
        required: false
        default: '6'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  MODEL: ${{ github.event.inputs.model || 'gemma4:e4b' }}
  WORKING_DIR: ${{ github.event.inputs.working_dir || '/home/runner/work' }}
  RAM_PRESSURE_ENABLED: ${{ github.event.inputs.enable_ram_pressure || 'true' }}
  RAM_PRESSURE_MB: '512'
  ACTIVITY_LOG_INTERVAL: '30'
  KEEPALIVE_INTERVAL: '8'
  PROXY_PORT: '8000'
  OLLAMA_PORT: '11434'
  SESSION_HOURS: ${{ github.event.inputs.session_hours || '6' }}
  CLOUDFLARE_URL: ''
  OLLAMA_KEEP_ALIVE: '-1'
  OLLAMA_MAX_LOADED_MODELS: '1'
  OLLAMA_NUM_PARALLEL: '4'
  OLLAMA_FLASH_ATTENTION: '1'

jobs:
  ollama-proxy:
    name: Ollama Proxy + gemma4:e4b + RAM-Resident + Cloudflare Tunnel
    runs-on: ubuntu-latest
    timeout-minutes: 400

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl wget lsof net-tools jq grep bash \
            htop procps sysstat bc

      - name: 📥 Install Python Dependencies
        run: |
          pip install --upgrade pip --quiet
          pip install --quiet \
            fastapi \
            "uvicorn[standard]" \
            requests \
            pydantic \
            starlette \
            psutil \
            httpx \
            aiohttp

      - name: 📥 Install Ollama (latest)
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama --version
          echo "✅ Ollama installed"

      - name: 📥 Install Cloudflared
        run: |
          curl -fsSL -o /tmp/cf.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i /tmp/cf.deb 2>/dev/null || true
          rm -f /tmp/cf.deb
          cloudflared --version
          echo "✅ Cloudflared installed"

      - name: 🖥️ System Info
        run: |
          echo "═══════ SYSTEM INFO ═══════"
          echo "CPU: $(nproc) cores"
          echo "RAM: $(free -h | awk '/^Mem/{print $2}') total"
          echo "Disk: $(df -h / | awk 'NR==2{print $4}') free"
          uname -a
          echo "═══════════════════════════"

      - name: 🚀 Start Ollama Server (RAM-optimised)
        run: |
          sudo sysctl -w vm.swappiness=10                2>/dev/null || true
          sudo sysctl -w vm.dirty_ratio=60               2>/dev/null || true
          sudo sysctl -w net.core.somaxconn=65535        2>/dev/null || true
          sudo sysctl -w net.ipv4.tcp_keepalive_time=60  2>/dev/null || true
          sudo sysctl -w net.ipv4.tcp_keepalive_intvl=10 2>/dev/null || true
          sudo sysctl -w net.ipv4.tcp_keepalive_probes=6 2>/dev/null || true
          sudo sysctl -w net.ipv4.tcp_fin_timeout=30     2>/dev/null || true

          export OLLAMA_HOST="0.0.0.0:${{ env.OLLAMA_PORT }}"
          export OLLAMA_ORIGINS="*"
          export OLLAMA_KEEP_ALIVE="-1"
          export OLLAMA_MAX_LOADED_MODELS="1"
          export OLLAMA_NUM_PARALLEL="4"
          export OLLAMA_FLASH_ATTENTION="1"

          nohup ollama serve > ollama.log 2>&1 &
          echo $! > ollama.pid
          echo "⏳ Waiting for Ollama to be ready..."

          for i in {1..40}; do
            if curl -sf http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/version > /dev/null 2>&1; then
              echo "✅ Ollama ready after ${i} attempts"
              break
            fi
            [ $i -eq 40 ] && { echo "❌ Ollama did not start"; cat ollama.log; exit 1; }
            sleep 2
          done

          echo "Ollama version: $(curl -sf http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/version | jq -r .version)"

      - name: 📥 Pull and Pre-Load Model into RAM
        run: |
          echo "⏳ Pulling model: ${{ env.MODEL }}"
          if ! timeout 1200 ollama pull ${{ env.MODEL }}; then
            echo "❌ Failed to pull model"
            ollama list
            tail -30 ollama.log
            exit 1
          fi

          echo "✅ Model pulled. Forcing load into RAM..."
          ollama list

          echo "🔥 Warming up model (loading weights into RAM with keep_alive=-1)..."
          WARM_RESULT=$(curl -sf --max-time 300 \
            -X POST http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/generate \
            -H "Content-Type: application/json" \
            -d '{"model":"${{ env.MODEL }}","prompt":"Say: ready","stream":false,"keep_alive":-1,"options":{"num_predict":5}}' \
            2>&1)

          if echo "$WARM_RESULT" | jq -e '.response' > /dev/null 2>&1; then
            echo "✅ Model loaded and warm in RAM"
            echo "Response: $(echo "$WARM_RESULT" | jq -r '.response')"
          else
            echo "⚠️  Warm-up response: $WARM_RESULT"
            echo "Continuing anyway..."
          fi

          echo "📋 Loaded models (/api/ps):"
          curl -sf http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/ps | jq . || echo "(no /api/ps endpoint)"

      - name: 🚀 Start Proxy Server
        run: |
          sudo fuser -k ${{ env.PROXY_PORT }}/tcp 2>/dev/null || true
          sleep 1

          export MODEL="${{ env.MODEL }}"
          export WORKING_DIR="${{ env.WORKING_DIR }}"
          export RAM_PRESSURE_ENABLED="${{ env.RAM_PRESSURE_ENABLED }}"
          export RAM_PRESSURE_MB="512"
          export ACTIVITY_LOG_INTERVAL="${{ env.ACTIVITY_LOG_INTERVAL }}"
          export KEEPALIVE_INTERVAL="${{ env.KEEPALIVE_INTERVAL }}"
          export PROXY_PORT="${{ env.PROXY_PORT }}"
          export OLLAMA_PORT="${{ env.OLLAMA_PORT }}"

          mkdir -p "${{ env.WORKING_DIR }}"
          nohup python3 proxy_server.py > proxy.log 2>&1 &
          echo $! > proxy.pid

          echo "⏳ Waiting for proxy server..."
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:${{ env.PROXY_PORT }}/health > /dev/null 2>&1; then
              echo "✅ Proxy ready after ${i} attempts"
              break
            fi
            [ $i -eq 30 ] && { echo "❌ Proxy failed to start"; cat proxy.log; exit 1; }
            sleep 3
          done

          echo ""
          echo "📋 Proxy health:"
          curl -sf http://127.0.0.1:${{ env.PROXY_PORT }}/health | jq .

      - name: 🌐 Start Cloudflare Tunnel
        run: |
          pkill -9 -f cloudflared 2>/dev/null || true
          sleep 2

          # ⚠️ CRITICAL: Tunnel MUST point to PROXY_PORT (8000), NOT Ollama port (11434)
          nohup cloudflared tunnel \
            --url http://127.0.0.1:${{ env.PROXY_PORT }} \
            --no-autoupdate \
            --loglevel info \
            > tunnel.log 2>&1 &
          echo $! > tunnel.pid

          echo "⏳ Waiting for Cloudflare tunnel URL..."
          TUNNEL_URL=""
          for i in {1..40}; do
            # Extract clean URL — avoid markdown artifacts from GitHub logs
            RAW=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log 2>/dev/null | head -1)
            if [ -n "$RAW" ]; then
              TUNNEL_URL="${RAW//__/}"  # strip __ (markdown bold)
              TUNNEL_URL="${TUNNEL_URL%/}"  # strip trailing slash
              echo "✅ Tunnel URL: $TUNNEL_URL"
              break
            fi
            [ $i -eq 40 ] && { echo "❌ Tunnel URL not found"; cat tunnel.log; exit 1; }
            sleep 2
          done

          if [ -n "$TUNNEL_URL" ]; then
            # Export clean URL for subsequent steps
            echo "CLOUDFLARE_URL=${TUNNEL_URL}" >> "$GITHUB_ENV"

            # Verify tunnel is actually serving HTTP before proceeding
            echo "⏳ Waiting for tunnel to respond to /health..."
            for j in {1..20}; do
              CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${TUNNEL_URL}/health" 2>/dev/null || echo "000")
              if [ "$CODE" = "200" ]; then
                echo "✅ Tunnel reachable (HTTP 200 on /health)"
                break
              fi
              echo "  Attempt $j — HTTP $CODE"
              [ $j -eq 20 ] && echo "⚠️  Proceeding anyway (tunnel may be slow)"
              sleep 3
            done

            # Print clear, copy-pasteable client config
            echo ""
            echo "╔════════════════════════════════════════════════════════════════╗"
            echo "║   🤖  OLLAMA PROXY v4.1 — gemma4:e4b — READY                   ║"
            echo "╠════════════════════════════════════════════════════════════════╣"
            printf "║  Tunnel:  %-55s║\n" "${TUNNEL_URL}"
            echo "║                                                                  ║"
            echo "║  ✅ CLIENT CONFIG — COPY ONE OF THESE:                          ║"
            echo "║                                                                  ║"
            echo "║  [OpenAI-compatible clients]                                     ║"
            printf "║    apiBase: %-48s║\n" "${TUNNEL_URL}/v1"
            printf "║    model:   %-48s║\n" "${MODEL}"
            echo "║                                                                  ║"
            echo "║  [Raw Ollama clients / Open WebUI]                               ║"
            printf "║    apiBase: %-48s║\n" "${TUNNEL_URL}"
            printf "║    model:   %-48s║\n" "${MODEL}"
            echo "║                                                                  ║"
            echo "║  [Anthropic-compatible clients]                                  ║"
            printf "║    apiBase: %-48s║\n" "${TUNNEL_URL}/v1/messages"
            printf "║    model:   %-48s║\n" "${MODEL}"
            echo "║                                                                  ║"
            echo "║  ⚠️  IMPORTANT:                                                  ║"
            echo "║    • NEVER use 'apibase://:80' or omit https://                  ║"
            echo "║    • NEVER add a trailing slash to apiBase                       ║"
            echo "║    • The proxy handles all routing — just set apiBase correctly  ║"
            echo "╚════════════════════════════════════════════════════════════════╝"
            echo ""
            echo "==> OpenAI:     ${TUNNEL_URL}/v1"
            echo "==> Raw Ollama: ${TUNNEL_URL}"
            echo "==> Anthropic:  ${TUNNEL_URL}/v1/messages"
          fi

      - name: 🧪 Test All Endpoints
        if: env.CLOUDFLARE_URL != ''
        run: |
          # ── Sanitize BASE every time — GitHub env can introduce markdown artifacts
          RAW_BASE="${{ env.CLOUDFLARE_URL }}"
          BASE="${RAW_BASE//__/}"    # strip __ (markdown bold)
          BASE="${BASE%/}"           # strip trailing slash

          echo "═══════════════════════════════════════════════"
          echo "🧪 Testing all endpoints"
          echo "   BASE = ${BASE}"
          echo "═══════════════════════════════════════════════"

          # Abort cleanly if BASE doesn't look like a real cloudflare URL
          if [[ ! "$BASE" =~ ^https://[a-zA-Z0-9-]+\.trycloudflare\.com ]]; then
            echo "❌ BASE URL is invalid: '${BASE}' — skipping tests"
            exit 0
          fi

          PASS=0; FAIL=0

          # Helper: curl GET, returns "HTTP_CODE|BODY"
          do_get() {
            local url="$1"; local timeout="${2:-20}"
            local code body
            body=$(curl -s --max-time "$timeout" --retry 2 --retry-delay 3 \
              -w "\n__HTTP_CODE__%{http_code}" "$url" 2>/dev/null)
            code=$(echo "$body" | grep -oP '(?<=__HTTP_CODE__)\d+' || echo "000")
            body=$(echo "$body" | sed '/__HTTP_CODE__/d')
            echo "${code}|${body}"
          }

          # Helper: curl POST, returns "HTTP_CODE|BODY"
          do_post() {
            local url="$1"; local data="$2"; local timeout="${3:-150}"
            local code body
            body=$(curl -s --max-time "$timeout" --retry 2 --retry-delay 3 \
              -H "Content-Type: application/json" -d "$data" \
              -w "\n__HTTP_CODE__%{http_code}" "$url" 2>/dev/null)
            code=$(echo "$body" | grep -oP '(?<=__HTTP_CODE__)\d+' || echo "000")
            body=$(echo "$body" | sed '/__HTTP_CODE__/d')
            echo "${code}|${body}"
          }

          check() {
            local name="$1" body="$2" code="$3"
            if [ "$code" = "200" ] && echo "$body" | jq . > /dev/null 2>&1; then
              echo "✅ $name (HTTP $code)"
              PASS=$((PASS+1))
            else
              echo "❌ $name (HTTP $code)"
              echo "   Body: ${body:0:400}"
              FAIL=$((FAIL+1))
            fi
          }

          echo ""
          echo "1️⃣  GET /"
          R=$(do_get "${BASE}/"); CODE="${R%%|*}"; B="${R#*|}"
          check "GET /" "$B" "$CODE"
          echo "$B" | jq '{model:.model, endpoint:.active_endpoint}' 2>/dev/null || true
          echo ""

          echo "2️⃣  GET /health"
          R=$(do_get "${BASE}/health"); CODE="${R%%|*}"; B="${R#*|}"
          check "GET /health" "$B" "$CODE"
          echo "$B" | jq '{status,model_loaded,model_in_ram,active_endpoint}' 2>/dev/null || true
          echo ""

          echo "3️⃣  GET /v1/models"
          R=$(do_get "${BASE}/v1/models"); CODE="${R%%|*}"; B="${R#*|}"
          check "GET /v1/models" "$B" "$CODE"
          echo "$B" | jq '.data[].id' 2>/dev/null || true
          echo ""

          echo "4️⃣  GET /api/tags"
          R=$(do_get "${BASE}/api/tags"); CODE="${R%%|*}"; B="${R#*|}"
          check "GET /api/tags" "$B" "$CODE"
          echo "$B" | jq '.models[].name' 2>/dev/null || true
          echo ""

          echo "5️⃣  GET /api/version"
          R=$(do_get "${BASE}/api/version"); CODE="${R%%|*}"; B="${R#*|}"
          check "GET /api/version" "$B" "$CODE"
          echo "$B" | jq . 2>/dev/null || true
          echo ""

          echo "6️⃣  GET /api/ps"
          R=$(do_get "${BASE}/api/ps"); CODE="${R%%|*}"; B="${R#*|}"
          check "GET /api/ps" "$B" "$CODE"
          echo "$B" | jq . 2>/dev/null || true
          echo ""

          echo "7️⃣  GET /v1/tools"
          R=$(do_get "${BASE}/v1/tools"); CODE="${R%%|*}"; B="${R#*|}"
          check "GET /v1/tools" "$B" "$CODE"
          echo "$B" | jq .count 2>/dev/null || true
          echo ""

          echo "8️⃣  POST /v1/chat/completions"
          DATA='{"model":"gemma4:e4b","messages":[{"role":"user","content":"Reply with one word: pong"}],"max_tokens":20,"stream":false}'
          R=$(do_post "${BASE}/v1/chat/completions" "$DATA"); CODE="${R%%|*}"; B="${R#*|}"
          check "POST /v1/chat/completions" "$B" "$CODE"
          echo "$B" | jq '{finish:.choices[0].finish_reason, reply:.choices[0].message.content}' 2>/dev/null || true
          echo ""

          echo "9️⃣  POST /api/chat"
          DATA='{"model":"gemma4:e4b","messages":[{"role":"user","content":"Reply with one word: pong"}],"stream":false}'
          R=$(do_post "${BASE}/api/chat" "$DATA"); CODE="${R%%|*}"; B="${R#*|}"
          check "POST /api/chat" "$B" "$CODE"
          echo "$B" | jq '{done, reply:.message.content}' 2>/dev/null || true
          echo ""

          echo "🔟  POST /v1/messages"
          DATA='{"model":"gemma4:e4b","messages":[{"role":"user","content":"Reply with one word: pong"}],"max_tokens":20,"stream":false}'
          R=$(do_post "${BASE}/v1/messages" "$DATA"); CODE="${R%%|*}"; B="${R#*|}"
          check "POST /v1/messages" "$B" "$CODE"
          echo "$B" | jq '{stop_reason, text:.content[0].text}' 2>/dev/null || true
          echo ""

          echo "═══════════════════════════════════════════════"
          echo "Results: ✅ $PASS passed  ❌ $FAIL failed"
          echo "═══════════════════════════════════════════════"
          exit 0   # never fail the job on test results alone

      - name: ⏱️ Session Pulser (${{ env.SESSION_HOURS }}h) with RAM Keepalive
        run: |
          SESSION_SECONDS=$(( ${{ env.SESSION_HOURS }} * 3600 ))
          echo "⏱️  Session: ${SESSION_SECONDS}s (${{ env.SESSION_HOURS }}h)"

          # Sanitize tunnel URL
          RAW_URL="${{ env.CLOUDFLARE_URL }}"
          CF_URL="${RAW_URL//__/}"
          CF_URL="${CF_URL%/}"
          [ -n "$CF_URL" ] && echo "🌐 $CF_URL"

          START=$(date +%s)
          END=$(( START + SESSION_SECONDS ))
          PING_COUNT=0

          while [ "$(date +%s)" -lt "$END" ]; do
            NOW=$(date +%s)
            REMAIN_MIN=$(( (END - NOW) / 60 ))

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "⏰ $(date '+%Y-%m-%d %H:%M:%S UTC') | ${REMAIN_MIN}m remaining"

            # Tunnel health
            if [ -n "$CF_URL" ]; then
              HEALTH=$(curl -sf --max-time 15 "${CF_URL}/health" 2>/dev/null \
                || echo '{"status":"unreachable"}')
              echo "🏥 $(echo "$HEALTH" | jq -r \
                '"status=\(.status) loaded=\(.model_loaded) ram=\(.model_in_ram)"' \
                2>/dev/null || echo "$HEALTH")"
            fi

            # Direct Ollama
            VER=$(curl -sf --max-time 5 \
              "http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/version" 2>/dev/null \
              | jq -r .version 2>/dev/null || echo "unreachable")
            echo "🟢 Ollama: $VER"

            # RAM check
            PS=$(curl -sf --max-time 5 \
              "http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/ps" 2>/dev/null \
              || echo '{"models":[]}')
            COUNT=$(echo "$PS" | jq '.models|length' 2>/dev/null || echo 0)
            echo "🧠 Models in RAM: $COUNT"

            if [ "${COUNT}" -eq "0" ]; then
              echo "⚠️  Model evicted — reloading into RAM..."
              curl -sf --max-time 90 \
                -X POST "http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/generate" \
                -H "Content-Type: application/json" \
                -d '{"model":"${{ env.MODEL }}","prompt":"hi","stream":false,"keep_alive":-1,"options":{"num_predict":1}}' \
                > /dev/null 2>&1 \
                && echo "✅ Reloaded" || echo "❌ Reload failed"
            fi

            # Process checks
            PROXY_PID=$(cat proxy.pid 2>/dev/null || echo "")
            OLLAMA_PID=$(cat ollama.pid 2>/dev/null || echo "")
            [ -n "$PROXY_PID" ] && kill -0 "$PROXY_PID" 2>/dev/null \
              && echo "📡 Proxy ($PROXY_PID): alive" || echo "❌ Proxy dead"
            [ -n "$OLLAMA_PID" ] && kill -0 "$OLLAMA_PID" 2>/dev/null \
              && echo "🦙 Ollama ($OLLAMA_PID): alive" || echo "❌ Ollama dead"

            echo "💾 $(free -h | awk '/^Mem/{printf "RAM: %s / %s", $3, $2}')"

            PING_COUNT=$((PING_COUNT+1))
            echo "📊 Ping #$PING_COUNT"
            sleep 300
          done

          echo "🏁 Session complete"

      - name: 📊 Final Report
        if: always()
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║              FINAL SESSION REPORT            ║"
          echo "╚══════════════════════════════════════════════╝"
          RAW="${{ env.CLOUDFLARE_URL }}"
          CF="${RAW//__/}"
          [ -n "$CF" ] && echo "🌐 $CF"

          echo "── Proxy Health ──"
          curl -sf http://127.0.0.1:${{ env.PROXY_PORT }}/health | jq . || echo "unreachable"

          echo "── Ollama /api/ps ──"
          curl -sf http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/ps | jq . || echo "unreachable"

          echo "── proxy.log (last 30) ──"
          tail -30 proxy.log 2>/dev/null | sed 's/^/  /' || echo "  (none)"

          echo "── ollama.log (last 20) ──"
          tail -20 ollama.log 2>/dev/null | sed 's/^/  /' || echo "  (none)"

          echo "── tunnel.log (last 10) ──"
          tail -10 tunnel.log 2>/dev/null | sed 's/^/  /' || echo "  (none)"

      - name: 🛑 Cleanup
        if: always()
        run: |
          echo "🧹 Cleanup..."
          for f in tunnel.pid proxy.pid ollama.pid; do
            [ -f "$f" ] && kill -9 "$(cat $f)" 2>/dev/null || true
          done
          pkill -9 -f cloudflared  2>/dev/null || true
          pkill -9 -f ollama       2>/dev/null || true
          pkill -9 -f proxy_server 2>/dev/null || true
          sudo fuser -k ${{ env.PROXY_PORT }}/tcp  2>/dev/null || true
          sudo fuser -k ${{ env.OLLAMA_PORT }}/tcp 2>/dev/null || true
          rm -f ./*.pid 2>/dev/null || true
          echo "✅ Done"
