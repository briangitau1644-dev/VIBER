name: Senior Engineer - Ollama gemma4:e4b

on:
  workflow_dispatch:
    inputs:
      session_hours:
        description: 'Session duration (max 6)'
        required: false
        default: '6'
      ctx_size:
        description: 'Context size'
        required: false
        default: '8192'
      temperature:
        description: '0.1-0.3 for deterministic code'
        required: false
        default: '0.2'

env:
  SESSION_HOURS: ${{ github.event.inputs.session_hours || '6' }}
  CTX_SIZE: ${{ github.event.inputs.ctx_size || '8192' }}
  TEMPERATURE: ${{ github.event.inputs.temperature || '0.2' }}
  OLLAMA_PORT: '11434'
  PROXY_PORT: '1234'
  MODEL: 'gemma4:e4b'  # ONLY THIS MODEL

jobs:
  senior-engineer-ollama-gemma4:
    name: gemma4:e4b via Ollama
    runs-on: ubuntu-latest
    timeout-minutes: 400

    steps:
      - uses: actions/checkout@v4

      - name: Kill stale processes
        run: |
          pkill -9 -f ollama 2>/dev/null || true
          pkill -9 -f cloudflared 2>/dev/null || true
          pkill -9 -f "python.*interceptor" 2>/dev/null || true
          sudo fuser -k $PROXY_PORT/tcp 2>/dev/null || true
          sudo fuser -k $OLLAMA_PORT/tcp 2>/dev/null || true
          sleep 2
          echo "✅ Ports cleared"

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl wget jq python3
          python3 --version

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama --version

      - name: Start Ollama
        run: |
          OLLAMA_HOST=0.0.0.0:$OLLAMA_PORT OLLAMA_KEEP_ALIVE=-1 OLLAMA_NUM_PARALLEL=1 nohup ollama serve > ollama.log 2>&1 &
          echo "⏳ Waiting for Ollama API..."
          for i in $(seq 1 120); do  # Extended wait
            curl -sf "http://127.0.0.1:$OLLAMA_PORT/api/tags" > /dev/null 2>&1 && { echo "✅ Ollama ready"; break; }
            [ "$i" -eq 120 ] && { echo "❌ Ollama timeout"; cat ollama.log; exit 1; }
            sleep 2
          done

      - name: Pull gemma4:e4b
        run: |
          echo "📦 Pulling $MODEL (this may take several minutes)..."
          OLLAMA_HOST=127.0.0.1:$OLLAMA_PORT ollama pull "$MODEL"
          echo "✅ Pull complete"

      - name: Verify model exists
        run: |
          echo "🔍 Verifying $MODEL is loaded..."
          OLLAMA_HOST=127.0.0.1:$OLLAMA_PORT ollama list
          if ! OLLAMA_HOST=127.0.0.1:$OLLAMA_PORT ollama list | grep -q "^$MODEL"; then
            echo "❌ FATAL: $MODEL not found after pull!"
            echo "Available models:"
            OLLAMA_HOST=127.0.0.1:$OLLAMA_PORT ollama list
            exit 1
          fi
          echo "✅ $MODEL confirmed"

      - name: Warm up gemma4:e4b
        run: |
          echo "🔥 Warming up $MODEL (extended timeout)..."
          # Use longer timeout for large model initialization
          curl -sf "http://127.0.0.1:$OLLAMA_PORT/api/chat" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"$MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"stream\":false,\"options\":{\"num_predict\":3}}" \
            --max-time 300 > /dev/null  # 5 minute timeout for warmup
          echo "✅ Warmup complete"

      - name: Start Proxy
        run: |
          python3 interceptor.py > proxy.log 2>&1 &
          echo $! > proxy.pid
          sleep 3  # Give proxy time to bind
          
          if ! kill -0 $(cat proxy.pid) 2>/dev/null; then
            echo "❌ Proxy crashed on startup"
            cat proxy.log
            exit 1
          fi
          echo "✅ Proxy alive (PID: $(cat proxy.pid))"
          
          echo "⏳ Health check..."
          for i in $(seq 1 20); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:$PROXY_PORT/health" --max-time 5 2>/dev/null)
            [ "$HTTP" = "200" ] && { echo "✅ Proxy healthy"; break; }
            [ "$i" -eq 20 ] && { echo "❌ Health failed (HTTP $HTTP)"; cat proxy.log; exit 1; }
            sleep 1
          done

      - name: Test Direct Ollama (bypass proxy)
        run: |
          echo "🧪 Testing $MODEL directly via Ollama API..."
          RESP=$(curl -sf "http://127.0.0.1:$OLLAMA_PORT/api/chat" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"$MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"Reply with exactly: TEST_OK\"}],\"stream\":false,\"options\":{\"num_predict\":10}}" \
            --max-time 120)
          echo "Direct Ollama response: $RESP"
          CONTENT=$(echo "$RESP" | jq -r '.message.content // empty' 2>/dev/null)
          echo "Direct content: '$CONTENT'"
          if [ -z "$CONTENT" ]; then
            echo "⚠️ Direct Ollama also returned empty - model may need more time or different params"
          else
            echo "✅ Direct Ollama works"
          fi

      - name: Verify End-to-End via Proxy
        run: |
          echo "🔄 Testing through proxy..."
          RESP=$(curl -sf "http://127.0.0.1:$PROXY_PORT/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"$MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"Reply: ready\"}],\"max_tokens\":10}" \
            --max-time 120)
          echo "Proxy raw response: $RESP"
          CONTENT=$(echo "$RESP" | jq -r '.choices[0].message.content // empty' 2>/dev/null)
          echo "Proxy content: '$CONTENT'"
          # Don't fail on empty - just log; the verbose proxy.log will show why
          if [ -z "$CONTENT" ]; then
            echo "⚠️ Proxy returned empty - check proxy.log for Ollama response details"
          else
            echo "✅ Proxy end-to-end OK"
          fi

      - name: Cloudflare Tunnel
        run: |
          curl -fsSL -o /tmp/cf.deb "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb"
          sudo dpkg -i /tmp/cf.deb 2>/dev/null || true
          nohup cloudflared tunnel --url "http://127.0.0.1:$PROXY_PORT" --no-autoupdate > tunnel.log 2>&1 &
          echo $! > tunnel.pid
          
          URL=""
          for i in $(seq 1 60); do  # Extended tunnel wait
            URL=$(grep -oP 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' tunnel.log 2>/dev/null | head -1)
            [ -n "$URL" ] && break; sleep 2
          done
          [ -z "$URL" ] && { echo "❌ No tunnel"; cat tunnel.log; exit 1; }
          echo "CLOUDFLARE_URL=${URL%/}" >> $GITHUB_ENV
          echo "✅ Tunnel: $URL"

      - name: Keepalive
        run: |
          END=$(( $(date +%s) + SESSION_HOURS * 3600 ))
          while [ "$(date +%s)" -lt "$END" ]; do
            REM=$(( (END - $(date +%s)) / 60 ))
            echo "💓 ${REM}min - $(date -u '+%H:%M UTC')"
            sleep 300
          done

      - name: Final Logs
        if: always()
        run: |
          echo "📋 proxy.log (last 50 lines):"
          tail -50 proxy.log 2>/dev/null || echo "(none)"
          echo "📋 ollama.log (last 30):"
          tail -30 ollama.log 2>/dev/null || echo "(none)"

      - name: Cleanup
        if: always()
        run: |
          for f in proxy.pid ollama.pid tunnel.pid; do [ -f "$f" ] && kill -9 $(cat "$f") 2>/dev/null || true; done
          pkill -9 -f cloudflared 2>/dev/null || true; pkill -9 -f ollama 2>/dev/null || true
