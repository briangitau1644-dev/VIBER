name: Gemma4:E4B — Ollama OpenAI Proxy (Robust)

# ──────────────────────────────────────────────────────────────────
# TRIGGER
# ──────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      session_hours:
        description: 'Session duration (max 6 hours on free tier)'
        required: false
        default: '6'
        type: choice
        options: ['1', '2', '4', '6']
      ctx_size:
        description: 'Context window (tokens)'
        required: false
        default: '8192'
        type: choice
        options: ['2048', '4096', '8192', '16384']
      temperature:
        description: 'Temperature (0.0 – 1.0)'
        required: false
        default: '0.3'
      debug_mode:
        description: 'Enable verbose debug logging'
        required: false
        default: 'false'
        type: boolean

# ──────────────────────────────────────────────────────────────────
# ENVIRONMENT
# ──────────────────────────────────────────────────────────────────
env:
  SESSION_HOURS: ${{ github.event.inputs.session_hours || '6' }}
  CTX_SIZE:      ${{ github.event.inputs.ctx_size      || '8192' }}
  TEMPERATURE:   ${{ github.event.inputs.temperature   || '0.3' }}
  DEBUG_MODE:    ${{ github.event.inputs.debug_mode    || 'false' }}
  OLLAMA_PORT:   '11434'
  PROXY_PORT:    '1234'
  MODEL:         'gemma4:e4b'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# ──────────────────────────────────────────────────────────────────
# JOB
# ──────────────────────────────────────────────────────────────────
jobs:
  serve:
    name: Serve Gemma4:E4B via OpenAI-Compatible Proxy
    runs-on: ubuntu-latest
    timeout-minutes: 360   # hard cap: 6 h

    steps:
      # ────────────────────────────────────────────────────────────
      # 1. CHECKOUT
      # ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ────────────────────────────────────────────────────────────
      # 2. KILL ANY STALE PROCESSES
      # ────────────────────────────────────────────────────────────
      - name: Kill stale processes
        run: |
          echo "🧹 Cleaning up..."
          pkill -9 -f ollama       2>/dev/null || true
          pkill -9 -f cloudflared  2>/dev/null || true
          pkill -9 -f interceptor  2>/dev/null || true
          sudo fuser -k ${PROXY_PORT}/tcp  2>/dev/null || true
          sudo fuser -k ${OLLAMA_PORT}/tcp 2>/dev/null || true
          docker kill $(docker ps -q)  2>/dev/null || true
          docker system prune -f       2>/dev/null || true
          sleep 2
          echo "✅ Done"

      # ────────────────────────────────────────────────────────────
      # 3. INSTALL SYSTEM DEPS
      # ────────────────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl wget jq python3 python3-pip net-tools
          pip3 install --quiet --upgrade pip
          pip3 install --quiet flask requests
          echo "✅ System deps installed"

      # ────────────────────────────────────────────────────────────
      # 4. INSTALL OLLAMA
      # ────────────────────────────────────────────────────────────
      - name: Install Ollama
        run: |
          sudo rm -f /usr/local/bin/ollama
          curl -fsSL https://ollama.com/install.sh | sh -s -- --force
          ollama --version
          echo "✅ Ollama installed"

      # ────────────────────────────────────────────────────────────
      # 5. START OLLAMA SERVER
      # ────────────────────────────────────────────────────────────
      - name: Start Ollama server
        run: |
          OLLAMA_HOST=0.0.0.0:${OLLAMA_PORT} \
          OLLAMA_KEEP_ALIVE=-1 \
          OLLAMA_NUM_PARALLEL=1 \
          OLLAMA_LOAD_TIMEOUT=300 \
            nohup ollama serve > ollama.log 2>&1 &
          echo $! > ollama.pid

          echo "⏳ Waiting for Ollama..."
          for i in $(seq 1 60); do
            if curl -sf "http://127.0.0.1:${OLLAMA_PORT}/api/tags" >/dev/null 2>&1; then
              echo "✅ Ollama ready (${i}s)"; break
            fi
            [ "$i" -eq 60 ] && { echo "❌ Ollama never started"; cat ollama.log; exit 1; }
            sleep 2
          done

      # ────────────────────────────────────────────────────────────
      # 6. PULL MODEL
      # ────────────────────────────────────────────────────────────
      - name: Pull model (${{ env.MODEL }})
        run: |
          echo "📦 Pulling ${MODEL} (~9.6 GB — allow 10+ min)..."
          OLLAMA_HOST=127.0.0.1:${OLLAMA_PORT} ollama pull "${MODEL}"
          echo "✅ Pull complete"

      # ────────────────────────────────────────────────────────────
      # 7. VERIFY MODEL
      # ────────────────────────────────────────────────────────────
      - name: Verify model
        run: |
          OLLAMA_HOST=127.0.0.1:${OLLAMA_PORT} ollama list
          OLLAMA_HOST=127.0.0.1:${OLLAMA_PORT} ollama list | grep -q "^${MODEL}" \
            || { echo "❌ Model not found after pull"; exit 1; }
          echo "✅ Model verified"

      # ────────────────────────────────────────────────────────────
      # 8. WARM UP MODEL
      # ────────────────────────────────────────────────────────────
      - name: Warm up model
        run: |
          curl -s -X POST "http://127.0.0.1:${OLLAMA_PORT}/api/generate" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"${MODEL}\",\"prompt\":\"Say OK\",\"stream\":false,\"options\":{\"num_predict\":5}}" \
            --max-time 120 > /dev/null || true
          echo "✅ Model warmed up"

      # ────────────────────────────────────────────────────────────
      # 9. WRITE interceptor.py
      # ────────────────────────────────────────────────────────────
      - name: Write interceptor.py
        run: |
          cat > interceptor.py << 'PYEOF'
          #!/usr/bin/env python3
          """
          Ollama OpenAI-Compatible Proxy v4.0
          Endpoints:  /  /health  /v1  /v1/models  /v1/chat/completions
                      /v1/completions  /v1/responses  /v1/embeddings
                      /v1/debug  /api/debug
          """
          import os, sys, json, time, logging, requests, uuid
          from flask import Flask, request, jsonify, Response, stream_with_context

          logging.basicConfig(
              level=logging.DEBUG if os.getenv("DEBUG_MODE","false").lower()=="true" else logging.INFO,
              format="[%(asctime)s] %(levelname)s: %(message)s",
          )
          log = logging.getLogger("proxy")
          app = Flask(__name__)

          PROXY_PORT   = int(os.getenv("PROXY_PORT",  "1234"))
          OLLAMA_PORT  = int(os.getenv("OLLAMA_PORT", "11434"))
          OLLAMA_HOST  = os.getenv("OLLAMA_HOST", "127.0.0.1")
          REAL_MODEL   = os.getenv("MODEL", "gemma4:e4b")
          CTX_SIZE     = int(os.getenv("CTX_SIZE",    "8192"))
          TEMPERATURE  = float(os.getenv("TEMPERATURE","0.3"))
          OLLAMA_URL   = f"http://{OLLAMA_HOST}:{OLLAMA_PORT}"
          TIMEOUT      = 600

          ALIASES = {
              "gpt-4o":"","gpt-4o-mini":"","gpt-4-turbo":"","gpt-4":"",
              "gpt-3.5-turbo":"","gpt-5.1-codex-max":"",
              "o1":"","o1-mini":"","o3":"","o3-mini":"",
              "claude-3-opus":"","claude-3-sonnet":"","claude-3-haiku":"",
              "claude-3-5-sonnet":"","claude-3-5-haiku":"",
              "llama2":"","llama3":"","llama3.1":"","llama3.2":"",
              "mistral":"","mixtral":"","gemma":"","gemma2":"",
          }
          # resolve any alias → real model
          def resolve(name): return REAL_MODEL  # all names map to real model

          @app.after_request
          def cors(r):
              r.headers["Access-Control-Allow-Origin"]  = "*"
              r.headers["Access-Control-Allow-Methods"] = "GET,POST,PUT,DELETE,OPTIONS,PATCH,HEAD"
              r.headers["Access-Control-Allow-Headers"] = (
                  "Content-Type,Authorization,Accept,X-Requested-With,"
                  "OpenAI-Beta,X-API-Key,api-key"
              )
              return r

          @app.before_request
          def preflight():
              if request.method == "OPTIONS": return "", 204

          def jbody():
              try: return request.get_json(force=True, silent=True) or {}
              except: return {}

          def ollama_up():
              try: return requests.get(f"{OLLAMA_URL}/api/tags",timeout=5).status_code==200
              except: return False

          def oai_resp(content, model, pt=0, ct=0):
              return {
                  "id":f"chatcmpl-{uuid.uuid4().hex[:12]}","object":"chat.completion",
                  "created":int(time.time()),"model":model,
                  "choices":[{"index":0,"message":{"role":"assistant","content":content or "(empty)"},
                               "logprobs":None,"finish_reason":"stop"}],
                  "usage":{"prompt_tokens":pt,"completion_tokens":ct or len(content.split()),
                           "total_tokens":pt+(ct or len(content.split()))},
                  "system_fingerprint":f"fp_{uuid.uuid4().hex[:8]}",
              }

          def msgs2prompt(msgs):
              out=[]
              for m in msgs:
                  role=m.get("role","user"); c=m.get("content","")
                  if isinstance(c,list): c=" ".join(x.get("text","") for x in c if isinstance(x,dict) and x.get("type")=="text")
                  label={"system":"System","user":"User","assistant":"Assistant"}.get(role,role.title())
                  out.append(f"{label}: {c}")
              out.append("Assistant:"); return "\n".join(out)

          def do_stream(payload, req_model):
              def gen():
                  try:
                      with requests.post(f"{OLLAMA_URL}/api/chat",json={**payload,"stream":True},
                                         stream=True,timeout=TIMEOUT) as r:
                          for line in r.iter_lines():
                              if not line: continue
                              try:
                                  ch=json.loads(line); delta=ch.get("message",{}).get("content","")
                                  done=ch.get("done",False)
                                  d={"id":f"chatcmpl-{uuid.uuid4().hex[:8]}","object":"chat.completion.chunk",
                                     "created":int(time.time()),"model":req_model,
                                     "choices":[{"index":0,"delta":{"role":"assistant","content":delta} if delta else {},
                                                  "finish_reason":"stop" if done else None}]}
                                  yield f"data: {json.dumps(d)}\n\n"
                                  if done: yield "data: [DONE]\n\n"; return
                              except: continue
                  except Exception as e:
                      yield f"data: {json.dumps({'error':str(e)})}\n\n"
                      yield "data: [DONE]\n\n"
              return Response(stream_with_context(gen()), mimetype="text/event-stream",
                              headers={"Cache-Control":"no-cache","X-Accel-Buffering":"no",
                                       "Connection":"keep-alive"})

          # ── / ────────────────────────────────────────────────────
          @app.route("/")
          def root():
              base=request.url_root.rstrip("/")
              return jsonify({"service":"Ollama OpenAI Proxy","version":"4.0.0","model":REAL_MODEL,
                              "endpoints":{
                                  "health":f"{base}/health","debug":f"{base}/v1/debug",
                                  "models":f"{base}/v1/models",
                                  "chat":f"{base}/v1/chat/completions",
                                  "completions":f"{base}/v1/completions",
                                  "responses":f"{base}/v1/responses",
                                  "embeddings":f"{base}/v1/embeddings",
                              },
                              "config":{"provider":"openai","baseUrl":f"{base}/v1",
                                        "model":"gpt-4","apiKey":"any"}})

          # ── /health ──────────────────────────────────────────────
          @app.route("/health", methods=["GET","HEAD"])
          def health():
              if request.method=="HEAD": return "",200
              ok=ollama_up()
              return jsonify({"status":"healthy" if ok else "degraded","proxy":"running",
                              "ollama":"connected" if ok else "disconnected","model":REAL_MODEL}),200 if ok else 503

          # ── /v1 ──────────────────────────────────────────────────
          @app.route("/v1")
          def v1():
              base=request.url_root.rstrip("/")
              return jsonify({"message":"OpenAI v1 compat layer","baseUrl":f"{base}/v1"})

          # ── /v1/debug & /api/debug ───────────────────────────────
          @app.route("/v1/debug"); @app.route("/api/debug")
          def dbg():
              try:
                  r=requests.get(f"{OLLAMA_URL}/api/tags",timeout=5)
                  oi={"connected":True,"models":[m.get("name") for m in r.json().get("models",[])]}
              except Exception as e: oi={"connected":False,"error":str(e)}
              return jsonify({"ollama_url":OLLAMA_URL,"ollama":oi,"model":REAL_MODEL,
                              "aliases":list(ALIASES.keys()),"ctx":CTX_SIZE,"temp":TEMPERATURE})

          # ── /v1/models ───────────────────────────────────────────
          @app.route("/v1/models")
          def models():
              ts=int(time.time())
              data=[{"id":k,"object":"model","created":ts,"owned_by":"proxy" if k!=REAL_MODEL else "ollama"}
                    for k in [REAL_MODEL,"gpt-4o","gpt-4-turbo","gpt-4","gpt-3.5-turbo",
                               "gpt-5.1-codex-max","claude-3-opus","claude-3-sonnet","llama3","mistral"]]
              return jsonify({"object":"list","data":data})

          @app.route("/v1/models/<path:mid>")
          def model_info(mid):
              return jsonify({"id":mid,"object":"model","created":int(time.time()),
                              "owned_by":"proxy","mapped_to":REAL_MODEL})

          # ── /v1/chat/completions ─────────────────────────────────
          @app.route("/v1/chat/completions", methods=["POST"])
          def chat():
              d=jbody(); req_model=d.get("model","gpt-4"); actual=resolve(req_model)
              msgs=d.get("messages",[]) or [{"role":"user","content":"Say hello"}]
              if not any(m.get("role")=="system" for m in msgs):
                  msgs=[{"role":"system","content":"You are a helpful assistant."}]+msgs
              stream=d.get("stream",False)
              mt=d.get("max_tokens") or d.get("max_completion_tokens") or 1024
              temp=d.get("temperature",TEMPERATURE)
              payload={"model":actual,"messages":msgs,"stream":stream,
                       "options":{"temperature":temp,"top_p":d.get("top_p",0.95),
                                  "num_predict":mt,"num_ctx":CTX_SIZE}}
              if stream: return do_stream(payload, req_model)
              try:
                  r=requests.post(f"{OLLAMA_URL}/api/chat",json=payload,timeout=TIMEOUT)
                  if r.status_code==200:
                      res=r.json(); c=res.get("message",{}).get("content","").strip()
                      return jsonify(oai_resp(c,req_model,res.get("prompt_eval_count",0),res.get("eval_count",0)))
                  log.warning("/api/chat → %s, falling back",r.status_code)
              except requests.exceptions.ConnectionError:
                  return jsonify({"error":{"message":f"Ollama unreachable at {OLLAMA_URL}","type":"connection_error"}}),503
              except Exception as e:
                  return jsonify({"error":{"message":str(e),"type":"server_error"}}),500
              # fallback /api/generate
              try:
                  r2=requests.post(f"{OLLAMA_URL}/api/generate",
                                   json={"model":actual,"prompt":msgs2prompt(msgs),"stream":False,
                                         "options":{"temperature":temp,"num_predict":mt,"num_ctx":CTX_SIZE}},
                                   timeout=TIMEOUT)
                  r2.raise_for_status()
                  return jsonify(oai_resp(r2.json().get("response","").strip(),req_model))
              except Exception as e:
                  return jsonify({"error":{"message":str(e),"type":"server_error"}}),500

          # ── /v1/completions ──────────────────────────────────────
          @app.route("/v1/completions", methods=["POST"])
          def completions():
              d=jbody(); req_model=d.get("model","gpt-3.5-turbo"); actual=resolve(req_model)
              prompt=d.get("prompt","Say hello")
              if isinstance(prompt,list): prompt=" ".join(str(p) for p in prompt)
              mt=d.get("max_tokens",256); temp=d.get("temperature",TEMPERATURE)
              try:
                  r=requests.post(f"{OLLAMA_URL}/api/generate",
                                  json={"model":actual,"prompt":f"User: {prompt}\nAssistant:","stream":False,
                                        "options":{"temperature":temp,"num_predict":mt,"num_ctx":CTX_SIZE}},
                                  timeout=TIMEOUT)
                  r.raise_for_status(); text=r.json().get("response","").strip()
                  return jsonify({"id":f"cmpl-{uuid.uuid4().hex[:12]}","object":"text_completion",
                                  "created":int(time.time()),"model":req_model,
                                  "choices":[{"text":text,"index":0,"logprobs":None,"finish_reason":"stop"}],
                                  "usage":{"prompt_tokens":0,"completion_tokens":len(text.split()),"total_tokens":0}})
              except Exception as e:
                  return jsonify({"error":{"message":str(e)}}),500

          # ── /v1/responses ────────────────────────────────────────
          @app.route("/v1/responses", methods=["POST"])
          def responses():
              d=jbody(); req_model=d.get("model","gpt-4o"); actual=resolve(req_model)
              inp=d.get("input","")
              if isinstance(inp,dict): inp=inp.get("content","")
              elif isinstance(inp,list): inp=" ".join(i.get("text","") if isinstance(i,dict) else str(i) for i in inp)
              if not inp: inp="Say hello"
              instr=d.get("instructions",""); temp=d.get("temperature",TEMPERATURE)
              prompt=(f"{instr}\n\n" if instr else "")+f"User: {inp}\nAssistant:"
              try:
                  r=requests.post(f"{OLLAMA_URL}/api/generate",
                                  json={"model":actual,"prompt":prompt,"stream":False,
                                        "options":{"temperature":temp,"num_predict":d.get("max_output_tokens",1024)}},
                                  timeout=TIMEOUT)
                  r.raise_for_status(); c=r.json().get("response","").strip()
                  return jsonify({"id":f"resp_{uuid.uuid4().hex[:12]}","object":"response",
                                  "created":int(time.time()),"model":req_model,
                                  "output":[{"type":"message","role":"assistant",
                                             "content":[{"type":"output_text","text":c}]}],
                                  "usage":{"input_tokens":0,"output_tokens":len(c.split()),"total_tokens":0}})
              except Exception as e:
                  return jsonify({"error":{"message":str(e)}}),500

          # ── /v1/embeddings (stub) ────────────────────────────────
          @app.route("/v1/embeddings", methods=["POST"])
          def embeddings():
              d=jbody(); inp=d.get("input",""); texts=[inp] if isinstance(inp,str) else inp
              return jsonify({"object":"list",
                              "data":[{"object":"embedding","index":i,"embedding":[0.0]*768}
                                      for i,_ in enumerate(texts)],
                              "model":d.get("model",REAL_MODEL),
                              "usage":{"prompt_tokens":0,"total_tokens":0}})

          # ── catch-all ────────────────────────────────────────────
          @app.route("/<path:p>", methods=["GET","POST","PUT","DELETE","PATCH"])
          def fallback(p):
              return jsonify({"error":f"/{p} not found",
                              "available":"/v1/chat/completions /v1/completions /v1/responses /v1/models /v1/embeddings /health",
                              "baseUrl":request.url_root.rstrip("/")+"/v1"}),404

          if __name__=="__main__":
              log.info("="*60)
              log.info("🚀 Proxy v4.0  port=%d  model=%s  ctx=%d", PROXY_PORT, REAL_MODEL, CTX_SIZE)
              log.info("="*60)
              app.run(host="0.0.0.0", port=PROXY_PORT, threaded=True, debug=False)
          PYEOF

          chmod +x interceptor.py
          echo "✅ interceptor.py written"

      # ────────────────────────────────────────────────────────────
      # 10. START PROXY
      # ────────────────────────────────────────────────────────────
      - name: Start interceptor proxy
        run: |
          PROXY_PORT=$PROXY_PORT \
          OLLAMA_PORT=$OLLAMA_PORT \
          OLLAMA_HOST=127.0.0.1 \
          MODEL=$MODEL \
          CTX_SIZE=$CTX_SIZE \
          TEMPERATURE=$TEMPERATURE \
          DEBUG_MODE=$DEBUG_MODE \
            python3 interceptor.py > proxy.log 2>&1 &
          echo $! > proxy.pid

          echo "⏳ Waiting for proxy..."
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:${PROXY_PORT}/health" >/dev/null 2>&1; then
              echo "✅ Proxy healthy (${i}s)"; break
            fi
            [ "$i" -eq 30 ] && { echo "❌ Proxy failed to start"; cat proxy.log; exit 1; }
            sleep 1
          done

      # ────────────────────────────────────────────────────────────
      # 11. INSTALL CLOUDFLARED
      # ────────────────────────────────────────────────────────────
      - name: Install cloudflared
        run: |
          curl -fsSL -o /tmp/cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i /tmp/cloudflared.deb 2>/dev/null || sudo apt-get install -f -y -qq
          cloudflared --version
          echo "✅ cloudflared installed"

      # ────────────────────────────────────────────────────────────
      # 12. START CLOUDFLARE TUNNEL  ← fixed URL extraction
      # ────────────────────────────────────────────────────────────
      - name: Start Cloudflare tunnel
        run: |
          nohup cloudflared tunnel \
            --url "http://127.0.0.1:${PROXY_PORT}" \
            --no-autoupdate \
            --loglevel info \
            > tunnel.log 2>&1 &
          echo $! > tunnel.pid

          echo "⏳ Waiting for tunnel URL..."
          TUNNEL_URL=""
          for i in $(seq 1 90); do
            # Try both URL patterns cloudflared emits
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log 2>/dev/null | head -1 || true)
            if [ -z "$TUNNEL_URL" ]; then
              TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.cfargotunnel\.com' tunnel.log 2>/dev/null | head -1 || true)
            fi
            if [ -n "$TUNNEL_URL" ]; then
              echo "TUNNEL_URL=${TUNNEL_URL}" >> "$GITHUB_ENV"
              echo "✅ Tunnel URL: ${TUNNEL_URL}"
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "❌ Tunnel URL not found after 180s"
              cat tunnel.log
              exit 1
            fi
            sleep 2
          done

      # ────────────────────────────────────────────────────────────
      # 13. SMOKE-TEST ALL ENDPOINTS
      # ────────────────────────────────────────────────────────────
      - name: Smoke-test endpoints
        run: |
          BASE="${{ env.TUNNEL_URL }}"
          echo "🧪 Testing endpoints at ${BASE}..."

          pass() { echo "  ✅ $1"; }
          fail() { echo "  ⚠️  $1 (non-fatal)"; }

          # Root
          curl -sf  "${BASE}/"             >/dev/null && pass "GET /"             || fail "GET /"

          # Health
          curl -sf  "${BASE}/health"       >/dev/null && pass "GET /health"       || fail "GET /health"

          # Models
          curl -sf  "${BASE}/v1/models"    >/dev/null && pass "GET /v1/models"    || fail "GET /v1/models"

          # Debug
          curl -sf  "${BASE}/v1/debug"     >/dev/null && pass "GET /v1/debug"     || fail "GET /v1/debug"

          # Chat completions
          curl -sf -X POST "${BASE}/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -d '{"model":"gpt-4","messages":[{"role":"user","content":"Say OK in one word"}],"max_tokens":10}' \
            --max-time 90 >/dev/null && pass "POST /v1/chat/completions" || fail "POST /v1/chat/completions"

          # Legacy completions
          curl -sf -X POST "${BASE}/v1/completions" \
            -H "Content-Type: application/json" \
            -d '{"model":"gpt-3.5-turbo","prompt":"Say OK","max_tokens":5}' \
            --max-time 60 >/dev/null && pass "POST /v1/completions" || fail "POST /v1/completions"

          # Responses
          curl -sf -X POST "${BASE}/v1/responses" \
            -H "Content-Type: application/json" \
            -d '{"model":"gpt-4o","input":"Say OK","max_output_tokens":5}' \
            --max-time 60 >/dev/null && pass "POST /v1/responses" || fail "POST /v1/responses"

          echo ""
          echo "🧪 Smoke tests complete"

      # ────────────────────────────────────────────────────────────
      # 14. PRINT CONNECTION DETAILS
      # ────────────────────────────────────────────────────────────
      - name: Print connection details
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║              🎉  GEMMA4:E4B PROXY IS LIVE  🎉                   ║"
