      # ────────────────────────────────────────────────────────────
      # 15. KEEPALIVE LOOP
      # ────────────────────────────────────────────────────────────
      - name: Keepalive loop
        run: |
          END=$(( $(date +%s) + SESSION_HOURS * 3600 ))
          echo "⏱️  Session: ${SESSION_HOURS}h — ends $(date -d @$END '+%Y-%m-%d %H:%M UTC')"
          TICK=0
          while [ "$(date +%s)" -lt "$END" ]; do
            REMAINING=$(( (END - $(date +%s)) / 60 ))
            TICK=$(( TICK + 1 ))

            # Health ping every 5 min
            H=$(curl -sf "http://127.0.0.1:${PROXY_PORT}/health" 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','?'))" 2>/dev/null || echo "unreachable")
            echo "💓 $(date -u '+%H:%M:%S UTC') | ${REMAINING}m left | proxy=${H}"

            # Restart proxy if unhealthy
            if [ "$H" = "unreachable" ] && [ -f proxy.pid ]; then
              echo "⚠️  Proxy unreachable — restarting..."
              kill "$(cat proxy.pid)" 2>/dev/null || true
              PROXY_PORT=$PROXY_PORT OLLAMA_PORT=$OLLAMA_PORT MODEL=$MODEL \
              CTX_SIZE=$CTX_SIZE TEMPERATURE=$TEMPERATURE \
                python3 interceptor.py > proxy.log 2>&1 &
              echo $! > proxy.pid
              sleep 5
            fi

            sleep 300
          done
          echo "⏰ Session complete"

      # ────────────────────────────────────────────────────────────
      # 16. CLEANUP
      # ────────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          kill "$(cat proxy.pid)"    2>/dev/null || true
          kill "$(cat tunnel.pid)"   2>/dev/null || true
          kill "$(cat ollama.pid)"   2>/dev/null || true
          pkill -9 -f ollama         2>/dev/null || true
          pkill -9 -f cloudflared    2>/dev/null || true
          pkill -9 -f interceptor    2>/dev/null || true
          echo "✅ Cleanup done"

      # ────────────────────────────────────────────────────────────
      # 17. DUMP LOGS ON FAILURE
      # ────────────────────────────────────────────────────────────
      - name: Show logs on failure
        if: failure()
        run: |
          echo "===== PROXY LOG ======"
          cat proxy.log  2>/dev/null || echo "(none)"
          echo ""
          echo "===== TUNNEL LOG ====="
          cat tunnel.log 2>/dev/null || echo "(none)"
          echo ""
          echo "===== OLLAMA LOG (tail 80) ====="
          tail -80 ollama.log 2>/dev/null || echo "(none)"
