name: Senior Engineer - Ollama Gemma4 e4b0s

on:
  workflow_dispatch:
    inputs:
      session_hours:
        description: 'Session duration (max 6)'
        required: false
        default: '6'
      ctx_size:
        description: 'Context size'
        required: false
        default: '8192'
      temperature:
        description: '0.1-0.3 for deterministic code'
        required: false
        default: '0.2'

env:
  SESSION_HOURS: ${{ github.event.inputs.session_hours || '6' }}
  CTX_SIZE: ${{ github.event.inputs.ctx_size || '8192' }}
  TEMPERATURE: ${{ github.event.inputs.temperature || '0.2' }}
  OLLAMA_PORT: '11434'
  PROXY_PORT: '1234'
  MODEL: 'gemma4:e4b0s'

jobs:
  senior-engineer-ollama-gemma4:
    name: Gemma4:e4b0s via Ollama
    runs-on: ubuntu-latest
    timeout-minutes: 400

    steps:
      - uses: actions/checkout@v4

      - name: Kill stale processes
        run: |
          pkill -9 -f ollama 2>/dev/null || true
          pkill -9 -f cloudflared 2>/dev/null || true
          pkill -9 -f "python.*interceptor" 2>/dev/null || true
          sudo fuser -k $PROXY_PORT/tcp 2>/dev/null || true
          sudo fuser -k $OLLAMA_PORT/tcp 2>/dev/null || true
          sleep 2
          echo "✅ Ports cleared"

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl wget jq python3
          python3 --version

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama --version

      - name: Start Ollama
        run: |
          OLLAMA_HOST=0.0.0.0:$OLLAMA_PORT OLLAMA_KEEP_ALIVE=-1 OLLAMA_NUM_PARALLEL=1 nohup ollama serve > ollama.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf "http://127.0.0.1:$OLLAMA_PORT/api/tags" > /dev/null 2>&1 && { echo "✅ Ollama ready"; break; }
            [ "$i" -eq 60 ] && { echo "❌ Ollama failed"; cat ollama.log; exit 1; }
            sleep 2
          done

      - name: Pull & Warm Model
        run: |
          OLLAMA_HOST=127.0.0.1:$OLLAMA_PORT ollama pull "$MODEL"
          echo "Warming up..."
          curl -sf "http://127.0.0.1:$OLLAMA_PORT/api/chat" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"$MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"stream\":false,\"options\":{\"num_predict\":5}}" \
            --max-time 120 > /dev/null
          echo "✅ Model warm"

      - name: Start Proxy
        run: |
          python3 interceptor.py > proxy.log 2>&1 &
          echo $! > proxy.pid
          sleep 2
          
          # IMMEDIATE CRASH CHECK
          if ! kill -0 $(cat proxy.pid) 2>/dev/null; then
            echo "❌ Proxy died immediately on startup!"
            echo "=== proxy.log ==="
            cat proxy.log
            exit 1
          fi
          echo "✅ Proxy process alive (PID: $(cat proxy.pid))"
          
          echo "Waiting for /health endpoint..."
          for i in $(seq 1 15); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:$PROXY_PORT/health" --max-time 3 2>/dev/null)
            [ "$HTTP" = "200" ] && { echo "✅ Proxy healthy on :$PROXY_PORT"; break; }
            [ "$i" -eq 15 ] && { echo "❌ Health check failed (last: $HTTP)"; cat proxy.log; exit 1; }
            sleep 1
          done

      - name: Verify End-to-End
        run: |
          RESP=$(curl -sf "http://127.0.0.1:$PROXY_PORT/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -d '{"model":"'"$MODEL"'","messages":[{"role":"user","content":"Reply: ready"}],"max_tokens":5}' --max-time 30)
          CONTENT=$(echo "$RESP" | jq -r '.choices[0].message.content // empty')
          echo "Proxy replied: $CONTENT"
          [ -z "$CONTENT" ] && { echo "❌ Empty response"; cat proxy.log; exit 1; }

      - name: Cloudflare Tunnel
        run: |
          curl -fsSL -o /tmp/cf.deb "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb"
          sudo dpkg -i /tmp/cf.deb 2>/dev/null || true
          nohup cloudflared tunnel --url "http://127.0.0.1:$PROXY_PORT" --no-autoupdate > tunnel.log 2>&1 &
          echo $! > tunnel.pid
          
          URL=""
          for i in $(seq 1 40); do
            URL=$(grep -oP 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' tunnel.log 2>/dev/null | head -1)
            [ -n "$URL" ] && break; sleep 2
          done
          [ -z "$URL" ] && { echo "❌ No tunnel URL"; cat tunnel.log; exit 1; }
          echo "CLOUDFLARE_URL=${URL%/}" >> $GITHUB_ENV
          echo "✅ Tunnel: $URL"

      - name: Keepalive
        run: |
          END=$(( $(date +%s) + SESSION_HOURS * 3600 ))
          while [ "$(date +%s)" -lt "$END" ]; do
            REM=$(( (END - $(date +%s)) / 60 ))
            echo "💓 ${REM}min left - $(date -u '+%H:%M UTC')"
            sleep 300
          done

      - name: Cleanup
        if: always()
        run: |
          for f in proxy.pid ollama.pid tunnel.pid; do [ -f "$f" ] && kill -9 $(cat "$f") 2>/dev/null || true; done
          pkill -9 -f cloudflared 2>/dev/null || true; pkill -9 -f ollama 2>/dev/null || true
