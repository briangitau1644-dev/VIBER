name: Ollama Proxy with System Tools - Agentic Mode Ready

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Ollama model to use'
        required: false
        default: 'sorc/qwen3.5-claude-4.6-opus:4b'
      working_dir:
        description: 'Working directory for file operations'
        required: false
        default: '/home/runner/work'
      enable_ram_pressure:
        description: 'Enable RAM pressure'
        required: false
        default: 'true'
      session_hours:
        description: 'Session duration in hours (max 6)'
        required: false
        default: '6'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  MODEL: ${{ github.event.inputs.model || 'sorc/qwen3.5-claude-4.6-opus:4b' }}
  WORKING_DIR: ${{ github.event.inputs.working_dir || '/home/runner/work' }}
  RAM_PRESSURE_ENABLED: ${{ github.event.inputs.enable_ram_pressure || 'true' }}
  RAM_PRESSURE_MB: '256'
  ACTIVITY_LOG_INTERVAL: '30'
  KEEPALIVE_INTERVAL: '10'
  PROXY_PORT: '8000'
  OLLAMA_PORT: '11434'
  SESSION_HOURS: ${{ github.event.inputs.session_hours || '6' }}
  CLOUDFLARE_URL: ''

jobs:
  ollama-proxy:
    name: Ollama Proxy + System Tools + Cloudflare Tunnel
    runs-on: ubuntu-latest
    timeout-minutes: 400
    
    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 Install System Dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq curl wget lsof net-tools jq grep bash

      - name: 📥 Install Python Dependencies
        run: |
          pip install --upgrade pip --quiet
          pip install --quiet fastapi uvicorn[standard] requests pydantic starlette psutil

      - name: 📥 Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama --version

      - name: 📥 Install Cloudflared
        run: |
          curl -fsSL -o /tmp/cf.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i /tmp/cf.deb 2>/dev/null || true
          rm -f /tmp/cf.deb

      - name: 🚀 Start Ollama Server
        run: |
          export OLLAMA_HOST="127.0.0.1:${{ env.OLLAMA_PORT }}"
          export OLLAMA_ORIGINS="*"
          export OLLAMA_KEEP_ALIVE="-1"
          nohup ollama serve > ollama.log 2>&1 &
          echo $! > ollama.pid
          
          for i in {1..30}; do
            curl -sf http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/version > /dev/null 2>&1 && break
            [ $i -eq 30 ] && echo "❌ Ollama failed" && exit 1
            sleep 2
          done
          
          echo "⏳ Pulling model: ${{ env.MODEL }}"
          if ! timeout 900 ollama pull ${{ env.MODEL }}; then
            echo "❌ Failed to pull model"
            ollama list
            exit 1
          fi
          echo "✅ Model ready"

      - name: 🚀 Start Proxy Server with System Tools
        run: |
          sudo fuser -k ${{ env.PROXY_PORT }}/tcp 2>/dev/null || true
          export MODEL="${{ env.MODEL }}"
          export WORKING_DIR="${{ env.WORKING_DIR }}"
          export RAM_PRESSURE_ENABLED="${{ env.RAM_PRESSURE_ENABLED }}"
          export RAM_PRESSURE_MB="${{ env.RAM_PRESSURE_MB }}"
          export ACTIVITY_LOG_INTERVAL="${{ env.ACTIVITY_LOG_INTERVAL }}"
          export KEEPALIVE_INTERVAL="${{ env.KEEPALIVE_INTERVAL }}"
          export PROXY_PORT="${{ env.PROXY_PORT }}"
          export OLLAMA_PORT="${{ env.OLLAMA_PORT }}"
          
          echo "📁 Setting up working directory: $WORKING_DIR"
          mkdir -p "$WORKING_DIR"
          
          nohup python3 proxy_server.py > proxy.log 2>&1 &
          echo $! > proxy.pid
          
          for i in {1..20}; do
            curl -sf http://127.0.0.1:${{ env.PROXY_PORT }}/health > /dev/null 2>&1 && break
            [ $i -eq 20 ] && echo "❌ Proxy failed" && tail -20 proxy.log && exit 1
            sleep 3
          done
          echo "✅ Proxy ready with system tools"

      - name: 🌐 Start Cloudflare Tunnel
        run: |
          echo "🌐 Starting Cloudflare tunnel..."
          pkill -9 -f cloudflared 2>/dev/null || true
          sleep 1
          
          nohup cloudflared tunnel --url http://localhost:${{ env.PROXY_PORT }} > tunnel.log 2>&1 &
          echo $! > tunnel.pid
          
          echo "⏳ Waiting for tunnel URL..."
          TUNNEL_URL=""
          for i in {1..15}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' tunnel.log 2>/dev/null | head -1)
            [ -n "$TUNNEL_URL" ] && break
            sleep 2
          done
          
          if [ -n "$TUNNEL_URL" ]; then
            echo "CLOUDFLARE_URL=$TUNNEL_URL" >> $GITHUB_ENV
            echo ""
            echo "╔════════════════════════════════════════════════════════╗"
            echo "║  🤖 AGENTIC MODE READY - SYSTEM TOOLS ENABLED  🤖      ║"
            echo "╠════════════════════════════════════════════════════════╣"
            echo "║  🔗 $TUNNEL_URL  ║"
            echo "║                                                        ║"
            echo "║  ⚙️  Client Configuration:                            ║"
            echo "║  • api_base: '$TUNNEL_URL/v1'              ║"
            echo "║  • model: '${{ env.MODEL }}'                   ║"
            echo "║  • tools: auto (includes system ops)                  ║"
            echo "║                                                        ║"
            echo "║  ⚠️  IMPORTANT: Client MUST prompt for permissions   ║"
            echo "║  before executing: run_command, delete_*, edit_file   ║"
            echo "╚════════════════════════════════════════════════════════╝"
            echo "::notice::🌐 URL: $TUNNEL_URL | ⚠️  Client must handle permissions"
          else
            echo "❌ Tunnel URL not found"
            tail -20 tunnel.log
          fi

      - name: 🧪 Test System Tools Endpoint
        if: env.CLOUDFLARE_URL != ''
        run: |
          echo "🧪 Testing system tools..."
          
          # Test /v1/tools to verify system tools are listed
          echo "1️⃣  Available tools:"
          curl -sf "${{ env.CLOUDFLARE_URL }}/v1/tools" | jq '.tools[].function.name' | head -15
          
          # Test health
          echo "2️⃣  Health check:"
          curl -sf "${{ env.CLOUDFLARE_URL }}/health" | jq '{status, model, tools_count}'
          
          echo "✅ System tools endpoint ready"

      - name: ⏱️ Session Pulser (${{ env.SESSION_HOURS }}h)
        run: |
          SESSION_SECONDS=$((${{ env.SESSION_HOURS }} * 3600))
          echo "⏱️ Starting ${SESSION_SECONDS}s session..."
          [ -n "${{ env.CLOUDFLARE_URL }}" ] && echo "🌐 ${{ env.CLOUDFLARE_URL }}"
          
          START=$(date +%s); END=$((START + SESSION_SECONDS))
          while [ $(date +%s) -lt $END ]; do
            echo "⏰ $(date '+%H:%M:%S') | $(( ($(date +%s) - START) * 100 / SESSION_SECONDS ))% done"
            curl -sf --max-time 5 "${{ env.CLOUDFLARE_URL }}/health" | jq -r '"🏥 \(.status)"' 2>/dev/null || true
            sleep 300
          done
          echo "🏁 Session complete"

      - name: 📊 Final Report
        if: always()
        run: |
          echo "📊 Final Report"
          [ -n "${{ env.CLOUDFLARE_URL }}" ] && echo "🌐 URL: ${{ env.CLOUDFLARE_URL }}"
          curl -sf http://127.0.0.1:${{ env.PROXY_PORT }}/health | jq || echo "Proxy down"
          echo "🔧 Last proxy logs:"; tail -n 10 proxy.log 2>/dev/null | sed 's/^/   /'

      - name: 🛑 Cleanup
        if: always()
        run: |
          echo "🛑 Cleaning up..."
          for pid_file in tunnel.pid proxy.pid ollama.pid; do
            [ -f "$pid_file" ] && kill -9 $(cat "$pid_file") 2>/dev/null || true
          done
          pkill -9 -f cloudflared 2>/dev/null || true
          sudo fuser -k ${{ env.PROXY_PORT }}/tcp ${{ env.OLLAMA_PORT }}/tcp 2>/dev/null || true
          rm -f *.pid 2>/dev/null || true
          echo "✅ Cleanup complete"
