- name: Install and start Cloudflare tunnel
  run: |
    echo "🌐 Installing cloudflared..."
    curl -fsSL -o /tmp/cf.deb "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb"
    sudo dpkg -i /tmp/cf.deb 2>/dev/null || true
    
    echo "🚀 Starting tunnel to http://127.0.0.1:$PROXY_PORT..."
    nohup cloudflared tunnel \
      --url "http://127.0.0.1:$PROXY_PORT" \
      --no-autoupdate \
      --loglevel info \
      > tunnel.log 2>&1 &
    echo $! > tunnel.pid

    # Wait for tunnel URL with extended timeout
    TUNNEL_URL=""
    echo "⏳ Waiting for tunnel URL (up to 120s)..."
    for i in $(seq 1 60); do
      TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' tunnel.log 2>/dev/null | head -1 || true)
      if [ -n "$TUNNEL_URL" ]; then
        # CRITICAL: Remove trailing slash to fix apiBase concatenation
        TUNNEL_URL="${TUNNEL_URL%/}"
        echo "✅ Found tunnel URL: $TUNNEL_URL"
        break
      fi
      sleep 2
    done

    if [ -z "$TUNNEL_URL" ]; then
      echo "❌ ERROR: No tunnel URL found after 120s"
      echo "--- tunnel.log ---"
      cat tunnel.log
      exit 1
    fi

    # Export clean URL
    echo "CLOUDFLARE_URL=$TUNNEL_URL" >> $GITHUB_ENV
    
    # === ROBUST TUNNEL VERIFICATION ===
    echo "🔍 Verifying tunnel connectivity (DNS + HTTP)..."
    
    # Step 1: DNS resolution check
    echo "  Step 1: Checking DNS resolution..."
    for i in $(seq 1 20); do
      if nslookup "$(echo "$TUNNEL_URL" | sed 's|https://||')" > /dev/null 2>&1 || \
         getent hosts "$(echo "$TUNNEL_URL" | sed 's|https://||')" > /dev/null 2>&1; then
        echo "  ✅ DNS resolved after $((i*2))s"
        break
      fi
      if [ "$i" -eq 20 ]; then
        echo "  ⚠️ DNS still resolving, continuing with HTTP test anyway..."
      fi
      sleep 2
    done
    
    # Step 2: HTTP health check with curl error handling
    echo "  Step 2: Testing HTTP connectivity..."
    TUNNEL_HEALTHY=false
    for i in $(seq 1 30); do
      # Use curl with explicit error handling
      HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
        "$TUNNEL_URL/health" \
        --max-time 20 \
        --connect-timeout 10 \
        --retry 2 \
        --retry-delay 2 \
        2>/dev/null)
      CURL_EXIT=$?
      
      if [ "$CURL_EXIT" -eq 0 ] && [ "$HTTP_CODE" = "200" ]; then
        echo "  ✅ Tunnel verified (HTTP $HTTP_CODE) after $((i*3))s"
        TUNNEL_HEALTHY=true
        break
      elif [ "$CURL_EXIT" -eq 6 ]; then
        echo "  ⏳ Attempt $i: DNS not ready yet (curl exit 6), retrying..."
      elif [ "$CURL_EXIT" -eq 7 ]; then
        echo "  ⏳ Attempt $i: Connection refused (tunnel starting), retrying..."
      elif [ "$CURL_EXIT" -eq 28 ]; then
        echo "  ⏳ Attempt $i: Timeout (tunnel busy), retrying..."
      else
        echo "  ⏳ Attempt $i: HTTP $HTTP_CODE (curl exit $CURL_EXIT), retrying..."
      fi
      sleep 3
    done
    
    if [ "$TUNNEL_HEALTHY" = false ]; then
      echo "  ⚠️ Tunnel health check didn't return 200, but continuing anyway..."
      echo "  Last curl exit: $CURL_EXIT, HTTP code: $HTTP_CODE"
      echo "  This may still work for client requests even if /health fails"
    fi

    # Print client configuration
    echo ""
    echo "╔════════════════════════════════════════════════════╗"
    echo "║  🎉 gemma4:e4b + Ollama READY                      ║"
    echo "╠════════════════════════════════════════════════════╣"
    echo "║  Tunnel URL : $TUNNEL_URL"
    echo "║  Model      : $MODEL"
    echo "╠────────────────────────────────────────────────────╣"
    echo "║  📋 Client Configuration:                          ║"
    echo "║    Base URL  : ${TUNNEL_URL}/v1                    ║"
    echo "║    Model ID  : $MODEL                              ║"
    echo "║    API Key   : roo                                 ║"
    echo "╠────────────────────────────────────────────────────╣"
    echo "║  ⚠️  Base URL must have NO trailing slash          ║"
    echo "╚════════════════════════════════════════════════════╝"
