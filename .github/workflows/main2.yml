name: Ollama Proxy with System Tools - Agentic Mode Ready

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Ollama model to use'
        required: false
        default: 'sorc/qwen3.5-claude-4.6-opus:4b'
      working_dir:
        description: 'Working directory for file operations'
        required: false
        default: '/home/runner/work'
      enable_ram_pressure:
        description: 'Enable RAM pressure'
        required: false
        default: 'true'
      session_hours:
        description: 'Session duration in hours (max 6)'
        required: false
        default: '6'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  MODEL: ${{ github.event.inputs.model || 'sorc/qwen3.5-claude-4.6-opus:4b' }}
  WORKING_DIR: ${{ github.event.inputs.working_dir || '/home/runner/work' }}
  RAM_PRESSURE_ENABLED: ${{ github.event.inputs.enable_ram_pressure || 'true' }}
  RAM_PRESSURE_MB: '256'
  ACTIVITY_LOG_INTERVAL: '30'
  KEEPALIVE_INTERVAL: '10'
  PROXY_PORT: '8000'
  OLLAMA_PORT: '11434'
  SESSION_HOURS: ${{ github.event.inputs.session_hours || '6' }}
  CLOUDFLARE_URL: ''

jobs:
  ollama-proxy:
    name: Ollama Proxy + System Tools + Cloudflare Tunnel
    runs-on: ubuntu-latest
    timeout-minutes: 400

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl wget lsof net-tools jq grep bash

      - name: 📥 Install Python Dependencies
        run: |
          pip install --upgrade pip --quiet
          pip install --quiet fastapi "uvicorn[standard]" requests pydantic starlette psutil

      - name: 📥 Install Ollama (latest)
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama --version

      - name: 📥 Install Cloudflared
        run: |
          curl -fsSL -o /tmp/cf.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i /tmp/cf.deb 2>/dev/null || true
          rm -f /tmp/cf.deb

      - name: 🚀 Start Ollama Server
        run: |
          export OLLAMA_HOST="127.0.0.1:${{ env.OLLAMA_PORT }}"
          export OLLAMA_ORIGINS="*"
          export OLLAMA_KEEP_ALIVE="-1"
          nohup ollama serve > ollama.log 2>&1 &
          echo $! > ollama.pid

          echo "⏳ Waiting for Ollama..."
          for i in {1..30}; do
            curl -sf http://127.0.0.1:${{ env.OLLAMA_PORT }}/api/version \
              > /dev/null 2>&1 && echo "✅ Ollama ready" && break
            [ $i -eq 30 ] && echo "❌ Ollama did not start" && exit 1
            sleep 2
          done

          echo "⏳ Pulling model: ${{ env.MODEL }}"
          if ! timeout 900 ollama pull ${{ env.MODEL }}; then
            echo "❌ Failed to pull model"
            ollama list
            exit 1
          fi
          echo "✅ Model ready"
          ollama list

      - name: 🚀 Start Proxy Server
        run: |
          sudo fuser -k ${{ env.PROXY_PORT }}/tcp 2>/dev/null || true

          export MODEL="${{ env.MODEL }}"
          export WORKING_DIR="${{ env.WORKING_DIR }}"
          export RAM_PRESSURE_ENABLED="${{ env.RAM_PRESSURE_ENABLED }}"
          export RAM_PRESSURE_MB="${{ env.RAM_PRESSURE_MB }}"
          export ACTIVITY_LOG_INTERVAL="${{ env.ACTIVITY_LOG_INTERVAL }}"
          export KEEPALIVE_INTERVAL="${{ env.KEEPALIVE_INTERVAL }}"
          export PROXY_PORT="${{ env.PROXY_PORT }}"
          export OLLAMA_PORT="${{ env.OLLAMA_PORT }}"

          mkdir -p "$WORKING_DIR"
          nohup python3 proxy_server.py > proxy.log 2>&1 &
          echo $! > proxy.pid

          echo "⏳ Waiting for proxy..."
          for i in {1..20}; do
            curl -sf http://127.0.0.1:${{ env.PROXY_PORT }}/health \
              > /dev/null 2>&1 && echo "✅ Proxy ready" && break
            [ $i -eq 20 ] && echo "❌ Proxy failed" && tail -30 proxy.log && exit 1
            sleep 3
          done

          echo "📋 Proxy health:"
          curl -sf http://127.0.0.1:${{ env.PROXY_PORT }}/health | jq .

      - name: 🌐 Start Cloudflare Tunnel
        run: |
          pkill -9 -f cloudflared 2>/dev/null || true
          sleep 1

          nohup cloudflared tunnel --url http://localhost:${{ env.PROXY_PORT }} \
            > tunnel.log 2>&1 &
          echo $! > tunnel.pid

          TUNNEL_URL=""
          for i in {1..30}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' \
              tunnel.log 2>/dev/null | head -1)
            [ -n "$TUNNEL_URL" ] && break
            sleep 2
          done

          if [ -n "$TUNNEL_URL" ]; then
            echo "CLOUDFLARE_URL=$TUNNEL_URL" >> $GITHUB_ENV

            # ── Print connection instructions ──────────────────────────────
            echo ""
            echo "╔══════════════════════════════════════════════════════════════════╗"
            echo "║   🤖  AGENTIC MODE READY — SYSTEM TOOLS ENABLED                 ║"
            echo "╠══════════════════════════════════════════════════════════════════╣"
            printf "║  🔗  %-63s║\n" "$TUNNEL_URL"
            echo "║                                                                  ║"
            echo "║  CLIENT CONFIGURATION (pick ONE of the two options below):       ║"
            echo "║                                                                  ║"
            echo "║  Option A — OpenAI-compatible clients (Continue, Roo, etc.)      ║"
            printf "║    apiBase : %-52s║\n" "$TUNNEL_URL/v1"
            printf "║    model   : %-52s║\n" "${{ env.MODEL }}"
            echo "║                                                                  ║"
            echo "║  Option B — Raw Ollama clients (Open WebUI, etc.)                ║"
            printf "║    apiBase : %-52s║\n" "$TUNNEL_URL"
            printf "║    model   : %-52s║\n" "${{ env.MODEL }}"
            echo "║                                                                  ║"
            echo "║  NOTE: Do NOT add a trailing slash to the URL                    ║"
            echo "║                                                                  ║"
            echo "╚══════════════════════════════════════════════════════════════════╝"
            echo "::notice::Option A (OpenAI): $TUNNEL_URL/v1 | Option B (Ollama): $TUNNEL_URL"
          else
            echo "❌ Tunnel URL not found"
            tail -30 tunnel.log
          fi

      - name: 🧪 Test All Endpoints
        if: env.CLOUDFLARE_URL != ''
        run: |
          BASE="${{ env.CLOUDFLARE_URL }}"
          echo "═══════════════════════════════════════════════"
          echo "Testing: $BASE"
          echo ""

          echo "1️⃣  GET / (model discovery)"
          curl -sf "$BASE/" | jq '{model: .model, active_endpoint: .active_endpoint}'
          echo ""

          echo "2️⃣  GET /health"
          curl -sf "$BASE/health" | jq '{status, model_loaded, active_endpoint}'
          echo ""

          echo "3️⃣  GET /v1/models (OpenAI model list)"
          curl -sf "$BASE/v1/models" | jq '.data[].id'
          echo ""

          echo "4️⃣  GET /api/tags (Ollama model list)"
          curl -sf "$BASE/api/tags" | jq '.models[].name'
          echo ""

          echo "5️⃣  GET /api/version (should be >= 0.1.16)"
          curl -sf "$BASE/api/version" | jq .
          echo ""

          echo "6️⃣  POST /v1/chat/completions (OpenAI smoke test)"
          curl -sf "$BASE/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"${{ env.MODEL }}\",
              \"messages\": [{\"role\":\"user\",\"content\":\"Reply with just: pong\"}],
              \"max_tokens\": 10,
              \"stream\": false
            }" | jq '{finish_reason: .choices[0].finish_reason, content: .choices[0].message.content}'
          echo ""

          echo "7️⃣  POST /api/chat (raw Ollama smoke test)"
          curl -sf "$BASE/api/chat" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"${{ env.MODEL }}\",
              \"messages\": [{\"role\":\"user\",\"content\":\"Reply with just: pong\"}],
              \"stream\": false
            }" | jq '{done, content: .message.content}'
          echo ""

          echo "✅ All endpoint tests complete"

      - name: ⏱️ Session Pulser (${{ env.SESSION_HOURS }}h)
        run: |
          SESSION_SECONDS=$(( ${{ env.SESSION_HOURS }} * 3600 ))
          echo "⏱️ Session: ${SESSION_SECONDS}s"
          [ -n "${{ env.CLOUDFLARE_URL }}" ] && echo "🌐 ${{ env.CLOUDFLARE_URL }}"

          START=$(date +%s); END=$(( START + SESSION_SECONDS ))
          while [ "$(date +%s)" -lt "$END" ]; do
            PCT=$(( ( ($(date +%s) - START) * 100 ) / SESSION_SECONDS ))
            echo "⏰ $(date '+%H:%M:%S') | ${PCT}%"
            curl -sf --max-time 10 "${{ env.CLOUDFLARE_URL }}/health" 2>/dev/null \
              | jq -r '"🏥 \(.status) | \(.active_endpoint)"' 2>/dev/null || true
            sleep 300
          done
          echo "🏁 Done"

      - name: 📊 Final Report
        if: always()
        run: |
          echo "══════ FINAL REPORT ══════"
          [ -n "${{ env.CLOUDFLARE_URL }}" ] && echo "🌐 ${{ env.CLOUDFLARE_URL }}"
          curl -sf http://127.0.0.1:${{ env.PROXY_PORT }}/health | jq . || true
          echo "── proxy.log (last 20) ──"
          tail -20 proxy.log 2>/dev/null | sed 's/^/  /' || true
          echo "── ollama.log (last 10) ──"
          tail -10 ollama.log 2>/dev/null | sed 's/^/  /' || true

      - name: 🛑 Cleanup
        if: always()
        run: |
          for f in tunnel.pid proxy.pid ollama.pid; do
            [ -f "$f" ] && kill -9 "$(cat $f)" 2>/dev/null || true
          done
          pkill -9 -f cloudflared 2>/dev/null || true
          sudo fuser -k ${{ env.PROXY_PORT }}/tcp ${{ env.OLLAMA_PORT }}/tcp 2>/dev/null || true
          rm -f ./*.pid 2>/dev/null || true
          echo "✅ Cleanup done"
